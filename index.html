<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藤原 | マイクラワールド</title>
    <style>
        /* 全体の設定（マイクラ風ダークモード） */
        :root {
            --primary-color: #5cb85c; /* マイクラの草ブロックのような緑 */
            --secondary-color: #f0e68c; /* 砂や金のような色 */
            --bg-color: #2c2f33; /* 暗い洞窟や岩盤のような色 */
            --text-color: #e0e0e0;
            --block-border: #1a1c1e; /* ブロックの境目 */
        }

        @font-face {
            font-family: 'MinecraftRegular';
            src: url('https://fonts.cdnfonts.com/s/32950/Minecraft.woff') format('woff'); /* Webフォントを読み込み */
            font-weight: normal;
            font-style: normal;
        }

        body {
            margin: 0;
            font-family: 'MinecraftRegular', 'PixelMplus10-Regular', 'Helvetica Neue', Arial, sans-serif; /* マイクラ風フォント優先 */
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            line-height: 1.6;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="8" fill="rgba(255,255,255,0.7)"/></svg>') 16 16, auto; /* カーソルも少しマイクラ風 */
        }

        /* スクロール時のフワッと現れるアニメーション設定 */
        .hidden {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s ease-out;
        }
        .show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ファーストビュー */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden; /* マイクラ背景のため */
        }

        /* マイクラ風背景アニメーション */
        .minecraft-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(45deg, var(--bg-color) 25%, transparent 25%),
                linear-gradient(-45deg, var(--bg-color) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, var(--bg-color) 75%),
                linear-gradient(-45deg, transparent 75%, var(--bg-color) 75%);
            background-size: 60px 60px; /* ブロックのサイズ */
            animation: moveBg 60s linear infinite; /* 背景がゆっくり流れる */
            opacity: 0.3;
            z-index: 0;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        .hero h1 {
            font-size: 6rem;
            letter-spacing: 5px;
            margin: 0;
            color: var(--secondary-color);
            text-shadow: 6px 6px 0px var(--block-border); /* 影でブロック感を出す */
            position: relative;
            z-index: 1;
            animation: bounce 1s ease-in-out infinite alternate; /* 少し弾む */
        }

        @keyframes bounce {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }

        .hero p {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-top: 20px;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            animation: pixelFadeIn 2s ease-out;
        }

        @keyframes pixelFadeIn {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0px); }
        }

        /* コンテンツ部分 */
        .section {
            padding: 80px 20px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            min-height: 50vh;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 3rem;
            margin-bottom: 50px;
            color: var(--secondary-color);
            text-shadow: 4px 4px 0px var(--block-border);
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--primary-color); /* 見出しもブロック風 */
            border: 3px solid var(--block-border);
            animation: popIn 1s ease-out forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* カードデザインとホバー時の動き */
        .card {
            background: #4a4a4a; /* 石ブロックのような色 */
            padding: 30px;
            border-radius: 8px; /* 角を少し丸める */
            box-shadow: 8px 8px 0px var(--block-border); /* 影でブロック感を強調 */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            line-height: 1.8;
            font-size: 1.2rem;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            border: 2px solid #5a5a5a; /* ブロックの継ぎ目 */
        }

        .card:hover {
            transform: translateY(-8px) rotateZ(2deg); /* 少し浮いて傾く */
            box-shadow: 12px 12px 0px var(--block-border); /* 影も大きくなる */
        }

        /* ホバー時のピクセルエフェクト */
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10"><rect x="0" y="0" width="5" height="5" fill="%23f0e68c" /><rect x="5" y="5" width="5" height="5" fill="%23f0e68c" /></svg>'); /* 小さなピクセルパターン */
            background-size: 10px 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 0;
        }

        .card:hover::after {
            opacity: 0.1; /* ホバー時にうっすらピクセルが見える */
        }

        /* リンクボタン */
        .minecraft-button {
            display: inline-block;
            padding: 15px 30px;
            margin-top: 30px;
            background-color: var(--primary-color);
            color
