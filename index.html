<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Brave - Fixed Version</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --player-color: #4a90e2;
            --heart-color: #e74c3c;
            --platform-color: #2ecc71;
            --enemy-color: #f39c12;
        }
        body {
            margin: 0; padding: 0; background: var(--bg-color); color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; overflow: hidden; touch-action: none;
        }
        #game-info { margin-top: 10px; text-align: center; }
        #canvas-container {
            position: relative; margin-top: 10px;
            border: 4px solid #333; border-radius: 8px;
            background: #0f0f1a;
        }
        canvas { display: block; max-width: 100vw; max-height: 70vh; }
        .controls-guide { margin-top: 10px; color: #aaa; font-size: 0.8rem; }
        .mobile-controls {
            display: flex; margin-top: 15px; gap: 10px; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            padding: 15px 20px; background: #333; color: white; border: none;
            border-radius: 8px; font-weight: bold; user-select: none; cursor: pointer;
        }
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center;
            align-items: center; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<div id="game-info">
    <h2 style="margin:5px">HEART BRAVE</h2>
    <p style="margin:5px">Score: <span id="score">0</span> | HP: <span id="hp">3</span></p>
</div>

<div id="canvas-container">
    <div id="start-overlay">クリックでスタート！</div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls-guide">移動: ← → / ジャンプ: Space / 攻撃: Z</div>

<div class="mobile-controls">
    <button class="btn" id="btn-left">←</button>
    <button class="btn" id="btn-right">→</button>
    <button class="btn" id="btn-jump">JUMP</button>
    <button class="btn" id="btn-shoot" style="background: var(--heart-color);">HEART</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpEl = document.getElementById('hp');
const startOverlay = document.getElementById('start-overlay');

canvas.width = 800;
canvas.height = 400;

// 設定

    gravity: 0.5,

    moveSpeed: 5,
    heartSpeed: 8
};

let score = 0;
let hp = 3;
let gameActive = false;

const player = { x: 50, y: 300, w: 30, h: 30, vx: 0, vy: 0, grounded: false };
const platforms = [
    {x: 0, y: 370, w: 800, h: 30},
    {x: 180, y: 280, w: 120, h: 15},
    {x: 380, y: 200, w: 120, h: 15},
    {x: 580, y: 280, w: 120, h: 15}
];
let hearts = [];
let enemies = [];

// ハート描画関数
function drawHeart(x, y, size) {
    ctx.fillStyle = "#e74c3c";
    ctx.beginPath();
    ctx.moveTo(x, y + size / 4);
    ctx.quadraticCurveTo(x, y, x + size / 4, y);
    ctx.quadraticCurveTo(x + size / 2, y, x + size / 2, y + size / 4);
    ctx.quadraticCurveTo(x + size, y, x + size, y + size / 4);
    ctx.quadraticCurveTo(x + size, y + size / 2, x + size / 2, y + size);
    ctx.quadraticCurveTo(x, y + size / 2, x, y + size / 4);
    ctx.fill();
}

function spawnEnemy() {
    if(!gameActive) return;

        y: Math.random() * 200 + 100,
        w: 30, h: 30, vx: -(Math.random() * 2 + 2)
    });
    setTimeout(spawnEnemy, 1800);
}
