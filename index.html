<script>
// ... (中略：これまでの変数定義)
let attackType = 0; // 0:ビーム, 1:回転骨 (青ソウル時)

function update() {
    frame++;
    // ... (中略：移動・回復ロジック)

    // 攻撃生成 (cooldown終了後)
    if (cooldown <= 0) {
        if (p.mode === 'red') {
            // 赤ソウル時は「突き上げ」か「回転骨」
            if (warns.length === 0 && bones.length === 0 && spinners.length === 0) {
                nextAttackTimer--;
                if (nextAttackTimer <= 0) {
                    if (Math.random() > 0.5) {
                        let safe = Math.floor(Math.random() * 5);
                        for(let i=0; i<6; i++) { if(i!==safe && i!==safe+1) warns.push({x:i*100, w:100, t:60}); }
                    } else {
                        spawnOneSpinner();
                    }
                    nextAttackTimer = 60; 
                }
            }
        } else if (p.mode === 'blue') {
            // 青ソウル（無重力）フェーズの調整
            if (attackType === 0) {
                // 【調整】高速6連射ビーム
                if (spiralCount < 6) {
                    if (frame % 18 === 0) { // 間隔を早く
                        spiralAngle += 0.7;
                        spawnBlaster();
                        spiralCount++;
                    }
                } else if (blasters.length === 0) {
                    attackType = 1; // 次は回転骨へ
                    cooldown = 40;  // 短い合間
                    spiralCount = 0;
                }
            } else {
                // 【調整】回転骨の波（3本連続）
                if (spiralCount < 3) {
                    if (frame % 30 === 0) {
                        spawnOneSpinner();
                        spiralCount++;
                    }
                } else if (spinners.length === 0) {
                    attackType = 0; // ビームに戻る
                    cooldown = 80;  // 休憩
                    spiralCount = 0;
                    msg(hp < 30 ? "* ...はぁ、はぁ。" : "* まだまだ行くぜ。");
                }
            }
        }
    }
    // ... (判定・描画ロジックは維持)
}

function spawnBlaster() {
    let radius = 280;
    let bx = 300 + Math.cos(spiralAngle) * radius;
    let by = 200 + Math.sin(spiralAngle) * radius;
    let angleToCenter = Math.atan2(200 - by, 300 - bx);
    blasters.push({ x: bx, y: by, rot: angleToCenter, timer: 40, beam: 0 });
}

function spawnOneSpinner() {
    let spawnSide = Math.floor(Math.random() * 4);
    let startX, startY;
    switch(spawnSide) {
        case 0: startX = Math.random()*600; startY = -80; break;
        case 1: startX = Math.random()*600; startY = 480; break;
        case 2: startX = -80; startY = Math.random()*400; break;
        case 3: startX = 680; startY = Math.random()*400; break;
    }
    let dx = (p.x+8) - startX, dy = (p.y+8) - startY, dist = Math.sqrt(dx*dx + dy*dy);
    spinners.push({ 
        x: startX, y: startY, angle: Math.random()*6, 
        vx: (dx/dist)*4.5, vy: (dy/dist)*4.5, rotSpeed: 0.15 
    });
}
</script>
