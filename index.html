<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS FIGHT - PERFECT BALANCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; margin-top: 20px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; margin: 0 10px; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; transition: width 0.2s; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn { padding: 10px 30px; font-size: 20px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; margin-top: 20px; }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <div id="status-text">TIME: 60s</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="msg"></div>
    <div id="start-screen" class="overlay">
        <h1>* 準備はいいか？</h1>
        <button class="btn" onclick="init()">はじめる</button>
    </div>
    <div id="end-screen" class="overlay" style="display: none;">
        <h1 id="end-title"></h1>
        <button class="btn" onclick="location.reload()">リトライ</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; width: 600px;">
    <button class="btn" style="height:80px" id="l">←</button>
    <button class="btn" style="height:80px" id="j">JUMP</button>
    <button class="btn" style="height:80px" id="r">→</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let p, hp, bones, blasters, warns, frame, active, keys, shake = 0, stage = 0;

function init() {
    p = { x: 290, y: 300, w: 20, h: 20, vx: 0, vy: 0, ground: false };
    hp = 92; bones = []; blasters = []; warns = []; frame = 0; keys = {};
    active = true;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('end-screen').style.display = 'none';
    loop();
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;
    if (shake > 0) shake *= 0.9;

    // 移動（少し機敏に）
    if (keys['l']) p.vx = -7.5; else if (keys['r']) p.vx = 7.5; else p.vx *= 0.8;
    if (keys['j'] && p.ground) { p.vy = -16; p.ground = false; }
    p.vy += 0.9; p.x += p.vx; p.y += p.vy;
    if (p.y > 380 - p.h) { p.y = 380 - p.h; p.vy = 0; p.ground = true; }
    p.x = Math.max(0, Math.min(600 - p.w, p.x));

    // 時間制限
    let timeLeft = Math.max(0, 60 - Math.floor(frame/60));
    document.getElementById('status-text').innerText = "TIME: " + timeLeft + "s";
    if (timeLeft <= 0) finish(true);

    // --- 賢い攻撃アルゴリズム ---

    // 1. 突き上げ骨：プレイヤーの現在地を考慮して隙間を作る
    if (frame % 140 === 0) {
        let playerZone = Math.floor(p.x / 100);
        let safeZone = playerZone; // プレイヤーのいる場所を優先的に安置にする
        
        for(let i=0; i<=6; i++) {
            if(i === safeZone) continue;
            let bx = i * 100;
            warns.push({ x: bx, w: 100, t: 70 });
            setTimeout(() => {
                if(active) bones.push({ x: bx+2, y: 400, w: 96, h: 320, vy: -18, life: 45 });
            }, 1000);
        }
    }

    // 2. ブラスター：骨が出ていないタイミングを狙う
    if (frame > 600 && frame % 300 === 0) {
        blasters.push({ x: p.x, y: -80, tx: p.x, ty: 60, timer: 60, beam: 0 });
    }

    // 衝突判定（判定を小さく：中心10px程度に）
    bones.forEach((b, i) => {
        b.x += (b.vx||0); b.y += (b.vy||0); b.life--;
        let hitW = 6; let hitH = 6;
        if (p.x+7 < b.x+b.w && p.x+p.w-7 > b.x && p.y+7 < b.y+b.h && p.y+p.h-7 > b.y) {
            hp -= 1.0; shake = 8;
        }
        if (b.life <= 0) bones.splice(i, 1);
    });

    blasters.forEach((b, i) => {
        if (b.timer > 0) {
            b.x += (b.tx - b.x) * 0.1; b.timer--;
            if (b.timer === 0) { b.beam = 30; shake = 15; }
        } else {
            b.beam--;
            if (Math.abs(p.x + 10 - b.x) < 35 && b.beam > 0) { hp -= 2; shake = 5; }
            if (b.beam <= 0) blasters.splice(i, 1);
        }
    });

    // UI更新
    document.getElementById('hp-bar-fill').style.width = (hp/92*100) + "%";
    document.getElementById('hp-num').innerText = Math.ceil(hp);
    if (hp <= 0) finish(false);
}

function draw() {
    ctx.save();
    if (shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20);

    warns.forEach(w => {
        ctx.fillStyle = `rgba(255, 0, 0, 0.4)`;
        ctx.fillRect(w.x, 0, w.w, 380);
    });

    ctx.fillStyle = '#fff';
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    blasters.forEach(b => {
        ctx.fillStyle = b.timer < 10 && b.timer % 2 === 0 ? '#f00' : '#fff';
        ctx.fillRect(b.x - 20, b.y - 20, 40, 40);
        if (b.beam > 0) {
            ctx.fillStyle = '#fff'; ctx.fillRect(b.x - 40, b.y + 20, 80, 400);
            ctx.fillStyle = '#0ff'; ctx.fillRect(b.x - 15, b.y + 20, 30, 400);
        }
    });

    ctx.fillStyle = '#f00'; ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.restore();
}

function finish(win) {
    active = false;
    const screen = document.getElementById('end-screen');
    const title = document.getElementById('end-title');
    screen.style.display = 'flex';
    title.innerText = win ? "VICTORY" : "GAME OVER";
    title.style.color = win ? "#0f0" : "#f00";
}

const btn = (id) => {
    const el = document.getElementById(id);
    el.onpointerdown = (e) => { e.preventDefault(); keys[id] = true; };
    el.onpointerup = (e) => { e.preventDefault(); keys[id] = false; };
};
['l', 'r', 'j'].forEach(btn);
window.onkeydown = e => { if(e.key==='ArrowLeft') keys['l']=true; if(e.key==='ArrowRight') keys['r']=true; if(e.key==='ArrowUp'||e.key===' ') keys['j']=true; };
window.onkeyup = e => { if(e.key==='ArrowLeft') keys['l']=false; if(e.key==='ArrowRight') keys['r']=false; if(e.key==='ArrowUp'||e.key===' ') keys['j']=false; };
</script>
</body>
</html>
