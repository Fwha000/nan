<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave - Undertale Intro & Grand Boss Battle</title>
    <style>
        body {
            margin: 0; padding: 0; background: #010105; color: white;
            font-family: 'PixelMplus10', 'Segoe UI', sans-serif; /* ピクセルフォント感を出す */
            overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        @font-face {
            font-family: 'PixelMplus10';
            src: url('https://fonts.cdnfonts.com/s/30355/PixelMplus10-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        #hud {
            width: 100%; max-width: 700px; padding: 10px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }
        .bar-container {
            width: 100%; height: 16px; background: #111; border-radius: 8px; overflow: hidden; border: 2px solid #333;
        }
        #player-hp-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.2s; box-shadow: 0 0 10px #ff4757; }
        #boss-hp-bar { width: 100%; height: 100%; background: #a29bfe; transition: width 0.4s; box-shadow: 0 0 15px #a29bfe; }
        
        #game-container {
            position: relative; width: 95vw; height: 65vh; max-width: 800px;
            border: 4px solid #444; border-radius: 20px; background: #000;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer; text-align: center;
        }
        #intro-box {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; height: 150px;
            background: rgba(0,0,0,0.8); border: 3px solid white; border-radius: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 10px; box-sizing: border-box; font-size: 1.2rem;
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }
        #intro-text { margin-bottom: 10px; }
        #intro-choices { display: flex; gap: 20px; }
        .choice-btn {
            background: #333; color: white; border: 2px solid white; padding: 8px 20px;
            border-radius: 5px; cursor: pointer; font-size: 1rem;
        }
        .choice-btn:hover { background: #555; }
        .choice-btn.selected { background: #007bff; border-color: #007bff; }


        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 10px; width: 95vw; max-width: 450px;
        }
        .btn {
            height: 65px; background: rgba(255,255,255,0.08); color: white; border: 1px solid #555;
            border-radius: 12px; font-weight: bold; font-size: 1.1rem; user-select: none;
        }
        .btn:active { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

<div id="hud">
    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold;">
        <span id="boss-status" style="color: #a29bfe;">BOSS: AWAKENING</span>
        <span id="phase-label">PHASE 1</span>
    </div>
    <div class="bar-container"><div id="boss-hp-bar"></div></div>
    <div style="font-size: 0.8rem; color: #ff4757; font-weight: bold;">PLAYER INTEGRITY</div>
    <div class="bar-container"><div id="player-hp-bar"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h1 id="title" style="color:#ff4757; margin:0; font-size: 2.5rem;">HEART BRAVE</h1>
        <div style="margin: 15px 0; line-height: 1.6; max-width: 700px;">
            <p style="font-size: 1.2rem; font-weight: bold; color: #ffeb3b;">≪ ルール説明 ≫</p>
            <ul style="list-style-type: none; padding: 0; text-align: left; font-size: 1rem;">
                <li><span style="color:#4a90e2;">プレイヤー</span>を操作し、敵の攻撃を避けよう。</li>
                <li><span style="color:#ffeb3b;">黄色の弾</span>に空中で触れると、ボスに反射してダメージを与えるぞ！</li>
                <li>ボスは<span style="color:#f1c40f;">形態変化</span>する。攻撃が激しくなるので注意！</li>
                <li><span style="color:#a29bfe;">強力なビーム</span>は、ボスの上下に逃げて回避だ。</li>
                <li><span style="color:#2ecc71;">緑の✚マーク</span>は回復アイテム。ピンチの時に役立つぞ。</li>
                <li>移動: ← → / ジャンプ: ↑（または下のボタン）</li>
            </ul>
        </div>
        <p style="font-size: 1rem; color: #aaa;">画面をタップしてゲームを開始</p>
    </div>
    <canvas id="gameCanvas"></canvas>

    <div id="intro-box">
        <p id="intro-text">なんだか、戦いが始まりそうな予感がする...</p>
        <div id="intro-choices">
            <div class="choice-btn" id="choice-fight">たたかう</div>
            <div class="choice-btn" id="choice-flee">にがす</div>
        </div>
    </div>
</div>

<div class="controls">
    <button class="btn" id="l-btn">LEFT</button>
    <button class="btn" id="j-btn">JUMP</button>
    <button class="btn" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const pBar = document.getElementById('player-hp-bar');
const bBar = document.getElementById('boss-hp-bar');
const pLabel = document.getElementById('phase-label');
const bStatus = document.getElementById('boss-status');
const overlay = document.getElementById('overlay');
const introBox = document.getElementById('intro-box');
const introText = document.getElementById('intro-text');
const choiceFight = document.getElementById('choice-fight');
const choiceFlee = document.getElementById('choice-flee');

canvas.width = 800; canvas.height = 600;

let gameActive = false, hp = 100, bossHp = 100, frame = 0, shake = 0, phase = 0; // phase 0: intro, 1-3: boss battle
const player = { x: 100, y: 500, w: 35, h: 35, vx: 0, vy: 0, grounded: false };
const boss = { x: 900, y: 250, w: 100, h: 100, targetY: 250, active: false, beamTimer: 0, color: "#ff4757" };

const platforms = [
    {x: 0, y: 570, w: 800, h: 30}, // 地面
    {x: 50, y: 430, w: 180, h: 15}, 
    {x: 570, y: 430, w: 180, h: 15}, 
    {x: 310, y: 320, w: 180, h: 15},
    {x: 50, y: 180, w: 180, h: 15},
    {x: 570, y: 180, w: 180, h: 15}
];

let bullets = [];
let sideBeams = []; // サイドビームの情報を格納
let items = [];
let stars = Array.from({length: 70}, () => ({x: Math.random()*800, y: Math.random()*600, s: Math.random()*2.5 + 0.5}));
const keys = {};

let currentChoice = 0; // 0: たたかう, 1: にがす

function spawnBullet(x, y, vx, vy, type, size = 8, color = null) {
    bullets.push({ x, y, vx, vy, type, size: type === 'reflect' ? 14 : size, color: color });
}

function spawnItem() {
    if(!gameActive) return;
    items.push({ x: Math.random() * 600 + 100, y: -30, vy: 1.5, w: 30, h: 30 });
    setTimeout(spawnItem, 12000); // 12秒ごとに回復
}

function updateIntroChoices() {
    choiceFight.classList.remove('selected');
    choiceFlee.classList.remove('selected');
    if (currentChoice === 0) {
        choiceFight.classList.add('selected');
    } else {
        choiceFlee.classList.add('selected');
    }
}

function startBossBattle() {
    introBox.style.opacity = 0;
    setTimeout(() => { // アニメーション後に非表示
        introBox.style.pointerEvents = 'none';
        introBox.style.display = 'none';
        phase = 1; // フェーズをボスバトルへ
        gameActive = true;
        spawnItem();
        update();
    }, 500);
}

function update() {
    if(!gameActive) { // Introパート中のプレイヤー制御
        if (phase === 0) {
             if (keys['ArrowLeft'] && !keys.prevLeft) { currentChoice = 0; updateIntroChoices(); }
             if (keys['ArrowRight'] && !keys.prevRight) { currentChoice = 1; updateIntroChoices(); }
             if (keys['Enter'] || keys['Space'] && !keys.prevEnter) { startBossBattle(); }
             keys.prevLeft = keys['ArrowLeft'];
             keys.prevRight = keys['ArrowRight'];
             keys.prevEnter = keys['Enter'] || keys['Space'];
        }
        return;
    }

    frame++;
    if(shake > 0) shake--;

    stars.forEach(s => { s.x -= s.s; if(s.x < 0) s.x = 800; });

    // フェーズ遷移
    if(bossHp > 70) { 
        phase = 1; boss.color = "#ff4757"; pLabel.innerText = "PHASE 1"; bStatus.innerText = "BOSS: AWAKENING";
    } else if(bossHp > 35) { 
        phase = 2; boss.color = "#a29bfe"; pLabel.innerText = "PHASE 2: BIT DEPLOYED"; bStatus.innerText = "BOSS: ENRAGED";
    } else { 
        phase = 3; boss.color = "#f1c40f"; pLabel.innerText = "FINAL PHASE: OVERDRIVE"; bStatus.innerText = "BOSS: FULL POWER!!";
    }

    // プレイヤー制御
    if(keys['ArrowLeft'] || keys['left_btn']) player.vx = -7.5; 
    else if(keys['ArrowRight'] || keys['right_btn']) player.vx = 7.5; 
    else player.vx *= 0.82;
    player.vy += 0.65; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // ボス挙動
    if(boss.active && bossHp > 0) {
        boss.x += (660 - boss.x) * 0.04;
        let moveIntensity = phase === 3 ? 0.08 : 0.04;
        boss.y += (boss.targetY - boss.y) * moveIntensity;
        if(frame % 90 === 0) boss.targetY = Math.random() * 400 + 50;

        // ビーム頻度をさらに減少 (500 -> 700フレーム周期)
        boss.beamTimer += (phase === 3 ? 1.5 : 1.0);
        if(boss.beamTimer > 700) boss.beamTimer = 0;

        // 攻撃ロジック
        if(boss.beamTimer < 200) {
            // 反射弾
            let reflectInterval = phase === 3 ? 60 : 100;
            if(frame % reflectInterval === 0) {
                let count = phase === 1 ? 6 : (phase === 2 ? 8 : 12);
                for(let i=0; i<count; i++) {
                    const a = i * Math.PI * 2 / count;
                    spawnBullet(boss.x + 50, boss.y + 50, Math.cos(a)*4.5, Math.sin(a)*4.5, 'reflect');
                }
            }
            // 通常弾
            if(frame % (phase === 3 ? 20 : 35) === 0) {
                spawnBullet(boss.x, boss.y + 50, -9, (Math.random()-0.5)*8, 'normal');
            }
            // 最終フェーズ限定: ランダム追尾弾
            if (phase === 3 && frame % 15 === 0) {
                const angleToPlayer = Math.atan2(player.y - boss.y, player.x - boss.x);
                spawnBullet(boss.x + 50, boss.y + 50, Math.cos(angleToPlayer) * 5, Math.sin(angleToPlayer) * 5, 'normal', 10, '#f1c40f');
            }
        }

        // ボスビーム判定
        if(boss.beamTimer > 250 && boss.beamTimer < 350) { // ビーム持続時間延長
            if(player.y + player.h > boss.y + 15 && player.y < boss.y + 85 && player.x < boss.x) {
                hp -= 0.5; pBar.style.width = Math.max(0, hp) + "%"; shake = 4;
                if(hp <= 0) location.reload();
            }
        }

        // サイドビーム (Final Phase限定)
        if (phase === 3 && boss.beamTimer > 400 && boss.beamTimer < 550) { // サイドビームのタイミング
            if (frame % 30 === 0) { // 頻度を調整
                // 左からのビーム
                const leftBeamY = Math.random() * (canvas.height - 100) + 50;
                sideBeams.push({x: 0, y: leftBeamY, w: 20, h: 80, activeTime: frame + 60, dir: 'left'});
                // 右からのビーム
                const rightBeamY = Math.random() * (canvas.height - 100) + 50;
                sideBeams.push({x: canvas.width - 20, y: rightBeamY, w: 20, h: 80, activeTime: frame + 60, dir: 'right'});
            }
            // サイドビーム当たり判定
            sideBeams.forEach(sb => {
                if (frame > sb.activeTime) {
                    if (player.x < sb.x + sb.w && player.x + player.w > sb.x &&
                        player.y < sb.y + sb.h && player.y + player.h > sb.y) {
                        hp -= 0.7; pBar.style.width = Math.max(0, hp) + "%"; shake = 3;
                        if(hp <= 0) location.reload();
                    }
                }
            });
            sideBeams = sideBeams.filter(sb => frame < sb.activeTime + 100); // 一定時間で消滅
        } else {
            sideBeams = []; // ビームタイム以外はリセット
        }
    }

    // アイテム処理
    items.forEach((it, i) => {
        it.y += it.vy;
        if(player.x < it.x + it.w && player.x + player.w > it.x && player.y < it.y + it.h && player.y + player.h > it.y) {
            hp = Math.min(100, hp + 30);
            pBar.style.width = hp + "%";
            items.splice(i, 1);
        }
        if(it.y > 600) items.splice(i, 1);
    });

    // 弾丸処理
    bullets.forEach((b, i) => {
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.15; b.y += (boss.y + 50 - b.y) * 0.15;
            if(Math.abs(b.x - (boss.x+50)) < 25 && Math.abs(b.y - (boss.y+50)) < 25) {
                bullets.splice(i, 1); bossHp -= 3.5; shake = 20;
                bBar.style.width = bossHp + "%";
                if(bossHp <= 0) victory();
            }
        } else {
            b.x += b.vx; b.y += b.vy;
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x + 17 - b.x) < 40 && Math.abs(player.y + 35 - b.y) < 30) {
                b.type = 'returned'; player.vy = -13;
            } else if(Math.abs(player.x + 17 - b.x) < 22 && Math.abs(player.y + 17 - b.y) < 22) {
                bullets.splice(i, 1); hp -= 7;
                pBar.style.width = Math.max(0, hp) + "%";
                if(hp <= 0) location.reload();
            }
        }
        if(b.x < -150 || b.x > 950 || b.y < -150 || b.y > 750) bullets.splice(i, 1);
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    if(shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    ctx.fillStyle = "#010105"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 背景: スターフィールド
    ctx.fillStyle = "white";
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

    // 足場
    ctx.fillStyle = "#1e272e"; 
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#485460"; ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // アイテム (リペアキット)
    items.forEach(it => {
        ctx.fillStyle = "#2ecc71"; ctx.beginPath(); ctx.roundRect(it.x, it.y, it.w, it.h, 5); ctx.fill();
        ctx.fillStyle = "white"; ctx.fillRect(it.x + 12, it.y + 6, 6, 18); ctx.fillRect(it.x + 6, it.y + 12, 18, 6);
    });

    // プレイヤー (イントロ中も表示)
    ctx.fillStyle = "#4a90e2"; ctx.shadowBlur = 15; ctx.shadowColor = "#4a90e2";
    ctx.fillRect(player.x, player.y, player.w, player.h); ctx.shadowBlur = 0;

    // ボス演出
    if(boss.active && bossHp > 0) {
        // ビーム予兆
        if(boss.beamTimer > 200 && boss.beamTimer <= 250) {
            ctx.strokeStyle = boss.color; ctx.lineWidth = 3;
            ctx.setLineDash([15, 8]); ctx.strokeRect(0, boss.y + 20, boss.x, 60); ctx.setLineDash([]);
            ctx.shadowBlur = 20; ctx.shadowColor = boss.color;
            ctx.fillStyle = boss.color; ctx.globalAlpha = 0.1 + (boss.beamTimer - 200) * 0.01;
            ctx.fillRect(0, boss.y + 20, boss.x, 60); ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
        // メインビーム発射
        if(boss.beamTimer > 250 && boss.beamTimer < 350) {
            let g = ctx.createLinearGradient(0, boss.y, 0, boss.y + 100);
            g.addColorStop(0, "transparent"); g.addColorStop(0.5, "white"); g.addColorStop(1, "transparent");
            ctx.fillStyle = boss.color; ctx.globalAlpha = 0.5; ctx.fillRect(0, boss.y + 10, boss.x, 80);
            ctx.fillStyle = g; ctx.globalAlpha = 0.9; ctx.fillRect(0, boss.y + 30, boss.x, 40);
            ctx.globalAlpha = 1.0; shake = 10; // 発射時により強くシェイク
        }

        // 第2形態以降のビット演出
        if(phase >= 2) {
            ctx.fillStyle = boss.color;
            let orbit = frame * 0.05;
            for(let i=0; i<2; i++) {
                ctx.fillRect(boss.x + 40 + Math.cos(orbit + i*Math.PI)*120, boss.y + 40 + Math.sin(orbit + i*Math.PI)*120, 20, 20);
            }
        }

        // サイドビーム描画 (Final Phase)
        sideBeams.forEach(sb => {
            if (frame > sb.activeTime) {
                ctx.fillStyle = "#f1c40f"; // 最終形態の色に合わせる
                ctx.globalAlpha = 0.7;
                ctx.fillRect(sb.x, sb.y, sb.w, sb.h);
                ctx.globalAlpha = 1.0;
            } else { // 予兆
                ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]); ctx.strokeRect(sb.x, sb.y, sb.w, sb.h); ctx.setLineDash([]);
            }
        });


        // ボス本体
        ctx.fillStyle = boss.color; ctx.shadowBlur = 20; ctx.shadowColor = boss.color;
        // 点滅エフェクト
        if (boss.beamTimer > 200 && boss.beamTimer <= 250 && frame % 10 < 5) {
             ctx.fillStyle = "white"; // ビームチャージ中に白く点滅
        }
        if (phase === 3 && frame % 8 < 4) { // 最終形態で常時少し点滅
            ctx.fillStyle = "white";
        }

        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = "white"; ctx.fillRect(boss.x + 35, boss.y + 35, 30, 30);
        ctx.shadowBlur = 0;
    }

    // 弾丸描画
    bullets.forEach(b => {
        ctx.fillStyle = b.color || (b.type === 'reflect' ? "#ffeb3b" : (b.type === 'returned' ? "#00d2ff" : "#ff4757"));
        if(b.type === 'reflect') { ctx.shadowBlur = 10; ctx.shadowColor = "#ffeb3b"; }
        if(b.type === 'returned') { ctx.shadowBlur = 10; ctx.shadowColor = "#00d2ff"; }
        if(b.type === 'normal' && b.color === '#f1c40f') { ctx.shadowBlur = 10; ctx.shadowColor = "#f1c40f"; }
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    });
    ctx.restore();
    
    // イントロパートの描画更新は、updateでコントロール
    if (!gameActive && phase === 0) { // イントロ中はプレイヤーハートのみ描画
        ctx.fillStyle = "#ff4757";
        ctx.shadowBlur = 10; ctx.shadowColor = "#ff4757";
        ctx.fillRect(player.x, player.y + 40, 30, 30); // プレイヤーを少し下げる
        ctx.shadowBlur = 0;
    }
}

function victory() {
    gameActive = false;
    document.getElementById('title').innerText = "SYSTEM PURGED";
    document.getElementById('title').style.color = "#f1c40f";
    document.getElementById('msg').innerHTML = "究極の脅威を退けた！宇宙は救われた。<br>クリックで再起動";
    overlay.style.display = 'flex';
}

// ゲーム開始処理
const start = () => { 
    if(!gameActive && phase === 0) { // オーバーレイ表示時のみ
        overlay.style.display='none'; 
        introBox.style.display = 'flex'; // Undertale introを表示
        introBox.style.pointerEvents = 'auto'; // クリック可能に
        setTimeout(() => introBox.style.opacity = 1, 100); // フェードイン
        
        // イントロ中のプレイヤー位置調整 (仮)
        player.x = canvas.width / 2 - player.w / 2;
        player.y = canvas.height - 150; // 画面下部に配置
        
        updateIntroChoices(); // 選択肢初期化
        // イントロパートの間はゲームループを回さない
        // ボスバトル開始時に update() を呼び出す
    } else if(!gameActive) { // ゲームオーバーからのリスタート
        location.reload();
    }
}
overlay.addEventListener('pointerdown', start);

// イントロ選択肢クリックイベント
choiceFight.addEventListener('pointerdown', startBossBattle);
choiceFlee.addEventListener('pointerdown', startBossBattle);

// キーボードイベント
window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if (gameActive && e.code === 'ArrowUp' && player.grounded) player.vy = -14.5; 
    if(!gameActive && phase === 0 && (e.code === 'Enter' || e.code === 'Space')) {
        startBossBattle(); // イントロ選択時
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

// モバイルボタンイベント
const bind = (id, k) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => { e.preventDefault(); if(k) keys[k] = true; else if(gameActive && player.grounded) player.vy = -14.5; });
    el.addEventListener('pointerup', e => { if(k) keys[k] = false; });
    el.addEventListener('pointerleave', e => { if(k) keys[k] = false; });
};
bind('l-btn', 'left_btn'); bind('r-btn', 'right_btn'); bind('j-btn', null);

// 初期描画
draw();
</script>
</body>
</html>
