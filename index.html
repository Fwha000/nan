<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Brave - Platformer Mini Game</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --player-color: #4a90e2;
            --heart-color: #e74c3c;
            --platform-color: #2ecc71;
            --enemy-color: #f39c12;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: manipulation;
        }

        #game-info {
            margin-top: 20px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #333;
            border-radius: 8px;
        }

        canvas {
            background: #0f0f1a;
            display: block;
        }

        .controls-guide {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .mobile-controls { display: flex; }
        }

        .btn {
            padding: 15px 25px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-info">
    <h1>HEART BRAVE</h1>
    <p>Score: <span id="score">0</span> | HP: <span id="hp">3</span></p>
</div>

<div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls-guide">
    移動: ← → / ジャンプ: Space / 攻撃(ハート): Z
</div>

<div class="mobile-controls">
    <button class="btn" id="btn-left">←</button>
    <button class="btn" id="btn-jump">JUMP</button>
    <button class="btn" id="btn-right">→</button>
    <button class="btn" id="btn-shoot" style="background: var(--heart-color);">HEART</button>
</div>
