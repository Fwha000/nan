<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave: Mega Field & Triple Jump</title>
    <style>
        body {
            margin: 0; background: #020205; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #hud { width: 95vw; max-width: 800px; padding: 10px; z-index: 10; }
        .bar-bg { width: 100%; height: 12px; background: #1a1a1a; border-radius: 6px; margin: 4px 0; border: 1px solid #333; }
        #p-hp { width: 100%; height: 100%; background: #ff4757; transition: 0.2s; box-shadow: 0 0 10px #ff4757; }
        #b-hp { width: 100%; height: 100%; background: #1e90ff; transition: 0.4s; box-shadow: 0 0 10px #1e90ff; }
        
        #game-view {
            position: relative; width: 95vw; height: 65vh; max-width: 800px;
            border: 3px solid #444; background: #000; overflow: hidden; border-radius: 15px;
        }
        canvas { display: block; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 450px; padding: 10px; }
        .btn { height: 60px; background: #111; color: #fff; border: 1px solid #555; border-radius: 12px; font-weight: bold; }
        .btn:active { background: #333; border-color: #ff4757; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-size:12px; color:#1e90ff;">BOSS PHASE <span id="p-label">1</span></div>
    <div class="bar-bg"><div id="b-hp"></div></div>
    <div style="font-size:12px; color:#ff4757;">PLAYER HEART</div>
    <div class="bar-bg"><div id="p-hp"></div></div>
</div>

<div id="game-view">
    <div id="overlay">
        <h1 style="color:#ff4757; margin:0;">HEART BRAVE</h1>
        <div style="font-size:0.8rem; color:#ccc; margin:10px; text-align:left; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
            ・ジャンプ長押し：<span style="color:#fff;">ハイジャンプ</span><br>
            ・空中で左右入力：<span style="color:#fff;">空中ダッシュ</span><br>
            ・空中＋下：<span style="color:#fff;">急降下</span><br>
            ・<span style="color:yellow;">黄色の巨大弾</span>を跳ね返して攻撃！
        </div>
        <p>TAP TO START</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">LEFT</button>
    <button class="btn" id="j-btn">JUMP</button>
    <button class="btn" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

// フィールド拡大 (1200 x 600)
const WORLD_W = 1200;
const WORLD_H = 600;
canvas.width = WORLD_W;
canvas.height = WORLD_H;

let gameActive = false, hp = 100, bossHp = 100, frame = 0, cameraX = 0;
const player = { 
    x: 100, y: 500, w: 30, h: 30, vx: 0, vy: 0, 
    grounded: false, canDash: true, dashTimer: 0 
};
const boss = { x: WORLD_W - 200, y: 300, w: 120, h: 120, targetY: 300, beamTimer: 0 };

const platforms = [
    {x: 0, y: 570, w: WORLD_W, h: 30},
    {x: 200, y: 400, w: 200, h: 12}, {x: 500, y: 300, w: 200, h: 12},
    {x: 850, y: 400, w: 200, h: 12}, {x: 100, y: 200, w: 150, h: 12},
    {x: 900, y: 180, w: 200, h: 12}
];

let bullets = [], bones = [], items = [];
const keys = {};

function update() {
    if(!gameActive) return;
    frame++;

    // プレイヤー入力
    let moveSpeed = 5.0;
    if(keys['ArrowLeft'] || keys['l-btn']) {
        player.vx = -moveSpeed;
        if(!player.grounded && player.canDash) { player.vx = -12; player.canDash = false; }
    } else if(keys['ArrowRight'] || keys['r-btn']) {
        player.vx = moveSpeed;
        if(!player.grounded && player.canDash) { player.vx = 12; player.canDash = false; }
    } else {
        player.vx *= 0.85;
    }

    // ハイジャンプ (長押し)
    if((keys['ArrowUp'] || keys['j-btn']) && player.grounded) {
        player.vy = -12;
        player.grounded = false;
    }
    if((keys['ArrowUp'] || keys['j-btn']) && player.vy < 0) {
        player.vy -= 0.2; // 浮力
    }
    
    // 急降下
    if(keys['ArrowDown'] && !player.grounded) {
        player.vy += 2;
    }

    player.vy += 0.55; // 重力
    player.x += player.vx;
    player.y += player.vy;

    // 当たり判定
    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true; player.canDash = true;
        }
    });
    player.x = Math.max(0, Math.min(WORLD_W - player.w, player.x));

    // カメラ追従
    cameraX = player.x - 400;
    cameraX = Math.max(0, Math.min(WORLD_W - 800, cameraX));

    // ボス挙動
    if(bossHp > 0) {
        boss.y += (boss.targetY - boss.y) * 0.05;
        if(frame % 100 === 0) boss.targetY = Math.random() * 400 + 50;

        boss.beamTimer++;
        if(boss.beamTimer > 350) boss.beamTimer = 0;

        // 攻撃：巨大リフレクト弾
        if(frame % 150 === 0) {
            bullets.push({ x: boss.x, y: boss.y + 50, vx: -5, vy: (Math.random()-0.5)*4, type: 'reflect', size: 25 });
        }
        // 通常弾幕
        if(frame % 40 === 0) {
            bullets.push({ x: boss.x, y: boss.y + 50, vx: -8, vy: (Math.random()-0.5)*10, type: 'normal', size: 10 });
        }
        
        // ビーム
        if(boss.beamTimer > 250 && boss.beamTimer < 320) {
            if(player.y + player.h > boss.y + 20 && player.y < boss.y + 100 && player.x < boss.x) {
                hp -= 0.5;
            }
        }
    }

    // 骨のトラップ（前半風）
    if(frame % 80 === 0 && bossHp > 50) {
        bones.push({ x: player.x + 300, y: 600, w: 40, h: 200, targetY: 450, timer: 60 });
    }
    bones.forEach((b, i) => {
        b.timer--;
        if(b.timer < 0) b.y += (b.targetY - b.y) * 0.1;
        if(player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) hp -= 1;
        if(b.x < cameraX - 100) bones.splice(i, 1);
    });

    // 弾丸処理
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.type === 'returned') {
            b.x += (boss.x + 60 - b.x) * 0.1; b.y += (boss.y + 60 - b.y) * 0.1;
            if(Math.abs(b.x - boss.x - 60) < 50 && Math.abs(b.y - boss.y - 60) < 50) {
                bullets.splice(i, 1); bossHp -= 10;
            }
        } else {
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x - b.x) < 50 && Math.abs(player.y + 30 - b.y) < 40) {
                b.type = 'returned'; player.vy = -12;
            } else if(Math.abs(player.x - b.x) < 25 && Math.abs(player.y - b.y) < 25) {
                bullets.splice(i, 1); hp -= 10;
            }
        }
        if(b.x < -100 || b.x > WORLD_W + 100) bullets.splice(i, 1);
    });

    // アイテム
    if(frame % 500 === 0) items.push({ x: player.x + 400, y: 0, vy: 3 });
    items.forEach((it, i) => {
        it.y += it.vy;
        if(Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 40) {
            hp = Math.min(100, hp + 30); items.splice(i, 1);
        }
    });

    // UI
    document.getElementById('p-hp').style.width = hp + "%";
    document.getElementById('b-hp').style.width = bossHp + "%";
    document.getElementById('p-label').innerText = bossHp > 50 ? "1" : "FINAL";

    if(hp <= 0) location.reload();
    if(bossHp <= 0) { alert("VICTORY!"); location.reload(); }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, WORLD_W, WORLD_H);
    ctx.save();
    ctx.translate(-cameraX, 0);

    // 背景グリッド
    ctx.strokeStyle = "#111";
    for(let i=0; i<WORLD_W; i+=100) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_H); ctx.stroke(); }

    // 足場
    ctx.fillStyle = "#333";
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // プレイヤー
    ctx.fillStyle = "#ff4757"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff4757";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    
    // ボス
    if(bossHp > 0) {
        ctx.fillStyle = "#1e90ff"; ctx.shadowColor = "#1e90ff";
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        if(boss.beamTimer > 250 && boss.beamTimer < 320) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            ctx.fillRect(cameraX, boss.y + 20, boss.x - cameraX, 80);
        }
    }

    // トラップ
    ctx.fillStyle = "#eee"; ctx.shadowColor = "#fff";
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // 弾
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "yellow" : (b.type === 'returned' ? "#00ffff" : "#ff4757");
        ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });

    // 回復
    ctx.fillStyle = "#2ed573"; ctx.font = "bold 30px Arial";
    items.forEach(it => ctx.fillText("✚", it.x, it.y));

    ctx.restore();
}

function start() {
    if(!gameActive) {
        overlay.style.display = 'none';
        gameActive = true;
        update();
    }
}

overlay.addEventListener('pointerdown', start);
window.addEventListener('keydown', e => { keys[e.code] = true; start(); });
window.addEventListener('keyup', e => keys[e.code] = false);

const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[id] = true; start(); });
    el.addEventListener('pointerup', () => keys[id] = false);
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);

ctx.fillStyle = "#fff"; ctx.fillText("Ready?", 380, 300);
</script>
</body>
</html>
