<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave - Undertale Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: white;
            font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container {
            position: relative; width: 95vw; height: 70vh; max-width: 800px;
            border: 4px solid #fff; margin-top: 10px; background: #000; overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 800px; padding: 5px; font-weight: bold; }
        .bar { width: 100%; height: 12px; background: #333; border: 2px solid #fff; margin: 4px 0; }
        #p-hp { width: 100%; height: 100%; background: #ff0000; transition: 0.2s; }
        #b-hp { width: 100%; height: 100%; background: #ffff00; transition: 0.3s; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .instr { font-size: 0.9rem; color: #ccc; margin: 10px; text-align: left; border: 1px solid #555; padding: 10px; }
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 450px; padding: 10px; }
        .ctrl { height: 60px; background: #000; color: #fff; border: 2px solid #fff; font-weight: bold; font-size: 1.2rem; }
        .ctrl:active { background: #fff; color: #000; }
    </style>
</head>
<body>

<div id="hud">
    BOSS: <span id="p-label">WAITING...</span> <div class="bar"><div id="b-hp"></div></div>
    PLAYER: HP <div class="bar"><div id="p-hp"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h1 style="color:#ff0000; letter-spacing: 5px;">HEART BRAVE</h1>
        <div class="instr">
            【ルール】<br>
            ・矢印キー（↑←→）で移動・ジャンプ<br>
            ・<span style="color:yellow;">黄色の弾</span>を踏むと反射ダメージ！<br>
            ・<span style="color:#0f0;">緑の✚</span>でHP回復<br>
            ・警告ラインが出たらビームに注意！
        </div>
        <p>画面をタップしてエンカウント</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="btn-row">
    <button class="ctrl" id="l-btn">LEFT</button>
    <button class="ctrl" id="j-btn">UP</button>
    <button class="ctrl" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const bBar = document.getElementById('b-hp');
const pBar = document.getElementById('p-hp');
const pLabel = document.getElementById('p-label');

canvas.width = 800; canvas.height = 600;

let gameActive = false, introMode = false;
let hp = 100, bossHp = 100, frame = 0, shake = 0, phase = 1;
const player = { x: 380, y: 500, w: 30, h: 30, vx: 0, vy: 0, grounded: false };
const boss = { x: 900, y: 200, w: 100, h: 100, targetY: 200, beamTimer: 0 };
const platforms = [
    {x: 0, y: 570, w: 800, h: 30},
    {x: 100, y: 420, w: 200, h: 10}, {x: 500, y: 420, w: 200, h: 10},
    {x: 300, y: 280, w: 200, h: 10}, {x: 100, y: 150, w: 600, h: 10}
];
let bullets = [], items = [], sideBeams = [];
const keys = {};

function spawnBullet(x, y, vx, vy, type) {
    bullets.push({ x, y, vx, vy, type, size: type === 'reflect' ? 14 : 8 });
}

function initIntro() {
    overlay.style.display = 'none';
    introMode = true;
    player.x = 385; player.y = 450;
    // Undertale風のセリフ表示などはここでは簡略化し、即座に戦闘へ
    setTimeout(() => {
        introMode = false;
        gameActive = true;
        pLabel.innerText = "PHASE 1";
        spawnItem();
        loop();
    }, 1000);
}

function spawnItem() {
    if(!gameActive) return;
    items.push({ x: Math.random()*700+50, y: -30, vy: 2 });
    setTimeout(spawnItem, 10000);
}

function loop() {
    if(!gameActive) return;
    frame++;
    if(shake > 0) shake--;

    // フェーズ管理
    if(bossHp < 35) phase = 3;
    else if(bossHp < 70) phase = 2;
    pLabel.innerText = "PHASE " + phase + (phase === 3 ? " : OVERDRIVE" : "");

    // プレイヤー物理
    if(keys['ArrowLeft'] || keys['l-btn']) player.vx = -7;
    else if(keys['ArrowRight'] || keys['r-btn']) player.vx = 7;
    else player.vx *= 0.8;
    player.vy += 0.6; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // ボスAI
    boss.x += (650 - boss.x) * 0.05;
    boss.y += (boss.targetY - boss.y) * 0.05;
    if(frame % 100 === 0) boss.targetY = Math.random() * 300 + 50;

    // 攻撃パターン
    boss.beamTimer++;
    let beamCycle = phase === 3 ? 300 : 450;
    if(boss.beamTimer > beamCycle) boss.beamTimer = 0;

    if(boss.beamTimer < 150) {
        if(frame % (phase === 3 ? 60 : 100) === 0) {
            for(let i=0; i<8; i++) {
                let a = i * Math.PI / 4;
                spawnBullet(boss.x + 50, boss.y + 50, Math.cos(a)*5, Math.sin(a)*5, 'reflect');
            }
        }
        if(frame % 30 === 0) spawnBullet(boss.x, boss.y + 50, -8, (Math.random()-0.5)*10, 'normal');
    }

    // メインビーム判定
    if(boss.beamTimer > 180 && boss.beamTimer < 250) {
        if(player.y + player.h > boss.y + 20 && player.y < boss.y + 80 && player.x < boss.x) {
            hp -= 0.5; shake = 5;
        }
    }

    // 最終フェーズ：サイドビーム
    if(phase === 3 && frame % 120 === 0) {
        sideBeams.push({ y: player.y, timer: 60 });
    }
    sideBeams.forEach((b, i) => {
        b.timer--;
        if(b.timer < 0 && b.timer > -30) {
            if(player.y + player.h > b.y && player.y < b.y + 40) hp -= 0.8;
        }
        if(b.timer <= -30) sideBeams.splice(i, 1);
    });

    // 弾丸とアイテムの更新
    bullets.forEach((b, i) => {
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.1; b.y += (boss.y + 50 - b.y) * 0.1;
            if(Math.abs(b.x-(boss.x+50)) < 30 && Math.abs(b.y-(boss.y+50)) < 30) {
                bullets.splice(i, 1); bossHp -= 5; shake = 15;
            }
        } else {
            b.x += b.vx; b.y += b.vy;
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x+15-b.x) < 30 && Math.abs(player.y+30-b.y) < 20) {
                b.type = 'returned'; player.vy = -12;
            } else if(Math.abs(player.x+15-b.x) < 20 && Math.abs(player.y+15-b.y) < 20) {
                bullets.splice(i, 1); hp -= 5;
            }
        }
        if(b.x < -100 || b.x > 900) bullets.splice(i, 1);
    });

    items.forEach((it, i) => {
        it.y += it.vy;
        if(Math.abs(player.x - it.x) < 30 && Math.abs(player.y - it.y) < 30) {
            hp = Math.min(100, hp + 20); items.splice(i, 1);
        }
    });

    // UI更新
    pBar.style.width = hp + "%";
    bBar.style.width = bossHp + "%";
    if(hp <= 0) location.reload();
    if(bossHp <= 0) { gameActive = false; alert("VICTORY!"); location.reload(); }

    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if(shake > 0) ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);

    // 足場
    ctx.fillStyle = "#fff";
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // プレイヤー（ハート）
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // ボス
    if(bossHp > 0) {
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
        ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = (frame % 10 < 5 && boss.beamTimer > 150) ? "#ff0" : "#fff";
        ctx.fillRect(boss.x + 20, boss.y + 20, 20, 20);
        ctx.fillRect(boss.x + 60, boss.y + 20, 20, 20);
        
        // メインビーム
        if(boss.beamTimer > 180 && boss.beamTimer < 250) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.fillRect(0, boss.y + 20, boss.x, 60);
        }
    }

    // サイドビーム警告と発射
    sideBeams.forEach(b => {
        if(b.timer > 0) {
            ctx.strokeStyle = "red"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, b.y + 20); ctx.lineTo(800, b.y + 20); ctx.stroke();
        } else {
            ctx.fillStyle = "white"; ctx.fillRect(0, b.y, 800, 40);
        }
    });

    // 弾丸
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "yellow" : (b.type === 'returned' ? "cyan" : "red");
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });

    // アイテム
    items.forEach(it => {
        ctx.fillStyle = "#0f0"; ctx.font = "20px Arial"; ctx.fillText("✚", it.x, it.y);
    });

    ctx.restore();
}

// 初期描画（イントロ前）
function drawIntro() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff"; ctx.font = "20px 'Courier New'";
    ctx.fillText("* ボスが あらわれた！", 100, 400);
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(player.x, player.y, 30, 30);
    if(introMode) requestAnimationFrame(drawIntro);
}

// 操作
const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', () => keys[id] = true);
    el.addEventListener('pointerup', () => keys[id] = false);
    el.addEventListener('pointerleave', () => keys[id] = false);
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'ArrowUp' && player.grounded) player.vy = -14;
    if(!gameActive && !introMode) initIntro();
});
window.addEventListener('keyup', e => keys[e.code] = false);
canvas.addEventListener('pointerdown', () => { if(!gameActive && !introMode) initIntro(); });

ctx.fillStyle = "#fff"; ctx.fillText("Press Any Key", 350, 300);
</script>
</body>
</html>
