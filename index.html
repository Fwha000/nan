<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAD TIME SIMULATOR - RETRY FIXED</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 5px solid #fff; margin-top: 50px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: flex-start; align-items: center; font-weight: bold; }
        #hp-container { display: flex; align-items: center; margin-left: 20px; }
        #hp-bar { width: 100px; height: 20px; background: #f00; margin: 0 10px; border: 2px solid #fff; }
        #hp-inner { width: 100%; height: 100%; background: #ff0; }
        
        /* メッセージ・リトライ画面のオーバーレイ */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn-retry { margin-top: 20px; padding: 10px 30px; font-size: 20px; border: 3px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; }
        .btn-retry:hover { background: #fff; color: #000; }

        .btn-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; width: 600px; }
        .btn-control { height: 60px; border: 2px solid #fff; background: #000; color: #fff; font-size: 18px; cursor: pointer; touch-action: none; }
        .btn-control:active { background: #fff; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <span>PLAYER LV 19</span>
    <div id="hp-container">
        HP <div id="hp-bar"><div id="hp-inner"></div></div> 92 / 92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1 style="font-size: 24px;">* heya. ready?</h1>
        <button class="btn-retry" onclick="resetGame()">START</button>
    </div>

    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00; font-size: 24px;">* geeeeettttttt<br>dunked on!!!</h1>
        <button class="btn-retry" onclick="resetGame()">RETRY</button>
    </div>

    <canvas id="c"></canvas>
</div>

<div class="btn-container">
    <button class="btn-control" id="l">LEFT</button>
    <button class="btn-control" id="j">JUMP</button>
    <button class="btn-control" id="r">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let player, hp, bones, blasters, frame, active, keys;

// ゲームの状態を初期化する関数
function resetGame() {
    player = { x: 290, y: 300, w: 20, h: 20, vx: 0, vy: 0, grounded: false };
    hp = 92;
    bones = [];
    blasters = [];
    frame = 0;
    keys = {};
    active = true;

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    
    // ループが二重に回らないように一度リセット
    if (window.gameLoop) cancelAnimationFrame(window.gameLoop);
    loop();
}

function createBone(x, y, w, h, vx, vy, life) {
    bones.push({ x, y, w, h, vx, vy, life });
}

function createBlaster(tx, ty) {
    blasters.push({ x: Math.random()*600, y: -50, tx, ty, timer: 40, beamLife: 0 });
}

function loop() {
    if (!active) return;
    update();
    draw();
    window.gameLoop = requestAnimationFrame(loop);
}

function update() {
    frame++;

    // 入力処理
    if (keys['l']) player.vx = -6;
    else if (keys['r']) player.vx = 6;
    else player.vx *= 0.8;

    if (keys['j'] && player.grounded) {
        player.vy = -13;
        player.grounded = false;
    }

    player.vy += 0.7; // 重力
    player.x += player.vx;
    player.y += player.vy;

    // 床と壁の判定
    if (player.y > 380 - player.h) {
        player.y = 380 - player.h;
        player.vy = 0;
        player.grounded = true;
    }
    player.x = Math.max(0, Math.min(600 - player.w, player.x));

    // --- 攻撃パターン（以前より当たりやすく調整） ---
    if (frame === 10) {
        // 開幕の巨大骨（中央の隙間を狭く）
        for(let i=0; i<600; i+=70) {
            if(i > 260 && i < 320) continue; 
            createBone(i, 400, 55, 320, 0, -18, 60);
        }
    }

    if (frame > 80 && frame % 60 === 0) {
        // 横から高速で飛んでくる骨
        let side = Math.random() > 0.5 ? -50 : 650;
        createBone(side, 330, 25, 50, side < 0 ? 9 : -9, 0, 100);
    }

    if (frame > 120 && frame % 120 === 0) {
        createBlaster(player.x, player.y);
    }

    // 衝突判定
    bones.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        b.life--;
        if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
            hp -= 1.5; 
        }
        if (b.life <= 0) bones.splice(i, 1);
    });

    blasters.forEach((b, i) => {
        if (b.timer > 0) {
            b.x += (b.tx - b.x) * 0.15;
            b.y += (b.ty - 120 - b.y) * 0.15;
            b.timer--;
            if (b.timer === 0) b.beamLife = 25;
        } else {
            b.beamLife--;
            if (Math.abs(player.x - b.x) < 45 && b.beamLife > 0) hp -= 3;
            if (b.beamLife <= 0) blasters.splice(i, 1);
        }
    });

    // HP更新とゲームオーバー
    document.getElementById('hp-inner').style.width = Math.max(0, (hp / 92 * 100)) + "%";
    if (hp <= 0 && active) {
        active = false;
        document.getElementById('death-screen').style.display = 'flex';
    }
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 600, 400);

    // 床
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 380, 600, 20);

    // 骨
    ctx.fillStyle = '#fff';
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // ブラスター
    blasters.forEach(b => {
        ctx.fillStyle = b.timer < 10 && b.timer % 2 === 0 ? '#f00' : '#fff';
        ctx.fillRect(b.x - 25, b.y - 25, 50, 50); // 頭
        if (b.beamLife > 0) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(b.x - 35, b.y, 70, 400);
            ctx.fillStyle = '#0ff';
            ctx.fillRect(b.x - 15, b.y, 30, 400);
        }
    });

    // ハート
    ctx.fillStyle = '#f00';
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

// 操作
const setupBtn = (id) => {
    const btn = document.getElementById(id);
    btn.onpointerdown = (e) => { e.preventDefault(); keys[id] = true; };
    btn.onpointerup = (e) => { e.preventDefault(); keys[id] = false; };
};
['l', 'r', 'j'].forEach(setupBtn);

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') keys['l'] = true;
    if (e.key === 'ArrowRight') keys['r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = true;
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') keys['l'] = false;
    if (e.key === 'ArrowRight') keys['r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = false;
};
</script>
</body>
</html>
