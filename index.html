<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE SANS BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        
        /* ゲーム画面本体 */
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; margin-top: 30px; background: #000; overflow: hidden; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        canvas { width: 100%; height: 100%; display: block; }

        /* UIエリア */
        #ui { width: 600px; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 20px; }
        #hp-bar-bg { width: 120px; height: 22px; background: #f00; border: 2px solid #fff; position: relative; margin: 0 10px; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; transition: width 0.2s ease-out; }
        
        /* セリフ吹き出し */
        #dialogue { position: absolute; top: 40px; right: 40px; background: #fff; color: #000; padding: 10px 15px; border-radius: 15px; width: 200px; font-size: 16px; display: none; z-index: 10; border: 3px solid #000; }
        #dialogue::after { content: ''; position: absolute; left: -15px; top: 20px; border-style: solid; border-width: 10px 15px 10px 0; border-color: transparent #fff transparent transparent; }

        /* オーバーレイ */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn-start { padding: 12px 40px; font-size: 24px; border: 3px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .btn-start:hover { background: #fff; color: #000; }

        /* モバイルコントローラー */
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; width: 600px; max-width: 95vw; }
        .btn-ctrl { height: 80px; border: 3px solid #fff; background: #111; color: #fff; font-size: 24px; border-radius: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-ctrl:active { background: #444; transform: scale(0.95); }
    </style>
</head>
<body>

<div id="ui">
    <div>PLAYER LV 19</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-current">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="dialogue">...</div>
    
    <div id="start-screen" class="overlay">
        <h1 style="letter-spacing: 5px;">JUDGEMENT</h1>
        <p>* 地獄で燃えてしまえばいい</p>
        <button class="btn-start" onclick="startGame()">START</button>
    </div>

    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00;">GAME OVER</h1>
        <p id="death-msg">* あきらめてはいけない...</p>
        <button class="btn-start" onclick="startGame()">RETRY</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn-ctrl" id="btn-l">←</button>
    <button class="btn-ctrl" id="btn-j">JUMP</button>
    <button class="btn-ctrl" id="btn-r">→</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

// 設定値
let player, hp, bones, blasters, warnings, frame, active, keys, stage, shake;
const MAX_HP = 92;

// セリフデータ
const quotes = [
    { f: 1, text: "いくよ。" },
    { f: 500, text: "まだやるかい？" },
    { f: 1200, text: "ここからは青の攻撃だ。" },
    { f: 2000, text: "本気を出させないでくれ。" },
    { f: 3000, text: "ハハ、つかれたよ。" }
];

function startGame() {
    player = { x: 290, y: 300, w: 20, h: 20, vx: 0, vy: 0, grounded: false, color: '#f00' };
    hp = MAX_HP;
    bones = []; blasters = []; warnings = [];
    frame = 0; stage = 1; keys = {}; shake = 0;
    active = true;

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    document.getElementById('dialogue').style.display = 'none';
    
    if (window.gID) cancelAnimationFrame(window.gID);
    updateLoop();
}

function updateLoop() {
    if (!active) return;
    
    frame++;
    if (shake > 0) shake *= 0.85;

    // 1. 移動ロジック
    if (keys['btn-l']) player.vx = -6.5;
    else if (keys['btn-r']) player.vx = 6.5;
    else player.vx *= 0.8;

    if (keys['btn-j'] && player.grounded) {
        player.vy = -14.5;
        player.grounded = false;
    }

    player.vy += 0.85; // 重力
    player.x += player.vx;
    player.y += player.vy;

    // 接地・壁
    if (player.y > 380 - player.h) {
        player.y = 380 - player.h;
        player.vy = 0;
        player.grounded = true;
    }
    player.x = Math.max(0, Math.min(600 - player.w, player.x));

    // 2. セリフ演出
    const quote = quotes.find(q => q.f === frame);
    if (quote) {
        const diag = document.getElementById('dialogue');
        diag.innerText = quote.text;
        diag.style.display = 'block';
        setTimeout(() => diag.style.display = 'none', 2000);
    }

    // 3. 攻撃ステージ管理
    if (frame < 1200) phase1();
    else if (frame < 2500) phase2();
    else phase3();

    // 4. 当たり判定・更新
    updateEntities();

    // 5. 描画
    draw();

    window.gID = requestAnimationFrame(updateLoop);
}

// --- フェーズごとの攻撃 ---
function phase1() {
    if (frame % 140 === 0) {
        const gap = 100 + Math.random() * 300;
        addWarning(0, gap - 20, 50);
        addWarning(gap + 80, 600, 50);
        setTimeout(() => spawnBone(0, 400, gap - 20, 320, 0, -18, 45), 800);
    }
}

function phase2() {
    if (frame % 180 === 0) {
        spawnBlaster(player.x, 60);
    }
    if (frame % 60 === 0) {
        const isLeft = Math.random() > 0.5;
        spawnBone(isLeft ? -40 : 640, 340, 30, 40, isLeft ? 8 : -8, 0, 100, '#0af'); // 青骨
    }
}

function phase3() {
    if (frame % 100 === 0) spawnBlaster(player.x, 40);
    if (frame % 40 === 0) {
        const rx = Math.random() * 550;
        addWarning(rx, 50, 30);
        setTimeout(() => spawnBone(rx, 400, 50, 280, 0, -22, 35), 500);
    }
}

// --- エンティティ管理 ---
function addWarning(x, w, t) { warnings.push({ x, w, t, mt: t }); }

function spawnBone(x, y, w, h, vx, vy, life, color = '#fff') {
    bones.push({ x, y, w, h, vx, vy, life, color });
    if (vy < 0) shake = 8;
}

function spawnBlaster(tx, timer) {
    blasters.push({ x: tx, y: -80, tx, ty: 60, timer, beam: 0 });
}

function updateEntities() {
    warnings.forEach((w, i) => { w.t--; if (w.t <= 0) warnings.splice(i, 1); });

    bones.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy; b.life--;
        // 当たり判定 (少し小さめ)
        if (player.x + 5 < b.x + b.w && player.x + player.w - 5 > b.x && 
            player.y + 5 < b.y + b.h && player.y + player.h - 5 > b.y) {
            takeDamage(b.color === '#0af' && player.vx === 0 ? 0 : 1.2);
        }
        if (b.life <= 0) bones.splice(i, 1);
    });

    blasters.forEach((b, i) => {
        if (b.timer > 0) {
            b.y += (b.ty - b.y) * 0.15; b.timer--;
            if (b.timer === 0) { b.beam = 20; shake = 15; }
        } else {
            b.beam--;
            if (Math.abs(player.x + 10 - b.x) < 45 && b.beam > 0) takeDamage(3);
            if (b.beam <= 0) blasters.splice(i, 1);
        }
    });
}

function takeDamage(amt) {
    if (amt <= 0) return;
    hp -= amt;
    shake = 12;
    if (hp <= 0) endGame();
}

function endGame() {
    active = false;
    document.getElementById('death-screen').style.display = 'flex';
}

function draw() {
    ctx.save();
    if (shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

    // 背景
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 600, 400);
    
    // サンズの影（演出）
    ctx.fillStyle = '#fff';
    ctx.fillRect(285, 40, 30, 40); // 簡易サンズ体

    // 警告ゾーン
    warnings.forEach(w => {
        const alpha = Math.abs(Math.sin(frame * 0.15)) * 0.4;
        ctx.fillStyle = `rgba(255, 0, 0, ${alpha})`;
        ctx.fillRect(w.x, 0, w.w, 380);
    });

    // 骨
    bones.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeStyle = '#000';
        ctx.strokeRect(b.x, b.y, b.w, b.h);
    });

    // ブラスター
    blasters.forEach(b => {
        // 本体
        ctx.fillStyle = '#fff';
        ctx.fillRect(b.x - 30, b.y - 30, 60, 60);
        ctx.fillStyle = b.timer < 10 && b.timer % 2 === 0 ? '#0ff' : '#000';
        ctx.fillRect(b.x - 20, b.y - 15, 12, 12); ctx.fillRect(b.x + 8, b.y - 15, 12, 12);
        
        if (b.beam > 0) {
            const grad = ctx.createLinearGradient(b.x - 50, 0, b.x + 50, 0);
            grad.addColorStop(0, 'rgba(255,255,255,0)');
            grad.addColorStop(0.5, '#fff');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(b.x - 50, b.y + 30, 100, 400);
            ctx.fillStyle = '#0ff';
            ctx.fillRect(b.x - 15, b.y + 30, 30, 400);
        }
    });

    // 床
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20);

    // ハート
    ctx.fillStyle = '#f00'; ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.restore();

    // UI更新
    const dHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-bar-fill').style.width = (dHp / MAX_HP * 100) + "%";
    document.getElementById('hp-current').innerText = dHp;
}

// コントローラー
const bind = (id) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); keys[id] = true; };
    const end = (e) => { e.preventDefault(); keys[id] = false; };
    el.addEventListener('pointerdown', start);
    el.addEventListener('pointerup', end);
    el.addEventListener('pointerleave', end);
};
['btn-l', 'btn-r', 'btn-j'].forEach(bind);

// キーボード
window.onkeydown = e => {
    if (e.key === 'ArrowLeft') keys['btn-l'] = true;
    if (e.key === 'ArrowRight') keys['btn-r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['btn-j'] = true;
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') keys['btn-l'] = false;
    if (e.key === 'ArrowRight') keys['btn-r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['btn-j'] = false;
};
</script>
</body>
</html>
