<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave: Undertale Respect</title>
    <style>
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'Consolas', monospace; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container {
            position: relative; width: 98vw; height: 70vh; max-width: 1000px;
            border: 4px solid #fff; margin-top: 10px; background: #000;
            overflow: hidden; border-radius: 5px;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 1000px; padding: 10px; }
        .bar-bg { width: 100%; height: 16px; background: #333; border: 2px solid #fff; margin: 5px 0; }
        #p-hp { width: 100%; height: 100%; background: #ff0000; transition: 0.1s; }
        #b-hp { width: 100%; height: 100%; background: #ffff00; transition: 0.3s; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 450px; padding: 10px; }
        .btn { height: 60px; background: #000; color: #fff; border: 2px solid #fff; font-size: 1.2rem; font-weight: bold; }
        .btn:active { background: #fff; color: #000; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 1s infinite; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-size:16px; font-weight:bold;">
        <span id="stage-text">STAGE 1: SURVIVAL</span>
        <span>LV 19</span>
    </div>
    <div class="bar-bg"><div id="b-hp"></div></div>
    <div style="font-size:12px; color:#ff0000;">HP</div>
    <div class="bar-bg"><div id="p-hp"></div></div>
</div>

<div id="game-container">
    <div id="overlay" onclick="start()">
        <div id="start-screen">
            <h1 style="font-size: 3rem; margin: 0; color:#fff;">HEART BRAVE</h1>
            <p style="color:#aaa;">- Undertale Edition -</p>
            <div style="text-align:left; border:2px solid #fff; padding:15px; margin:20px 0; font-size: 0.9rem; line-height: 1.6;">
                <span style="color:#ffa500;">■ ORANGE BONE:</span> MOVE to survive!<br>
                <span style="color:#00ffff;">■ BLUE BONE:</span> DON'T MOVE to survive!<br>
                <span style="color:#ffff00;">■ YELLOW BALL:</span> PARRY (Jump on it)!
            </div>
            <p class="blink">TAP TO START</p>
        </div>
        <div id="result-screen" style="display:none;">
            <h1 id="result-title">RESULT</h1>
            <p id="result-stats"></p>
            <p class="blink">TAP TO RETRY</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">LEFT</button>
    <button class="btn" id="j-btn">UP</button>
    <button class="btn" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 1200, H = 600;
canvas.width = W; canvas.height = H;

let gameActive = false, hp = 100, bossHp = 100, frame = 0, stage = 1, startTime = 0;
let s1_subPhase = 0; // 0: 下, 1: 四方, 2: 色付き
const player = { x: 600, y: 500, w: 26, h: 26, vx: 0, vy: 0, grounded: false, moving: false };
const boss = { x: 1050, y: 250, w: 100, h: 100, targetY: 250 };
let bullets = [], bones = [], items = [];
const keys = {};
const floor = {x: 0, y: 570, w: W, h: 30};
let activePlatforms = [floor];

function update() {
    if(!gameActive) return;
    frame++;

    // プレイヤー入力・状態確認
    player.moving = false;
    if(keys['ArrowLeft'] || keys['l-btn']) { player.vx = -8; player.moving = true; }
    else if(keys['ArrowRight'] || keys['r-btn']) { player.vx = 8; player.moving = true; }
    else player.vx *= 0.8;

    if((keys['ArrowUp'] || keys['j-btn']) && player.grounded) { player.vy = -14; player.grounded = false; player.moving = true; }
    if((keys['ArrowUp'] || keys['j-btn']) && player.vy < 0) player.vy -= 0.35;
    if(keys['ArrowDown'] && !player.grounded) { player.vy += 3; player.moving = true; }

    player.vy += 0.7; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    activePlatforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    // ステージ進行
    if(stage === 1) {
        bossHp -= 0.05;
        if(frame % 240 === 0) s1_subPhase = (s1_subPhase + 1) % 3;
        if(bossHp <= 50) { 
            stage = 2; bossHp = 50; bones = [];
            // 足場出現（見やすくネオンブルーで描画するためフラグを管理）
            activePlatforms.push(
                {x: 150, y: 420, w: 200, h: 12, isSpecial: true}, 
                {x: 500, y: 350, w: 200, h: 12, isSpecial: true}, 
                {x: 850, y: 420, w: 200, h: 12, isSpecial: true}, 
                {x: 350, y: 200, w: 500, h: 12, isSpecial: true}
            );
        }

        if(s1_subPhase === 0) { // パターンA: 下から（すぐ消える）
            if(frame % 35 === 0) bones.push({ x: Math.random()*(W-100), y: 600, w: 35, h: 250, targetY: 400, vx: 0, vy: 0, timer: 40, type: 'normal', life: 80 });
        } else if(s1_subPhase === 1) { // パターンB: 四方
            if(frame % 25 === 0) {
                const side = Math.floor(Math.random() * 4);
                let bx = side===2?-50:side===3?W+50:Math.random()*W;
                let by = side===0?-50:side===1?H+50:Math.random()*H;
                const angle = Math.atan2((player.y+13)-by, (player.x+13)-bx);
                bones.push({ x: bx, y: by, w: 25, h: 25, vx: Math.cos(angle)*9, vy: Math.sin(angle)*9, type: 'normal', life: 200 });
            }
        } else { // パターンC: オレンジと水色
            if(frame % 40 === 0) {
                const isBlue = Math.random() > 0.5;
                bones.push({ x: W, y: 530, w: 30, h: 40, vx: -10, vy: 0, type: isBlue ? 'blue' : 'orange', life: 200 });
            }
        }
    } else {
        // ステージ2: ボス
        const intensity = bossHp > 30 ? 1 : 1.8;
        boss.y += (boss.targetY - boss.y) * 0.05;
        if(frame % 80 === 0) boss.targetY = Math.random() * 350 + 50;
        if(frame % Math.floor(120/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -6 * intensity, vy: (Math.random()-0.5)*5, type: 'reflect', size: 35 });
        if(frame % Math.floor(35/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -13 * intensity, vy: (Math.random()-0.5)*10, type: 'normal', size: 10 });
    }

    // オブジェクト処理
    bones.forEach((b, i) => {
        if(b.vx === 0 && b.vy === 0) { // 下から
            b.timer--;
            if(b.timer < 0) b.y += (b.targetY - b.y) * 0.2;
            if(b.timer < -30) b.y += 15; // すぐ沈む
        } else { b.x += b.vx; b.y += b.vy; }
        
        // 当たり判定
        if(player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
            if(b.type === 'normal') hp -= 2.5;
            else if(b.type === 'blue' && player.moving) hp -= 3;
            else if(b.type === 'orange' && !player.moving) hp -= 3;
        }
        b.life--;
        if(b.life <= 0 || b.y > 650) bones.splice(i, 1);
    });

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.2; b.y += (boss.y + 50 - b.y) * 0.2;
            if(Math.abs(b.x - (boss.x + 50)) < 50) { bullets.splice(i, 1); bossHp -= 10; }
        } else {
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x - b.x) < 65 && Math.abs(player.y + 26 - b.y) < 55) { b.type = 'returned'; player.vy = -15; }
            else if(Math.abs(player.x + 13 - b.x) < 22 && Math.abs(player.y + 13 - b.y) < 22) { bullets.splice(i, 1); hp -= 15; }
        }
        if(b.x < -100 || b.x > W + 100) bullets.splice(i, 1);
    });

    if(hp <= 0) showResult(false);
    if(bossHp <= 0) showResult(true);
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);

    // 足場の描画
    activePlatforms.forEach(p => {
        if(p.isSpecial) {
            // ネオンブルーの足場（後半用）
            ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
            ctx.fillStyle = "#00ffff";
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
            ctx.strokeRect(p.x, p.y, p.w, p.h);
        } else {
            ctx.fillStyle = "#fff"; ctx.fillRect(p.x, p.y, p.w, p.h);
        }
    });

    // プレイヤー（ハート型を簡易描画）
    ctx.fillStyle = "#f00"; ctx.shadowBlur = 10; ctx.shadowColor = "#f00";
    ctx.beginPath();
    ctx.arc(player.x+7, player.y+7, 7, 0, Math.PI*2);
    ctx.arc(player.x+19, player.y+7, 7, 0, Math.PI*2);
    ctx.fillRect(player.x, player.y+7, 26, 12);
    ctx.moveTo(player.x, player.y+15); ctx.lineTo(player.x+13, player.y+26); ctx.lineTo(player.x+26, player.y+15);
    ctx.fill(); ctx.shadowBlur = 0;

    // ボス
    if(stage === 2) {
        ctx.fillStyle = (bossHp < 10 && frame % 6 < 3) ? "#f00" : "#fff";
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4; ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
    }

    // 骨
    bones.forEach(b => {
        ctx.fillStyle = b.type === 'blue' ? "#00ffff" : b.type === 'orange' ? "#ffa500" : "#fff";
        if(b.vx !== 0 || b.vy !== 0) {
            ctx.save(); ctx.translate(b.x+b.w/2, b.y+b.h/2); ctx.rotate(Math.atan2(b.vy, b.vx));
            ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h); ctx.restore();
        } else ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    // 弾
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#ffff00" : b.type === 'returned' ? "#0f0" : "#f00";
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
        if(b.type === 'reflect') { ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke(); }
    });

    // フェーズ案内
    if(stage === 1 && frame % 240 < 60) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 30px Consolas"; ctx.textAlign = "center";
        let msg = ["WATCH YOUR FEET", "STAY FOCUSED", "BLUE: STOP / ORANGE: MOVE"][s1_subPhase];
        ctx.fillText(msg, W/2, H/2 - 50); ctx.textAlign = "left";
    }
}

function showResult(isWin) {
    gameActive = false; overlay.style.display = 'flex'; startScreen.style.display = 'none'; resultScreen.style.display = 'block';
    const timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);
    document.getElementById('result-title').innerText = isWin ? "YOU WON!" : "GAME OVER";
    document.getElementById('result-title').style.color = isWin ? "#ffff00" : "#ff0000";
    document.getElementById('result-stats').innerHTML = `TIME: ${timeTaken}s<br>HP LEFT: ${Math.max(0, Math.floor(hp))}%`;
}

function start() {
    if(!gameActive) {
        if(resultScreen.style.display === 'block') { location.reload(); return; }
        overlay.style.display = 'none'; gameActive = true; startTime = Date.now(); update();
    }
}

window.addEventListener('keydown', e => { keys[e.code] = true; start(); });
window.addEventListener('keyup', e => keys[e.code] = false);
const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[id] = true; start(); });
    el.addEventListener('pointerup', () => keys[id] = false);
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);
draw();
</script>
</body>
</html>
