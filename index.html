<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS: ADAPTIVE BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; background: #000; overflow: hidden; margin-top: 10px; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; }
        #dialog-box { width: 580px; height: 70px; border: 4px solid #fff; margin-top: 5px; padding: 8px; font-size: 20px; background: #000; box-sizing: border-box; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { padding: 10px 30px; font-size: 20px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; margin-top: 15px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; width: 600px; }
        .btn-ctrl { height: 60px; border: 2px solid #fff; background: #111; color: #fff; font-family: inherit; font-size: 18px; touch-action: none; }
    </style>
</head>
<body>

<div id="ui">
    <div id="mode-display">SOUL: RED (GRAVITY)</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span>/92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1>* 準備はいいか。</h1>
        <button class="btn" onclick="init()">はじめる</button>
    </div>
    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00;">GAME OVER</h1>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div class="controls">
    <button class="btn-ctrl" id="l">←</button>
    <button class="btn-ctrl" id="u">↑ / JUMP</button>
    <button class="btn-ctrl" id="r">→</button>
    <div style="grid-column: 2;"><button class="btn-ctrl" style="width:100%" id="d">↓</button></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let p, hp, bones, blasters, warns, frame, active, keys, shake = 0, flash = 0;
let phase = 1, phaseTimer = 450, spiralAngle = 0, cooldown = 0;

function init() {
    p = { x: 290, y: 300, w: 16, h: 16, vx: 0, vy: 0, mode: 'red', ground: false };
    hp = 92; bones = []; blasters = []; warns = []; frame = 0; keys = {};
    active = true; phase = 1; phaseTimer = 450; cooldown = 0;
    document.getElementById('start-screen').style.display = 'none';
    msg("* 骨をよく見てジャンプしろ。");
    loop();
}

function msg(text) {
    let i = 0; document.getElementById('dialog-box').innerText = "";
    const t = setInterval(() => {
        document.getElementById('dialog-box').innerText += (text[i++] || "");
        if(i >= text.length) clearInterval(t);
    }, 40);
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;
    if (shake > 0) shake *= 0.9;
    if (flash > 0) flash -= 0.05;
    if (cooldown > 0) cooldown--;

    // 移動制御
    if (p.mode === 'red') {
        // 重力モード (Phase 1-3)
        if (keys['l']) p.vx = -7; else if (keys['r']) p.vx = 7; else p.vx *= 0.8;
        if (keys['u'] && p.ground) { p.vy = -16; p.ground = false; }
        p.vy += 0.9; p.x += p.vx; p.y += p.vy;
        if (p.y > 380 - p.h) { p.y = 380 - p.h; p.vy = 0; p.ground = true; }
    } else {
        // 無重力モード (Phase 4以降)
        let s = 6;
        if (keys['l']) p.vx = -s; else if (keys['r']) p.vx = s; else p.vx *= 0.8;
        if (keys['u']) p.vy = -s; else if (keys['d']) p.vy = s; else p.vy *= 0.8;
        p.x += p.vx; p.y += p.vy;
    }
    p.x = Math.max(0, Math.min(600 - p.w, p.x));
    p.y = Math.max(0, Math.min(400 - p.h, p.y));

    // フェーズ管理
    phaseTimer--;
    if (phaseTimer <= 0) {
        phase++;
        phaseTimer = 500;
        cooldown = 60; // フェーズ移行時に1秒の休憩
        if(phase === 2) msg("* おっと、避けるねぇ。");
        if(phase === 3) msg("* ...そろそろ本気で行くか。");
        if(phase === 4) {
            p.mode = 'blue';
            msg("* 無重力だ。浮かせてやるぜ。");
            document.getElementById('mode-display').innerText = "SOUL: BLUE (FREE)";
        }
        if(phase === 5) msg("* これが「ガスター・スパイラル」だ！");
    }

    // --- 攻撃パターン (インターバル管理) ---
    
    // Phase 1-3: 重力モードでの骨攻撃
    if (p.mode === 'red' && cooldown <= 0) {
        if (frame % 140 === 1) {
            let safe = Math.floor(Math.random() * 5);
            for(let i=0; i<6; i++) { if(i!==safe && i!==safe+1) warns.push({x:i*100, w:100, t:60}); }
        }
    }

    // Phase 4-5: 無重力モードでの渦巻きビーム
    if (p.mode === 'blue' && cooldown <= 0) {
        if (frame % (25 - Math.min(phase * 2, 10)) === 0) {
            spiralAngle += 0.4;
            let bx = 300 + Math.cos(spiralAngle) * 160;
            let by = 200 + Math.sin(spiralAngle) * 160;
            blasters.push({ x: bx, y: by, rot: spiralAngle + Math.PI, timer: 40, beam: 0 });
        }
    }

    // 衝突判定：警告
    warns.forEach((w, i) => {
        w.t--; if(w.t === 0) { bones.push({x:w.x+5, y:410, w:90, h:310, timer:0}); warns.splice(i, 1); }
    });

    // 衝突判定：骨
    bones.forEach((b, i) => {
        b.timer++;
        let offset = (b.timer < 15) ? (b.timer * 6) : (b.timer > 40) ? (90 - (b.timer-40)*15) : 90;
        if(p.x+2 < b.x+b.w-2 && p.x+p.w-2 > b.x+2 && p.y+p.h > 400-offset) { hp -= 1.5; shake = 10; }
        if(b.timer > 60) bones.splice(i, 1);
    });

    // 衝突判定：ビーム
    blasters.forEach((b, i) => {
        b.timer--;
        if(b.timer === 0) { b.beam = 15; shake = 15; flash = 0.3; }
        if(b.beam > 0) {
            b.beam--;
            let dx = p.x + 8 - b.x, dy = p.y + 8 - b.y;
            let dist = Math.abs(dx * Math.sin(-b.rot) + dy * Math.cos(-b.rot));
            if(dist < 32) hp -= 2.5;
        }
        if(b.timer < -20) blasters.splice(i, 1);
    });

    // UI更新
    let dHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-bar-fill').style.width = (dHp/92*100) + "%";
    document.getElementById('hp-num').innerText = dHp;
    if (hp <= 0 && active) { active = false; document.getElementById('death-screen').style.display = 'flex'; }
}

function draw() {
    ctx.save();
    if(shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,600,400);

    warns.forEach(w => {
        ctx.fillStyle = `rgba(255,0,0,${0.2 + Math.sin(frame*0.2)*0.1})`;
        ctx.fillRect(w.x, 0, w.w, 380);
    });

    ctx.fillStyle = '#fff';
    bones.forEach(b => {
        let offset = (b.timer < 15) ? (b.timer * 6) : (b.timer > 40) ? (90 - (b.timer-40)*15) : 90;
        ctx.fillRect(b.x, 400-offset, b.w, offset);
    });

    blasters.forEach(b => {
        ctx.save();
        ctx.translate(b.x, b.y); ctx.rotate(b.rot - Math.PI/2);
        ctx.fillStyle = (b.timer < 15 && b.timer > 0 && frame % 4 < 2) ? '#f00' : '#fff';
        ctx.fillRect(-22, -22, 44, 44);
        if(b.beam > 0) {
            ctx.fillStyle = '#fff'; ctx.fillRect(-35, 22, 70, 1000);
            ctx.fillStyle = '#0ff'; ctx.fillRect(-12, 22, 24, 1000);
        }
        ctx.restore();
    });

    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20); // 床
    ctx.fillStyle = (p.mode === 'red') ? '#f00' : '#22f'; // モードで色変化
    ctx.fillRect(p.x, p.y, p.w, p.h);

    if(flash > 0) { ctx.fillStyle = `rgba(255,255,255,${flash})`; ctx.fillRect(0,0,600,400); }
    ctx.restore();
}

const setup = (id) => {
    const e = document.getElementById(id);
    const start = (ev) => { ev.preventDefault(); keys[id] = true; };
    const end = (ev) => { ev.preventDefault(); keys[id] = false; };
    e.addEventListener('pointerdown', start); e.addEventListener('pointerup', end); e.addEventListener('pointerleave', end);
};
['u','d','l','r'].forEach(setup);
window.onkeydown = e => { 
    if(e.key==='ArrowUp') keys['u']=true; if(e.key==='ArrowDown') keys['d']=true;
    if(e.key==='ArrowLeft') keys['l']=true; if(e.key==='ArrowRight') keys['r']=true;
};
window.onkeyup = e => { 
    if(e.key==='ArrowUp') keys['u']=false; if(e.key==='ArrowDown') keys['d']=false;
    if(e.key==='ArrowLeft') keys['l']=false; if(e.key==='ArrowRight') keys['r']=false;
};
</script>
<div id="dialog-box">* 行くぜ。</div>
</body>
</html>
