<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAD TIME SIMULATOR - 3 STAGES</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 5px solid #fff; margin-top: 50px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: flex-start; align-items: center; font-weight: bold; font-size: 18px; }
        #hp-container { display: flex; align-items: center; margin-left: 20px; }
        #hp-bar { width: 100px; height: 20px; background: #f00; margin: 0 10px; border: 2px solid #fff; }
        #hp-inner { width: 100%; height: 100%; background: #ff0; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn-retry { margin-top: 20px; padding: 10px 30px; font-size: 20px; border: 3px solid #fff; background: #000; color: #fff; cursor: pointer; }
        .btn-retry:hover { background: #fff; color: #000; }

        .btn-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; width: 600px; }
        .btn-control { height: 60px; border: 2px solid #fff; background: #000; color: #fff; font-size: 18px; }
    </style>
</head>
<body>

<div id="ui">
    <span id="stage-text">STAGE 1</span>
    <div id="hp-container">
        HP <div id="hp-bar"><div id="hp-inner"></div></div> <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1 style="font-size: 24px;">* ready for a bad time?</h1>
        <button class="btn-retry" onclick="resetGame()">START</button>
    </div>

    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00; font-size: 24px;">* stay determined...</h1>
        <button class="btn-retry" onclick="resetGame()">RETRY</button>
    </div>

    <div id="win-screen" class="overlay" style="display: none;">
        <h1 style="color: #0f0; font-size: 24px;">* you survived.</h1>
        <button class="btn-retry" onclick="resetGame()">PLAY AGAIN</button>
    </div>

    <canvas id="c"></canvas>
</div>

<div class="btn-container">
    <button class="btn-control" id="l">LEFT</button>
    <button class="btn-control" id="j">JUMP</button>
    <button class="btn-control" id="r">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let player, hp, bones, blasters, frame, active, keys, stage;

function resetGame() {
    player = { x: 290, y: 300, w: 20, h: 20, vx: 0, vy: 0, grounded: false, gravitySide: 'down' };
    hp = 92;
    bones = [];
    blasters = [];
    frame = 0;
    stage = 1;
    keys = {};
    active = true;

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'none';
    
    if (window.gameLoop) cancelAnimationFrame(window.gameLoop);
    loop();
}

function createBone(x, y, w, h, vx, vy, life) {
    bones.push({ x, y, w, h, vx, vy, life });
}

function createBlaster(tx, ty, angle=0) {
    blasters.push({ x: 300 + Math.cos(angle)*300, y: 200 + Math.sin(angle)*300, tx, ty, timer: 40, beamLife: 0 });
}

function loop() {
    if (!active) return;
    update();
    draw();
    window.gameLoop = requestAnimationFrame(loop);
}

function update() {
    frame++;

    // 入力・移動
    if (keys['l']) player.vx = -6;
    else if (keys['r']) player.vx = 6;
    else player.vx *= 0.8;

    if (keys['j'] && player.grounded) {
        player.vy = -13;
        player.grounded = false;
    }

    player.vy += 0.7; // 基本重力
    player.x += player.vx;
    player.y += player.vy;

    // 接地・壁判定
    if (player.y > 380 - player.h) { player.y = 380 - player.h; player.vy = 0; player.grounded = true; }
    player.x = Math.max(0, Math.min(600 - player.w, player.x));

    // ステージ進行 (各20秒 = 1200フレーム)
    if (frame < 1200) stage = 1;
    else if (frame < 2400) stage = 2;
    else if (frame < 3600) stage = 3;
    else { active = false; document.getElementById('win-screen').style.display = 'flex'; }

    document.getElementById('stage-text').innerText = "STAGE " + stage;

    // --- ステージ別攻撃パターン ---
    if (stage === 1) {
        if (frame % 100 === 0) { // 下からの骨
            let gap = 200 + Math.random() * 200;
            for(let i=0; i<600; i+=60) {
                if(i > gap && i < gap + 100) continue;
                createBone(i, 400, 45, 300, 0, -12, 60);
            }
        }
        if (frame % 150 === 0) createBlaster(player.x, player.y);
    } 

    if (stage === 2) { // 横からの骨の嵐
        if (frame % 40 === 0) {
            let side = frame % 80 === 0 ? -50 : 650;
            createBone(side, 300 + (Math.random()-0.5)*150, 30, 80, side < 0 ? 10 : -10, 0, 80);
        }
        if (frame % 200 === 0) createBlaster(300, 200);
    }

    if (stage === 3) { // 最終ラッシュ
        if (frame % 60 === 0) createBlaster(player.x, player.y, Math.random()*Math.PI*2);
        if (frame % 30 === 0) {
            createBone(Math.random()*600, 400, 20, 100, 0, -15, 50);
            createBone(Math.random()*600, -100, 20, 100, 0, 15, 50);
        }
    }

    // 衝突判定
    bones.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy; b.life--;
        if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) hp -= 1;
        if (b.life <= 0) bones.splice(i, 1);
    });

    blasters.forEach((b, i) => {
        if (b.timer > 0) {
            b.x += (b.tx - b.x) * 0.1; b.y += (b.ty - 100 - b.y) * 0.1; b.timer--;
            if (b.timer === 0) b.beamLife = 20;
        } else {
            b.beamLife--;
            if (Math.abs(player.x - b.x) < 40 && b.beamLife > 0) hp -= 2;
            if (b.beamLife <= 0) blasters.splice(i, 1);
        }
    });

    // UI更新
    let displayHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-inner').style.width = (displayHp / 92 * 100) + "%";
    document.getElementById('hp-num').innerText = displayHp;

    if (hp <= 0 && active) {
        active = false;
        document.getElementById('death-screen').style.display = 'flex';
    }
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20); // 床

    bones.forEach(b => { ctx.fillStyle = '#fff'; ctx.fillRect(b.x, b.y, b.w, b.h); });

    blasters.forEach(b => {
        ctx.fillStyle = '#fff'; ctx.fillRect(b.x-20, b.y-20, 40, 40);
        if (b.beamLife > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(b.x-30, b.y, 60, 400);
            ctx.fillStyle = '#0ff'; ctx.fillRect(b.x-10, b.y, 20, 400);
        }
    });

    ctx.fillStyle = '#f00'; ctx.fillRect(player.x, player.y, player.w, player.h);
}

// ボタン操作
const setupBtn = (id) => {
    const btn = document.getElementById(id);
    btn.onpointerdown = (e) => { e.preventDefault(); keys[id] = true; };
    btn.onpointerup = (e) => { e.preventDefault(); keys[id] = false; };
};
['l', 'r', 'j'].forEach(setupBtn);

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') keys['l'] = true;
    if (e.key === 'ArrowRight') keys['r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = true;
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') keys['l'] = false;
    if (e.key === 'ArrowRight') keys['r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = false;
};
</script>
</body>
</html>
