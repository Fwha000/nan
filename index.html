<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ハート・ブレイブ：アンダーテール・リスペクト</title>
    <style>
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'DotGothic16', 'Courier New', monospace; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container {
            position: relative; width: 98vw; height: 70vh; max-width: 1000px;
            border: 4px solid #fff; margin-top: 10px; background: #000;
            overflow: hidden; border-radius: 5px;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 1000px; padding: 10px; }
        .bar-bg { width: 100%; height: 16px; background: #333; border: 2px solid #fff; margin: 5px 0; }
        #p-hp { width: 100%; height: 100%; background: #ff0000; transition: 0.1s; }
        #b-hp { width: 100%; height: 100%; background: #ffff00; transition: 0.3s; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            cursor: pointer;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 450px; padding: 10px; }
        .btn { height: 65px; background: #000; color: #fff; border: 2px solid #fff; font-size: 1.2rem; font-weight: bold; }
        .btn:active { background: #fff; color: #000; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 1s infinite; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-size:16px; font-weight:bold;">
        <span id="stage-text">ステージ 1: 生き残れ</span>
        <span>LV 19</span>
    </div>
    <div class="bar-bg"><div id="b-hp"></div></div>
    <div style="font-size:12px; color:#ff0000; font-weight:bold;">プレイヤーの HP</div>
    <div class="bar-bg"><div id="p-hp"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <div id="start-screen">
            <h1 style="font-size: 2.5rem; margin: 0; color:#fff;">HEART BRAVE</h1>
            <p style="color:#aaa;">- アンダーテール・エディション -</p>
            <div style="text-align:left; border:2px solid #fff; padding:15px; margin:20px 0; font-size: 0.9rem; line-height: 1.6; background: rgba(255,255,255,0.05);">
                <span style="color:#ffffff; font-weight:bold;">【特殊な骨のルール】</span><br>
                <span style="color:#ffa500;">■ オレンジの骨：</span> <b style="background:#ffa500; color:#000;">動いていれば</b> ダメージなし！<br>
                <span style="color:#00ffff;">■ 水色の骨：</span> <b style="background:#00ffff; color:#000;">止まっていれば</b> ダメージなし！<br>
                <span style="color:#ffff00; font-weight:bold;">【反撃の方法】</span><br>
                後半戦の <span style="color:#ffff00;">黄色の弾</span> は、上から踏んで跳ね返せ！
            </div>
            <p class="blink" style="font-size:1.2rem; color:#00ff00;">画面をタップして戦闘開始</p>
        </div>
        <div id="result-screen" style="display:none;">
            <h1 id="result-title" style="font-size:2.5rem;">結果</h1>
            <p id="result-stats" style="font-size:1.2rem; line-height:1.8;"></p>
            <p class="blink" style="color:#00ff00;">タップしてリトライ</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">←左移動</button>
    <button class="btn" id="j-btn">ジャンプ</button>
    <button class="btn" id="r-btn">右移動→</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 1200, H = 600;
canvas.width = W; canvas.height = H;

let gameActive = false, hp = 100, bossHp = 100, frame = 0, stage = 1, startTime = 0;
let s1_subPhase = 0; 
const player = { x: 600, y: 500, w: 26, h: 26, vx: 0, vy: 0, grounded: false, moving: false };
const boss = { x: 1050, y: 250, w: 100, h: 100, targetY: 250 };
let bullets = [], bones = [], items = [];
const keys = {};
const floor = {x: 0, y: 570, w: W, h: 30};
let activePlatforms = [floor];

function update() {
    if(!gameActive) return;
    frame++;

    // プレイヤー入力判定
    player.moving = false;
    let moveSpeed = 8;
    if(keys['ArrowLeft'] || keys['l-btn']) { player.vx = -moveSpeed; player.moving = true; }
    else if(keys['ArrowRight'] || keys['r-btn']) { player.vx = moveSpeed; player.moving = true; }
    else player.vx *= 0.8;

    if((keys['ArrowUp'] || keys['j-btn'] || keys['Space']) && player.grounded) { 
        player.vy = -14.5; player.grounded = false; player.moving = true; 
    }
    if((keys['ArrowUp'] || keys['j-btn']) && player.vy < 0) player.vy -= 0.35;
    if(keys['ArrowDown'] && !player.grounded) { player.vy += 3.5; player.moving = true; }

    player.vy += 0.7; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    activePlatforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    if(stage === 1) {
        bossHp -= 0.05;
        if(frame % 240 === 0) s1_subPhase = (s1_subPhase + 1) % 3;
        if(bossHp <= 50) { 
            stage = 2; bossHp = 50; bones = [];
            activePlatforms.push(
                {x: 150, y: 420, w: 200, h: 14, isSpecial: true}, 
                {x: 500, y: 340, w: 200, h: 14, isSpecial: true}, 
                {x: 850, y: 420, w: 200, h: 14, isSpecial: true}, 
                {x: 350, y: 190, w: 500, h: 14, isSpecial: true}
            );
        }

        if(s1_subPhase === 0) { 
            if(frame % 35 === 0) bones.push({ x: Math.random()*(W-100), y: 600, w: 35, h: 250, targetY: 380, vx: 0, vy: 0, timer: 35, type: 'normal', life: 75 });
        } else if(s1_subPhase === 1) { 
            if(frame % 25 === 0) {
                const side = Math.floor(Math.random() * 4);
                let bx = side===2?-50:side===3?W+50:Math.random()*W;
                let by = side===0?-50:side===1?H+50:Math.random()*H;
                const angle = Math.atan2((player.y+13)-by, (player.x+13)-bx);
                bones.push({ x: bx, y: by, w: 25, h: 25, vx: Math.cos(angle)*9.5, vy: Math.sin(angle)*9.5, type: 'normal', life: 180 });
            }
        } else { 
            if(frame % 35 === 0) {
                const isBlue = Math.random() > 0.5;
                bones.push({ x: W, y: 530, w: 30, h: 40, vx: -11, vy: 0, type: isBlue ? 'blue' : 'orange', life: 150 });
            }
        }
    } else {
        const intensity = bossHp > 25 ? 1 : 2.0;
        boss.y += (boss.targetY - boss.y) * 0.05;
        if(frame % 70 === 0) boss.targetY = Math.random() * 380 + 50;
        if(frame % Math.floor(110/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -6.5 * intensity, vy: (Math.random()-0.5)*6, type: 'reflect', size: 38 });
        if(frame % Math.floor(30/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -14 * intensity, vy: (Math.random()-0.5)*12, type: 'normal', size: 11 });
    }

    bones.forEach((b, i) => {
        if(b.vx === 0 && b.vy === 0) { 
            b.timer--;
            if(b.timer < 0) b.y += (b.targetY - b.y) * 0.25;
            if(b.timer < -25) b.y += 20; 
        } else { b.x += b.vx; b.y += b.vy; }
        
        if(player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
            if(b.type === 'normal') hp -= 3.0;
            else if(b.type === 'blue' && (Math.abs(player.vx) > 0.5 || Math.abs(player.vy) > 0.5)) hp -= 3.5;
            else if(b.type === 'orange' && (Math.abs(player.vx) < 0.5 && Math.abs(player.vy) < 1.0)) hp -= 3.5;
        }
        b.life--;
        if(b.life <= 0 || b.y > 650) bones.splice(i, 1);
    });

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.25; b.y += (boss.y + 50 - b.y) * 0.25;
            if(Math.abs(b.x - (boss.x + 50)) < 60) { bullets.splice(i, 1); bossHp -= 10; }
        } else {
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x - b.x) < 70 && Math.abs(player.y + 26 - b.y) < 60) { 
                b.type = 'returned'; player.vy = -16; 
            } else if(Math.abs(player.x + 13 - b.x) < 24 && Math.abs(player.y + 13 - b.y) < 24) { 
                bullets.splice(i, 1); hp -= 15; 
            }
        }
        if(b.x < -100 || b.x > W + 100) bullets.splice(i, 1);
    });

    document.getElementById('p-hp').style.width = hp + "%";
    document.getElementById('b-hp').style.width = (bossHp * 2) + "%";
    if(hp <= 0) showResult(false);
    if(bossHp <= 0) showResult(true);
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);
    activePlatforms.forEach(p => {
        if(p.isSpecial) {
            ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff";
            ctx.fillStyle = "#00ffff"; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0; ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.strokeRect(p.x, p.y, p.w, p.h);
        } else { ctx.fillStyle = "#fff"; ctx.fillRect(p.x, p.y, p.w, p.h); }
    });

    // プレイヤー（ハート）
    ctx.fillStyle = "#f00"; ctx.shadowBlur = 10; ctx.shadowColor = "#f00";
    ctx.beginPath();
    ctx.moveTo(player.x + 13, player.y + 26);
    ctx.bezierCurveTo(player.x - 5, player.y + 10, player.x + 5, player.y - 5, player.x + 13, player.y + 5);
    ctx.bezierCurveTo(player.x + 21, player.y - 5, player.x + 31, player.y + 10, player.x + 13, player.y + 26);
    ctx.fill(); ctx.shadowBlur = 0;

    if(stage === 2) {
        ctx.fillStyle = (bossHp < 10 && frame % 6 < 3) ? "#f00" : "#fff";
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4; ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
    }

    bones.forEach(b => {
        ctx.fillStyle = b.type === 'blue' ? "#00ffff" : b.type === 'orange' ? "#ffa500" : "#fff";
        if(b.vx !== 0 || b.vy !== 0) {
            ctx.save(); ctx.translate(b.x+b.w/2, b.y+b.h/2); ctx.rotate(Math.atan2(b.vy, b.vx));
            ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h); ctx.restore();
        } else ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#ffff00" : b.type === 'returned' ? "#0f0" : "#f00";
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
        if(b.type === 'reflect') { ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke(); }
    });

    if(stage === 1 && frame % 240 < 70) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 32px 'DotGothic16', sans-serif"; ctx.textAlign = "center";
        let msg = ["足元に注意せよ", "全方位を警戒せよ", "水色は静止、オレンジは移動"][s1_subPhase];
        ctx.fillText(msg, W/2, H/2 - 50); ctx.textAlign = "left";
    }
}

function showResult(isWin) {
    gameActive = false; document.getElementById('overlay').style.display = 'flex'; 
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    const timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);
    document.getElementById('result-title').innerText = isWin ? "おめでとう！" : "ゲームオーバー";
    document.getElementById('result-title').style.color = isWin ? "#ffff00" : "#ff0000";
    document.getElementById('result-stats').innerHTML = `生存時間: ${timeTaken}秒<br>残りHP: ${Math.max(0, Math.floor(hp))}%`;
}

function start() {
    if(!gameActive) {
        if(document.getElementById('result-screen').style.display === 'block') { location.reload(); return; }
        document.getElementById('overlay').style.display = 'none'; 
        gameActive = true; startTime = Date.now(); update();
    }
}

// 画面全体にクリック・タッチイベントを付与
document.getElementById('overlay').addEventListener('pointerdown', start);

window.addEventListener('keydown', e => { keys[e.code] = true; start(); });
window.addEventListener('keyup', e => keys[e.code] = false);

const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); keys[id] = true; start(); });
    el.addEventListener('pointerup', (e) => { e.preventDefault(); keys[id] = false; });
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);

draw();
</script>
</body>
</html>
