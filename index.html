<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave - Boss Reflect</title>
    <style>
        body {
            margin: 0; padding: 0; background: #050510; color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #hud {
            width: 100%; max-width: 600px; padding: 10px;
            display: flex; flex-direction: column; gap: 5px;
        }
        .bar-container {
            width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #444;
        }
        #player-hp-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.2s; }
        #boss-hp-bar { width: 100%; height: 100%; background: #a29bfe; transition: width 0.3s; }
        
        #game-container {
            position: relative; width: 95vw; height: 50vh; max-width: 800px;
            border: 3px solid #444; border-radius: 15px; background: #000;
        }
        canvas { width: 100%; height: 100%; display: block; border-radius: 12px; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer; text-align: center;
        }
        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 15px; width: 95vw; max-width: 400px;
        }
        .btn {
            height: 65px; background: rgba(255,255,255,0.1); color: white; border: 2px solid #444;
            border-radius: 15px; font-weight: bold; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .btn:active { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-size: 0.7rem; color: #a29bfe;">BOSS HP</div>
    <div class="bar-container"><div id="boss-hp-bar"></div></div>
    <div style="font-size: 0.7rem; color: #ff4757;">PLAYER HP</div>
    <div class="bar-container"><div id="player-hp-bar"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h1 id="title" style="color:#ff4757; margin:0;">HEART BRAVE</h1>
        <p id="msg">黄色の弾を「踏んで」反射しろ！</p>
        <p style="font-size: 0.9rem; color: #ffeb3b;">タップで開始</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">←</button>
    <button class="btn" id="j-btn">UP</button>
    <button class="btn" id="r-btn">→</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const pBar = document.getElementById('player-hp-bar');
const bBar = document.getElementById('boss-hp-bar');
const overlay = document.getElementById('overlay');

canvas.width = 800; canvas.height = 400;

let gameActive = false;
let hp = 100, bossHp = 100, frame = 0, shake = 0;
const player = { x: 100, y: 300, w: 35, h: 35, vx: 0, vy: 0, grounded: false };
const boss = { x: 900, y: 150, w: 80, h: 80, targetY: 150, active: false };
const platforms = [{x: 0, y: 360, w: 800, h: 40}, {x: 150, y: 250, w: 120, h: 10}, {x: 530, y: 250, w: 120, h: 10}, {x: 340, y: 160, w: 120, h: 10}];
let bullets = [];
const keys = { left: false, right: false };

function spawnBullet(x, y, vx, vy, type) {
    bullets.push({ x, y, vx, vy, type, size: type === 'reflect' ? 12 : 8 });
}

function update() {
    if(!gameActive) return;
    frame++;

    if(shake > 0) shake--;

    // プレイヤー物理
    if(keys.left) player.vx = -6; else if(keys.right) player.vx = 6; else player.vx *= 0.85;
    player.vy += 0.6; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // ボス出現
    if(frame > 100) boss.active = true;

    if(boss.active && bossHp > 0) {
        boss.x += (680 - boss.x) * 0.05;
        boss.y += (boss.targetY - boss.y) * 0.03;
        if(frame % 80 === 0) boss.targetY = Math.random() * 200 + 50;

        // 攻撃パターン
        if(frame % 120 === 0) { // 反射可能弾
            for(let i=0; i<6; i++) {
                const a = i * Math.PI / 3;
                spawnBullet(boss.x + 40, boss.y + 40, Math.cos(a)*3, Math.sin(a)*3, 'reflect');
            }
        }
        if(frame % 50 === 0) spawnBullet(boss.x, boss.y + 40, -7, (Math.random()-0.5)*4, 'normal');
    }

    // 弾の更新
    bullets.forEach((b, i) => {
        if(b.type === 'returned') {
            b.x += (boss.x + 40 - b.x) * 0.1; b.y += (boss.y + 40 - b.y) * 0.1;
            if(Math.abs(b.x - (boss.x+40)) < 10 && Math.abs(b.y - (boss.y+40)) < 10) {
                bullets.splice(i, 1); bossHp -= 5; shake = 10;
                bBar.style.width = bossHp + "%";
                if(bossHp <= 0) victory();
            }
        } else {
            b.x += b.vx; b.y += b.vy;
            // 反射判定（踏む）
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x + 17 - b.x) < 30 && Math.abs(player.y + 35 - b.y) < 20) {
                b.type = 'returned'; player.vy = -10;
            } else if(Math.abs(player.x + 17 - b.x) < 20 && Math.abs(player.y + 17 - b.y) < 20) {
                bullets.splice(i, 1); hp -= 15; pBar.style.width = hp + "%";
                if(hp <= 0) location.reload();
            }
        }
        if(b.x < -50 || b.x > 850) bullets.splice(i, 1);
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    if(shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    
    ctx.fillStyle = "#050510"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#2d3436"; platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // プレイヤー
    ctx.fillStyle = "#4a90e2"; ctx.fillRect(player.x, player.y, player.w, player.h);

    // ボス
    if(boss.active && bossHp > 0) {
        ctx.fillStyle = "#ff4757"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = "white"; ctx.fillRect(boss.x + 25, boss.y + 25, 30, 30);
    }

    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#ffeb3b" : (b.type === 'returned' ? "#00d2ff" : "#ff4757");
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
}

function victory() {
    gameActive = false;
    document.getElementById('title').innerText = "MISSION COMPLETE";
    document.getElementById('title').style.color = "#00d2ff";
    document.getElementById('msg').innerText = "ボスを撃破しました！";
    overlay.style.display = 'flex';
}

overlay.addEventListener('pointerdown', () => { if(!gameActive && bossHp > 0) { overlay.style.display = 'none'; gameActive = true; update(); } else if(!gameActive) location.reload(); });
const bind = (id, k, f) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => { e.preventDefault(); if(k) keys[k] = true; if(f) f(); });
    el.addEventListener('pointerup', e => { if(k) keys[k] = false; });
    el.addEventListener('pointerleave', e => { if(k) keys[k] = false; });
};
bind('l-btn', 'left'); bind('r-btn', 'right'); bind('j-btn', null, () => { if(player.grounded) player.vy = -14; });
draw();
</script>
</body>
</html>
