<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS: BATTLE (PHASE SEPARATED)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; background: #000; overflow: hidden; margin-top: 10px; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; transition: width 0.3s; }
        #dialog-box { width: 580px; height: 70px; border: 4px solid #fff; margin-top: 5px; padding: 8px; font-size: 20px; background: #000; box-sizing: border-box; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn { padding: 10px 30px; font-size: 20px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; margin-top: 15px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; width: 600px; }
        .btn-ctrl { height: 60px; border: 2px solid #fff; background: #111; color: #fff; font-family: inherit; font-size: 18px; touch-action: none; }
        #timer-display { font-size: 24px; color: #ff0; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <div id="timer-display">TIME: 60.00</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span>/92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1>* 地面か、横か。</h1>
        <p>赤ソウル時は攻撃が混ざりません</p>
        <button class="btn" onclick="init()">はじめる</button>
    </div>
    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00;">GAME OVER</h1>
        <button class="btn" onclick="location.reload()">RETRY</button>
    </div>
    <div id="win-screen" class="overlay" style="display: none;">
        <h1 style="color: #0f0;">MISSION CLEAR</h1>
        <p>* お見事。いい反射神経だ。</p>
        <button class="btn" onclick="location.reload()">REPLAY</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div class="controls">
    <button class="btn-ctrl" id="l">←</button>
    <button class="btn-ctrl" id="u">↑ / JUMP</button>
    <button class="btn-ctrl" id="r">→</button>
    <div style="grid-column: 2;"><button class="btn-ctrl" style="width:100%" id="d">↓</button></div>
</div>

<div id="dialog-box">* 行くぜ。</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let p, hp, maxHp = 92, bones, blasters, warns, flyers, frame, active, keys, shake = 0, flash = 0;
let survivalTime = 60, spiralAngle = 0, cooldown = 0, healFlash = 0, spiralCount = 0;
let currentAttack = "none"; // "floor", "flyer", "none"

function init() {
    p = { x: 290, y: 300, w: 16, h: 16, vx: 0, vy: 0, mode: 'red', ground: false };
    hp = maxHp; bones = []; blasters = []; warns = []; flyers = []; frame = 0; keys = {};
    active = true; survivalTime = 60; cooldown = 0; spiralCount = 0; healFlash = 0;
    currentAttack = "none";
    document.getElementById('start-screen').style.display = 'none';
    msg("* 準備はいいか。");
    loop();
}

function msg(text) {
    let i = 0; document.getElementById('dialog-box').innerText = "";
    const t = setInterval(() => {
        document.getElementById('dialog-box').innerText += (text[i++] || "");
        if(i >= text.length) clearInterval(t);
    }, 40);
}

function spawnBlaster() {
    let radius = 280;
    let bx = 300 + Math.cos(spiralAngle) * radius;
    let by = 200 + Math.sin(spiralAngle) * radius;
    let angleToCenter = Math.atan2(200 - by, 300 - bx);
    blasters.push({ x: bx, y: by, rot: angleToCenter, timer: 28, beam: 0 });
}

function spawnFlyerWave() {
    currentAttack = "flyer";
    let count = 0;
    const interval = setInterval(() => {
        if (!active || p.mode !== 'red') { clearInterval(interval); return; }
        let side = Math.random() > 0.5;
        flyers.push({
            x: side ? -30 : 630,
            y: 280 + Math.random() * 80, // ジャンプで避けられる高さに限定
            vx: side ? 6 : -6,
            w: 35, h: 12
        });
        count++;
        if (count >= 5) { // 5回飛ばしたら終了
            clearInterval(interval);
            setTimeout(() => { currentAttack = "none"; cooldown = 40; }, 800);
        }
    }, 600);
}

function update() {
    frame++;
    if (shake > 0) shake *= 0.85;
    if (flash > 0) flash -= 0.05;
    if (healFlash > 0) healFlash -= 0.1;
    if (cooldown > 0) cooldown--;

    if (survivalTime > 0) {
        survivalTime -= 1/60;
        document.getElementById('timer-display').innerText = "TIME: " + Math.max(0, survivalTime).toFixed(2);
        
        if (survivalTime <= 30 && p.mode === 'red') {
            p.mode = 'blue';
            cooldown = 40; bones = []; warns = []; flyers = [];
            currentAttack = "blaster";
            msg("* さあ、ここからはノンストップだ。");
        }
        if (survivalTime <= 0) { active = false; document.getElementById('win-screen').style.display = 'flex'; }
    }

    if (frame % 300 === 0 && hp < maxHp) { hp = Math.min(maxHp, hp + 1); healFlash = 0.5; }

    // 移動
    if (p.mode === 'red') {
        if (keys['l']) p.vx = -7; else if (keys['r']) p.vx = 7; else p.vx *= 0.8;
        if (keys['u'] && p.ground) { p.vy = -16; p.ground = false; }
        p.vy += 0.9; p.x += p.vx; p.y += p.vy;
        if (p.y > 380 - p.h) { p.y = 380 - p.h; p.vy = 0; p.ground = true; }
    } else {
        let s = 6.8;
        if (keys['l']) p.vx = -s; else if (keys['r']) p.vx = s; else p.vx *= 0.8;
        if (keys['u']) p.vy = -s; else if (keys['d']) p.vy = s; else p.vy *= 0.8;
        p.x += p.vx; p.y += p.vy;
    }
    p.x = Math.max(0, Math.min(600 - p.w, p.x));
    p.y = Math.max(0, Math.min(400 - p.h, p.y));

    // 攻撃パターン管理
    if (cooldown <= 0 && currentAttack === "none") {
        if (p.mode === 'red') {
            if (Math.random() > 0.5) {
                // 地面の骨パターン
                currentAttack = "floor";
                let safe = Math.floor(Math.random() * 5);
                for(let i=0; i<6; i++) { if(i!==safe && i!==safe+1) warns.push({x:i*100, w:100, t:45}); }
            } else {
                // 飛び骨パターン
                spawnFlyerWave();
            }
        }
    }

    if (p.mode === 'blue' && cooldown <= 0) {
        if (spiralCount < 15) {
            if (frame % 10 === 0) {
                spiralAngle += 0.40;
                spawnBlaster(); spiralCount++;
            }
        } else if (blasters.length === 0) {
            cooldown = 30; spiralCount = 0;
        }
    }

    // 判定
    warns.forEach((w, i) => { w.t--; if(w.t === 0) { bones.push({x:w.x+5, y:410, w:90, h:310, timer:0}); warns.splice(i, 1); } });
    bones.forEach((b, i) => {
        b.timer++; 
        let offset = (b.timer < 15) ? (b.timer * 6) : (b.timer > 40) ? (90 - (b.timer-40)*15) : 90;
        if(p.x+2 < b.x+b.w-2 && p.x+p.w-2 > b.x+2 && p.y+p.h > 400-offset) { hp -= 3.0; shake = 8; }
        if(b.timer > 60) {
            bones.splice(i, 1);
            if (bones.length === 0 && currentAttack === "floor") { currentAttack = "none"; cooldown = 30; }
        }
    });
    flyers.forEach((f, i) => {
        f.x += f.vx;
        if (Math.abs(p.x+8 - (f.x+17)) < 15 && Math.abs(p.y+8 - (f.y+6)) < 10) { hp -= 2.0; shake = 5; }
        if (f.x < -100 || f.x > 700) flyers.splice(i, 1);
    });
    blasters.forEach((b, i) => {
        b.timer--;
        if(b.timer === 0) { b.beam = 16; shake = 8; flash = 0.15; }
        if(b.beam > 0) {
            b.beam--;
            let dx = p.x + 8 - b.x, dy = p.y + 8 - b.y;
            let dist = Math.abs(dx * Math.sin(-b.rot) + dy * Math.cos(-b.rot));
            if(dist < 18) hp -= 4.0;
        }
        if(b.timer < -16) blasters.splice(i, 1);
    });

    let dHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-bar-fill').style.width = (dHp/maxHp*100) + "%";
    document.getElementById('hp-num').innerText = dHp;
    if (hp <= 0 && active) { active = false; document.getElementById('death-screen').style.display = 'flex'; }
}

function draw() {
    ctx.save();
    if(shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,600,400);

    warns.forEach(w => { ctx.fillStyle = `rgba(255,0,0,0.25)`; ctx.fillRect(w.x, 0, w.w, 380); });
    ctx.fillStyle = '#fff';
    bones.forEach(b => {
        let offset = (b.timer < 15) ? (b.timer * 6) : (b.timer > 40) ? (90 - (b.timer-40)*15) : 90;
        ctx.fillRect(b.x, 400-offset, b.w, offset);
    });
    flyers.forEach(f => {
        ctx.fillStyle = '#fff'; ctx.fillRect(f.x, f.y, f.w, f.h);
        ctx.fillStyle = '#f00'; ctx.fillRect(f.x + (f.vx > 0 ? f.w-8 : 0), f.y, 8, f.h);
    });
    blasters.forEach(b => {
        ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot);
        ctx.fillStyle = (b.timer < 8 && b.timer > 0 && frame % 4 < 2) ? '#f00' : '#fff';
        ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(-12, -12); ctx.lineTo(-12, 12); ctx.closePath(); ctx.fill();
        if(b.timer > 0) {
            ctx.strokeStyle = `rgba(255,255,255,${b.timer < 8 ? 0.6 : 0.2})`;
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(800,0); ctx.stroke();
        }
        if(b.beam > 0) {
            ctx.fillStyle = '#fff'; ctx.fillRect(0, -18, 800, 36);
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, -6, 800, 12);
        }
        ctx.restore();
    });

    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20);
    if (healFlash > 0) { ctx.fillStyle = `rgba(0, 255, 0, ${healFlash})`; ctx.fillRect(p.x-4, p.y-4, p.w+8, p.h+8); }
    ctx.fillStyle = (p.mode === 'red') ? '#f00' : '#22f'; ctx.fillRect(p.x, p.y, p.w, p.h);
    if(flash > 0) { ctx.fillStyle = `rgba(255,255,255,${flash})`; ctx.fillRect(0,0,600,400); }
    ctx.restore();
}

function loop() { if (!active) return; update(); draw(); requestAnimationFrame(loop); }

const setup = (id) => {
    const e = document.getElementById(id);
    e.addEventListener('pointerdown', (ev) => { ev.preventDefault(); keys[id] = true; });
    e.addEventListener('pointerup', (ev) => { ev.preventDefault(); keys[id] = false; });
    e.addEventListener('pointerleave', (ev) => { ev.preventDefault(); keys[id] = false; });
};
['u','d','l','r'].forEach(setup);
window.onkeydown = e => { 
    if(e.key==='ArrowUp') keys['u']=true; if(e.key==='ArrowDown') keys['d']=true;
    if(e.key==='ArrowLeft') keys['l']=true; if(e.key==='ArrowRight') keys['r']=true;
};
window.onkeyup = e => { 
    if(e.key==='ArrowUp') keys['u']=false; if(e.key==='ArrowDown') keys['d']=false;
    if(e.key==='ArrowLeft') keys['l']=false; if(e.key==='ArrowRight') keys['r']=false;
};
</script>
</body>
</html>
