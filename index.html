<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAD TIME SIMULATOR - JUSTICE</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 5px solid #fff; margin-top: 50px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: flex-start; align-items: center; font-weight: bold; }
        #hp-container { display: flex; align-items: center; margin-left: 20px; }
        #hp-bar { width: 100px; height: 20px; background: #f00; margin: 0 10px; border: 2px solid #fff; }
        #hp-inner { width: 100%; height: 100%; background: #ff0; transition: width 0.1s; }
        #inst { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; cursor: pointer; z-index: 10; }
        .btn-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; width: 600px; }
        .btn { height: 50px; border: 2px solid #fff; background: #000; color: #fff; font-size: 18px; cursor: pointer; }
        .btn:active { background: #fff; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <span>PLAYER LV 19</span>
    <div id="hp-container">
        HP <div id="hp-bar"><div id="hp-inner"></div></div> 92 / 92
    </div>
</div>

<div id="game-box">
    <div id="inst" onclick="initGame()">
        <h1 style="font-size: 24px;">* heya. ready?</h1>
        <p>[ CLICK TO START ]</p>
    </div>
    <canvas id="c"></canvas>
</div>

<div class="btn-container">
    <button class="btn" id="l">LEFT</button>
    <button class="btn" id="j">JUMP</button>
    <button class="btn" id="r">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let player = { x: 300, y: 300, w: 16, h: 16, vx: 0, vy: 0, grounded: false, color: '#f00' };
let hp = 92;
let bones = [], blasters = [], frame = 0, active = false;
let keys = {};

function initGame() {
    document.getElementById('inst').style.display = 'none';
    active = true;
    loop();
}

function createBone(x, y, w, h, vx, vy, life, color="#fff") {
    bones.push({ x, y, w, h, vx, vy, life, color });
}

function createBlaster(tx, ty) {
    blasters.push({ x: Math.random()*600, y: -50, tx, ty, timer: 45, beamLife: 0 });
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;

    // 入力
    if (keys['l']) player.vx = -5;
    else if (keys['r']) player.vx = 5;
    else player.vx *= 0.8;

    if (keys['j'] && player.grounded) {
        player.vy = -12;
        player.grounded = false;
    }

    player.vy += 0.6; // 重力
    player.x += player.vx;
    player.y += player.vy;

    // 壁判定
    if (player.y > 380 - player.h) {
        player.y = 380 - player.h;
        player.vy = 0;
        player.grounded = true;
    }
    player.x = Math.max(0, Math.min(600 - player.w, player.x));

    // --- 最初の攻撃（開幕初見殺し） ---
    if (frame === 10) {
        // 下から極太の骨（逃げ場を狭くする）
        for(let i=0; i<600; i+=80) {
            if(i > 250 && i < 350) continue; // 中央だけ隙間
            createBone(i, 400, 60, 300, 0, -15, 60);
        }
    }
    if (frame === 50) {
        // 上からも骨を降らせる
        createBone(280, -300, 40, 300, 0, 12, 80);
    }

    // --- 継続的な攻撃パターン ---
    if (frame > 100) {
        if (frame % 80 === 0) {
            // 横から飛んでくる高速骨
            let side = Math.random() > 0.5 ? -50 : 650;
            createBone(side, 340, 20, 40, side < 0 ? 8 : -8, 0, 100, '#0ff'); // 青い骨：動かなければ当たらない（今回は簡易的に色のみ）
        }
        if (frame % 150 === 0) {
            createBlaster(player.x, player.y);
        }
    }

    // 骨の更新と判定
    bones.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        b.life--;
        if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
            hp -= 1; // KRダメージ（継続ダメージ風）
        }
        if (b.life <= 0) bones.splice(i, 1);
    });

    // ブラスターの更新
    blasters.forEach((b, i) => {
        if (b.timer > 0) {
            b.x += (b.tx - b.x) * 0.1;
            b.y += (b.ty - 100 - b.y) * 0.1;
            b.timer--;
            if (b.timer === 0) b.beamLife = 20;
        } else {
            b.beamLife--;
            // ビーム判定
            if (Math.abs(player.x - b.x) < 40) {
                hp -= 2;
            }
            if (b.beamLife <= 0) blasters.splice(i, 1);
        }
    });

    document.getElementById('hp-inner').style.width = (hp / 92 * 100) + "%";
    if (hp <= 0) {
        alert("* geeeeettttttt dunked on!!!");
        location.reload();
    }
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 600, 400);

    // 床
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 380, 600, 20);

    // 骨
    bones.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    // ブラスター
    blasters.forEach(b => {
        ctx.fillStyle = '#fff';
        ctx.fillRect(b.x - 20, b.y - 20, 40, 40); // 簡易ドクロ
        if (b.beamLife > 0) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(b.x - 30, b.y, 60, 400);
            ctx.fillStyle = '#0ff'; // 内側の色
            ctx.fillRect(b.x - 15, b.y, 30, 400);
        }
    });

    // プレイヤー（ハート）
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

// コントローラー
const setupBtn = (id) => {
    const btn = document.getElementById(id);
    btn.onpointerdown = () => keys[id] = true;
    btn.onpointerup = () => keys[id] = false;
};
['l', 'r', 'j'].forEach(setupBtn);

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') keys['l'] = true;
    if (e.key === 'ArrowRight') keys['r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = true;
});
window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') keys['l'] = false;
    if (e.key === 'ArrowRight') keys['r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = false;
});
</script>
</body>
</html>
