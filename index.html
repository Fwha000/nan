<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave: Full Field Edition</title>
    <style>
        body {
            margin: 0; background: #05050a; color: #fff;
            font-family: 'Consolas', 'Courier New', monospace; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container {
            position: relative; width: 98vw; height: 70vh; max-width: 1000px;
            border: 2px solid #555; margin-top: 10px; background: #000;
            overflow: hidden; border-radius: 10px;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 1000px; padding: 10px; }
        .bar-bg { width: 100%; height: 14px; background: #111; border-radius: 7px; margin: 5px 0; border: 1px solid #333; }
        #p-hp { width: 100%; height: 100%; background: #ff4757; transition: 0.2s; }
        #b-hp { width: 100%; height: 100%; background: #1e90ff; transition: 0.4s; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 450px; padding: 10px; }
        .btn { height: 60px; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 10px; font-size: 1.2rem; }
        .btn:active { background: #444; }
        #result-screen { display: none; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-size:14px;">
        <span id="stage-text" style="color:#ff9f43;">STAGE 1: SURVIVE</span>
        <span id="boss-label" style="color:#1e90ff;">UNKNOWN ENTITY</span>
    </div>
    <div class="bar-bg"><div id="b-hp"></div></div>
    <div style="font-size:12px; color:#ff4757;">PLAYER INTEGRITY</div>
    <div class="bar-bg"><div id="p-hp"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <div id="start-screen">
            <h1 style="color:#ff4757; font-size: 2.5rem; margin: 0;">HEART BRAVE</h1>
            <div style="text-align:left; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; margin:15px 0; font-size: 0.9rem; line-height: 1.5;">
                <b style="color:#ffeb3b;">【操作方法】</b><br>
                ・左右ボタン / 矢印キー：移動<br>
                ・JUMP長押し：<span style="color:#ff4757;">ハイジャンプ</span><br>
                ・空中＋下キー：<span style="color:#ff4757;">急降下着地</span><br>
                <b style="color:#ffeb3b;">【ルール】</b><br>
                1. 前半はボスの骨攻撃を避け続けろ！<br>
                2. 後半は<span style="color:yellow;">巨大な黄色の弾</span>を踏んで跳ね返せ！
            </div>
            <p style="color:#00d2ff;">画面をタップして戦闘開始</p>
        </div>

        <div id="result-screen">
            <h1 id="result-title" style="font-size: 2.5rem;">RESULT</h1>
            <p id="result-stats" style="font-size: 1.2rem; line-height: 2;"></p>
            <p style="color:#00d2ff;">タップしてリトライ</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">LEFT</button>
    <button class="btn" id="j-btn">JUMP</button>
    <button class="btn" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startScreen = document.getElementById('start-screen');
const resultScreen = document.getElementById('result-screen');

// フィールド全体を画面内に収める設定
const W = 1200;
const H = 600;
canvas.width = W;
canvas.height = H;

let gameActive = false, hp = 100, bossHp = 100, frame = 0, stage = 1;
let startTime = 0;
const player = { x: 100, y: 500, w: 30, h: 30, vx: 0, vy: 0, grounded: false };
const boss = { x: 1050, y: 250, w: 120, h: 120, targetY: 250, beamTimer: 0 };

let bullets = [], bones = [], items = [];
const keys = {};

const platforms = [
    {x: 0, y: 570, w: W, h: 30},
    {x: 150, y: 400, w: 200, h: 10}, {x: 500, y: 350, w: 200, h: 10},
    {x: 850, y: 400, w: 200, h: 10}, {x: 300, y: 180, w: 600, h: 10}
];

function update() {
    if(!gameActive) return;
    frame++;

    // --- プレイヤー物理 ---
    if(keys['ArrowLeft'] || keys['l-btn']) player.vx = -6;
    else if(keys['ArrowRight'] || keys['r-btn']) player.vx = 6;
    else player.vx *= 0.85;

    if((keys['ArrowUp'] || keys['j-btn']) && player.grounded) { player.vy = -12; player.grounded = false; }
    if((keys['ArrowUp'] || keys['j-btn']) && player.vy < 0) player.vy -= 0.3; // ハイジャンプ長押し
    if(keys['ArrowDown'] && !player.grounded) player.vy += 2; // 急降下

    player.vy += 0.6; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    // --- ステージ進行 ---
    if(stage === 1) {
        bossHp -= 0.05; // 骨を避けている間、時間でボスのバリアが削れる
        if(bossHp <= 50) { stage = 2; bossHp = 50; }
        if(frame % 60 === 0) {
            bones.push({ x: Math.random()*(W-100), y: 600, w: 40, h: 250, targetY: 400, timer: 50 });
        }
    } else {
        // ステージ2: ボス戦
        boss.y += (boss.targetY - boss.y) * 0.05;
        if(frame % 100 === 0) boss.targetY = Math.random() * 300 + 50;
        boss.beamTimer++;
        if(boss.beamTimer > 400) boss.beamTimer = 0;

        // 黄色の跳ね返し弾（大きく、少なく）
        if(frame % 180 === 0) {
            bullets.push({ x: boss.x, y: boss.y + 60, vx: -4.5, vy: (Math.random()-0.5)*3, type: 'reflect', size: 25 });
        }
        // 通常弾
        if(frame % 50 === 0) {
            bullets.push({ x: boss.x, y: boss.y + 60, vx: -9, vy: (Math.random()-0.5)*8, type: 'normal', size: 10 });
        }
    }

    // --- オブジェクト処理 ---
    bones.forEach((b, i) => {
        b.timer--;
        if(b.timer < 0) b.y += (b.targetY - b.y) * 0.1;
        if(player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) hp -= 1.5;
        if(frame > 500 && b.y > 580) bones.splice(i, 1);
    });

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.type === 'returned') {
            b.x += (boss.x + 60 - b.x) * 0.12; b.y += (boss.y + 60 - b.y) * 0.12;
            if(Math.abs(b.x - boss.x - 60) < 50) { bullets.splice(i, 1); bossHp -= 10; }
        } else {
            // 跳ね返し判定（踏みつけ）
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x - b.x) < 50 && Math.abs(player.y + 30 - b.y) < 40) {
                b.type = 'returned'; player.vy = -14;
            } else if(Math.abs(player.x + 15 - b.x) < 20 && Math.abs(player.y + 15 - b.y) < 20) {
                bullets.splice(i, 1); hp -= 10;
            }
        }
        if(b.x < -100 || b.x > W + 100) bullets.splice(i, 1);
    });

    // アイテム
    if(frame % 600 === 0) items.push({ x: Math.random()*(W-100), y: 0, vy: 2.5 });
    items.forEach((it, i) => {
        it.y += it.vy;
        if(Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 40) { hp = Math.min(100, hp + 30); items.splice(i, 1); }
    });

    // UI更新
    document.getElementById('p-hp').style.width = hp + "%";
    document.getElementById('b-hp').style.width = (bossHp * 2) + "%";
    document.getElementById('stage-text').innerText = stage === 1 ? "STAGE 1: BONE SURVIVAL" : "FINAL STAGE: BOSS BATTLE";
    document.getElementById('boss-label').innerText = stage === 1 ? "SHADOW" : "CORE DEFENDER";

    if(hp <= 0) showResult(false);
    if(bossHp <= 0) showResult(true);

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);

    // 足場
    ctx.fillStyle = "#222";
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    // プレイヤー
    ctx.fillStyle = "#ff4757"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff4757";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // ボス
    if(stage === 2) {
        ctx.fillStyle = "#1e90ff"; ctx.shadowColor = "#1e90ff";
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        if(boss.beamTimer > 250 && boss.beamTimer < 320) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
            ctx.fillRect(0, boss.y + 20, boss.x, 80);
        }
    }

    // 骨
    ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // 弾
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "yellow" : (b.type === 'returned' ? "#00ffff" : "#ff4757");
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });

    // 回復
    ctx.fillStyle = "#2ed573"; ctx.font = "bold 30px Arial";
    items.forEach(it => ctx.fillText("✚", it.x, it.y));
}

function showResult(isWin) {
    gameActive = false;
    overlay.style.display = 'flex';
    startScreen.style.display = 'none';
    resultScreen.style.display = 'block';
    
    const timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);
    document.getElementById('result-title').innerText = isWin ? "MISSION COMPLETE" : "MISSION FAILED";
    document.getElementById('result-title').style.color = isWin ? "#2ecc71" : "#e74c3c";
    document.getElementById('result-stats').innerHTML = `
        Survival Time: ${timeTaken}s<br>
        Health Left: ${Math.max(0, Math.floor(hp))}%<br>
        Rank: ${isWin ? (hp > 80 ? "S" : "A") : "F"}
    `;
}

function start() {
    if(!gameActive) {
        if(resultScreen.style.display === 'block') { location.reload(); return; }
        overlay.style.display = 'none';
        gameActive = true;
        startTime = Date.now();
        update();
    }
}

overlay.addEventListener('pointerdown', start);
window.addEventListener('keydown', e => { keys[e.code] = true; start(); });
window.addEventListener('keyup', e => keys[e.code] = false);

const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[id] = true; start(); });
    el.addEventListener('pointerup', () => keys[id] = false);
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);
</script>
</body>
</html>
