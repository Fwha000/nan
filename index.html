<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave: Relaxed Edition</title>
    <style>
        body {
            margin: 0; background: #000; color: #fff;
            font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container {
            position: relative; width: 98vw; height: 70vh; max-width: 1000px;
            border: 4px solid #fff; margin-top: 10px; background: #000;
            overflow: hidden; border-radius: 5px;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 1000px; padding: 10px; }
        .bar-bg { width: 100%; height: 16px; background: #333; border: 2px solid #fff; margin: 5px 0; }
        #p-hp { width: 100%; height: 100%; background: #ff0000; transition: 0.1s; }
        #b-hp { width: 100%; height: 100%; background: #ffff00; transition: 0.3s; }
        #overlay, #msg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            cursor: pointer;
        }
        #msg-layer { background: rgba(0,0,0,0.75); z-index: 110; display: none; }
        .dialogue { font-size: 1.5rem; color: #fff; margin-bottom: 20px; border: 2px solid #fff; padding: 30px; background: #000; min-width: 300px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 450px; padding: 10px; }
        .btn { height: 65px; background: #000; color: #fff; border: 2px solid #fff; font-size: 1.2rem; font-weight: bold; }
        .btn:active { background: #fff; color: #000; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 1s infinite; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-size:16px; font-weight:bold;">
        <span id="stage-text">ステージ 1: 試練</span>
        <span id="phase-label">第一形態</span>
    </div>
    <div class="bar-bg"><div id="b-hp"></div></div>
    <div class="bar-bg"><div id="p-hp"></div></div>
</div>

<div id="game-container">
    <div id="msg-layer" onclick="resumeGame()">
        <div id="msg-box" class="dialogue"></div>
        <p class="blink">画面をタップして続行</p>
    </div>

    <div id="overlay" onclick="start()">
        <div id="start-screen">
            <h1 style="font-size: 2.5rem; margin: 0;">HEART BRAVE</h1>
            <p>ガイドラインを見て、落ち着いて避けよう</p>
            <p class="blink" style="color:#ffff00; margin-top:20px;">タップして開始</p>
        </div>
        <div id="result-screen" style="display:none;">
            <h1 id="result-title">結果</h1>
            <p id="result-stats"></p>
            <p class="blink">タップしてリトライ</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">←左</button>
    <button class="btn" id="j-btn">飛ぶ</button>
    <button class="btn" id="r-btn">右→</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 1200, H = 600;
canvas.width = W; canvas.height = H;

let gameActive = false, isPaused = false, hp = 100, bossHp = 100, frame = 0, stage = 1, startTime = 0;
let bossPhase = 1, shake = 0, safetyTimer = 0;
let s1_subPhase = 0; 
const player = { x: 600, y: 500, w: 26, h: 26, vx: 0, vy: 0, grounded: false };
const boss = { x: 1050, y: 250, w: 100, h: 100, targetY: 250 };
let bullets = [], bones = [], warnings = [];
const keys = {};
const floor = {x: 0, y: 570, w: W, h: 30};
let activePlatforms = [floor];

function showDialogue(text) {
    isPaused = true;
    document.getElementById('msg-layer').style.display = 'flex';
    document.getElementById('msg-box').innerText = text;
}

function resumeGame() {
    isPaused = false;
    document.getElementById('msg-layer').style.display = 'none';
    safetyTimer = 120; // 猶予時間を2秒に増加
}

function update() {
    if(!gameActive || isPaused) {
        if(isPaused) draw();
        requestAnimationFrame(update);
        return;
    }
    frame++;
    if(shake > 0) shake--;
    if(safetyTimer > 0) safetyTimer--;

    if(keys['ArrowLeft'] || keys['l-btn']) player.vx = -7;
    else if(keys['ArrowRight'] || keys['r-btn']) player.vx = 7;
    else player.vx *= 0.8;
    if((keys['ArrowUp'] || keys['j-btn']) && player.grounded) { player.vy = -14.5; player.grounded = false; }
    player.vy += 0.7; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    activePlatforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    if(bossPhase === 1 && bossHp < 75) {
        bossPhase = 2; document.getElementById('phase-label').innerText = "第二形態";
        showDialogue("ふむ… 少しはやるようだな。\nゆっくり相手をしてやろう。");
    } else if(bossPhase === 2 && bossHp < 35) {
        bossPhase = 3; shake = 30; document.getElementById('phase-label').innerText = "最終形態";
        showDialogue("遊びは終わりだ。\nだが、焦る必要はない…");
    }

    if(safetyTimer <= 0) {
        if(stage === 1) {
            bossHp -= 0.035;
            if(frame % 250 === 0) { s1_subPhase = (s1_subPhase + 1) % 3; bones = []; warnings = []; }
            
            if(s1_subPhase === 0) { // 下から（頻度ダウン）
                if(frame % 60 === 0) {
                    let rx = Math.random()*(W-100);
                    warnings.push({x: rx, y: 0, w: 40, h: H, timer: 60, type: 'column'});
                    setTimeout(() => { if(!isPaused && gameActive) bones.push({ x: rx+5, y: 600, w: 30, h: 250, targetY: 400, vx: 0, vy: 0, timer: 30, life: 70 }); }, 1000);
                }
            } else if(s1_subPhase === 1) { // 狙い撃ち（ガイドライン追加）
                if(frame % 50 === 0) {
                    const side = Math.floor(Math.random() * 4);
                    let bx = side===2?-50:side===3?W+50:Math.random()*W;
                    let by = side===0?-50:side===1?H+50:Math.random()*H;
                    const angle = Math.atan2((player.y+13)-by, (player.x+13)-bx);
                    // 予兆線を追加
                    warnings.push({x: bx, y: by, tx: player.x+13, ty: player.y+13, timer: 50, type: 'line'});
                    setTimeout(() => { if(!isPaused && gameActive) bones.push({ x: bx, y: by, w: 20, h: 20, vx: Math.cos(angle)*7, vy: Math.sin(angle)*7, life: 180 }); }, 800);
                }
            } else { // 横から（低速化）
                if(frame % 65 === 0) bones.push({ x: W, y: 520, w: 25, h: 50, vx: -8, vy: 0, life: 150 });
            }

            if(bossHp <= 50) { 
                stage = 2; bossHp = 50; bones = []; warnings = [];
                // 障害物を少なく（2つだけに削減）
                activePlatforms.push({x: 300, y: 400, w: 200, h: 14, isSpecial: true}, {x: 700, y: 400, w: 200, h: 14, isSpecial: true});
            }
        } else {
            // ボス戦（低速化）
            const intensity = bossPhase === 1 ? 0.8 : (bossPhase === 2 ? 1.2 : 1.6);
            boss.y += (boss.targetY - boss.y) * 0.03;
            if(frame % 80 === 0) boss.targetY = Math.random() * 350 + 50;
            if(frame % Math.floor(120/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -5 * intensity, vy: (Math.random()-0.5)*5, type: 'reflect', size: 38 });
            if(frame % Math.floor(40/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -10 * intensity, vy: (Math.random()-0.5)*8, type: 'normal', size: 10 });
        }
    }

    warnings.forEach((w, i) => { w.timer--; if(w.timer <= 0) warnings.splice(i, 1); });
    bones.forEach((b, i) => {
        if(b.vx === 0 && b.vy === 0) { b.timer--; if(b.timer < 0) b.y += (b.targetY - b.y) * 0.3; if(b.timer < -20) b.y += 20; }
        else { b.x += b.vx; b.y += b.vy; }
        if(player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) hp -= 3;
        b.life--; if(b.life <= 0 || b.y > 650) bones.splice(i, 1);
    });

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.2; b.y += (boss.y + 50 - b.y) * 0.2;
            if(Math.abs(b.x - (boss.x + 50)) < 60) { bullets.splice(i, 1); bossHp -= 10; shake = 10; }
        } else {
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x - b.x) < 70 && Math.abs(player.y + 26 - b.y) < 60) { b.type = 'returned'; player.vy = -14; }
            else if(Math.abs(player.x + 13 - b.x) < 22 && Math.abs(player.y + 13 - b.y) < 22) { bullets.splice(i, 1); hp -= 12; }
        }
        if(b.x < -100 || b.x > W + 100) bullets.splice(i, 1);
    });

    document.getElementById('p-hp').style.width = hp + "%";
    document.getElementById('b-hp').style.width = (bossHp * 2) + "%";
    if(hp <= 0) showResult(false);
    if(bossHp <= 0) showResult(true);
    draw();
    requestAnimationFrame(update);
}

function draw() {
    let sx = (Math.random()-0.5) * shake;
    let sy = (Math.random()-0.5) * shake;
    ctx.setTransform(1, 0, 0, 1, sx, sy);
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);

    warnings.forEach(w => {
        if(w.type === 'column') {
            let a = (Math.sin(frame * 0.3) * 0.15) + 0.2;
            ctx.fillStyle = `rgba(255, 0, 0, ${a})`; ctx.fillRect(w.x, 0, w.w, H);
        } else if(w.type === 'line') {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
            ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(w.x, w.y); ctx.lineTo(w.tx, w.ty); ctx.stroke();
        }
    });

    activePlatforms.forEach(p => {
        if(p.isSpecial) {
            ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
            ctx.fillStyle = "#00ffff"; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.shadowBlur = 0; ctx.strokeStyle = "#fff"; ctx.strokeRect(p.x, p.y, p.w, p.h);
        } else { ctx.fillStyle = "#fff"; ctx.fillRect(p.x, p.y, p.w, p.h); }
    });

    ctx.fillStyle = "#f00"; ctx.beginPath();
    ctx.moveTo(player.x + 13, player.y + 26);
    ctx.bezierCurveTo(player.x - 5, player.y + 10, player.x + 5, player.y - 5, player.x + 13, player.y + 5);
    ctx.bezierCurveTo(player.x + 21, player.y - 5, player.x + 31, player.y + 10, player.x + 13, player.y + 26);
    ctx.fill();

    if(stage === 2) {
        ctx.fillStyle = bossPhase === 3 ? (frame % 10 < 5 ? "#f00" : "#fff") : (bossPhase === 2 ? "#ff0" : "#fff");
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4; ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
    }

    ctx.fillStyle = "#fff";
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#ff0" : b.type === 'returned' ? "#0f0" : "#f00";
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });

    if(stage === 1 && safetyTimer <= 0 && frame % 250 < 80) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
        let msg = ["赤い柱を避けよう", "白い線に骨が飛んでくるぞ", "骨を飛び越えよう"][s1_subPhase];
        ctx.fillText(msg, W/2, H/2 - 50); ctx.textAlign = "left";
    }
    if(safetyTimer > 0) {
        ctx.fillStyle = "#ffff00"; ctx.font = "bold 45px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("READY?", W/2, H/2); ctx.textAlign = "left";
    }
    ctx.setTransform(1, 0, 0, 1, 0, 0);
}

function showResult(isWin) {
    gameActive = false; document.getElementById('overlay').style.display = 'flex'; 
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('result-title').innerText = isWin ? "勝利！" : "また挑戦しよう";
    document.getElementById('result-stats').innerText = `生存時間: ${((Date.now()-startTime)/1000).toFixed(2)}秒`;
}

function start() {
    if(!gameActive) {
        if(document.getElementById('result-screen').style.display === 'block') { location.reload(); return; }
        document.getElementById('overlay').style.display = 'none'; 
        gameActive = true; startTime = Date.now(); update();
    }
}

document.getElementById('overlay').addEventListener('pointerdown', start);
window.addEventListener('keydown', e => { keys[e.code] = true; start(); });
window.addEventListener('keyup', e => keys[e.code] = false);
const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[id] = true; start(); });
    el.addEventListener('pointerup', () => keys[id] = false);
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);
draw();
</script>
</body>
</html>
