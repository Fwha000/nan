<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS: THE FINAL ATTACK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-container { position: relative; width: 600px; height: 500px; margin-top: 10px; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; }
        #dialog-box { width: 580px; height: 70px; border: 4px solid #fff; margin-top: 5px; padding: 8px; font-size: 20px; background: #000; box-sizing: border-box; overflow: hidden;}
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn { padding: 8px 25px; font-size: 18px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; margin-top: 15px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; width: 600px; }
        .btn-ctrl { height: 55px; border: 2px solid #fff; background: #111; color: #fff; font-size: 18px; font-family: inherit; }
    </style>
</head>
<body>

<div id="ui">
    <div id="turn-info">PHASE: 1</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-container">
    <div id="game-box">
        <div id="start-screen" class="overlay">
            <h1 style="font-size: 32px;">* 決着をつけようぜ。</h1>
            <button class="btn" onclick="init()">地獄へ行く</button>
        </div>
        <div id="death-screen" class="overlay" style="display: none;">
            <h1 style="color: #f00;">* 諦めるな。</h1>
            <button class="btn" onclick="location.reload()">再挑戦</button>
        </div>
        <canvas id="c"></canvas>
    </div>
    <div id="dialog-box">* 用意はいいか？</div>
</div>

<div class="controls">
    <button class="btn-ctrl" id="l">←</button>
    <button class="btn-ctrl" id="j">JUMP</button>
    <button class="btn-ctrl" id="r">→</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let p, hp, bones, blasters, warns, frame, active, keys, shake = 0, flash = 0;
let phase = 1, phaseTimer = 0, spiralAngle = 0;

const script = [
    "* 驚いたな、まだやる気か。",
    "* 少し... 攻撃を荒くしてみよう。",
    "* はあ... はあ... 息が切れてきたぜ。",
    "* ...これでおしまいだ！死ね！！",
    "* ...逃がさない。ずっと俺のターンだ。"
];

function init() {
    p = { x: 290, y: 300, w: 16, h: 16, vx: 0, vy: 0, ground: false, mode: 'normal' };
    hp = 92; bones = []; blasters = []; warns = []; frame = 0; keys = {};
    active = true; phase = 1; phaseTimer = 300; spiralAngle = 0;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    msg(script[0]);
    loop();
}

function msg(text) {
    let i = 0; document.getElementById('dialog-box').innerText = "";
    const t = setInterval(() => {
        document.getElementById('dialog-box').innerText += text[i++];
        if(i >= text.length) clearInterval(t);
    }, 40);
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;
    if (shake > 0) shake *= 0.9;
    if (flash > 0) flash -= 0.04;

    // 移動
    let grav = (p.mode === 'blue') ? 1.3 : 0.85;
    if (keys['l']) p.vx = -7.5; else if (keys['r']) p.vx = 7.5; else p.vx *= 0.8;
    if (keys['j'] && p.ground) { p.vy = -16; p.ground = false; }
    p.vy += grav; p.x += p.vx; p.y += p.vy;
    if (p.y > 380 - p.h) { p.y = 380 - p.h; p.vy = 0; p.ground = true; }
    p.x = Math.max(0, Math.min(600 - p.w, p.x));

    // フェーズ進行
    phaseTimer--;
    if (phaseTimer <= 0) {
        phase++;
        phaseTimer = 400 - (phase * 30); // 次第に短くなる
        if(phase <= 5) msg(script[phase-1] || script[4]);
        p.mode = (phase >= 3 && Math.random() > 0.4) ? 'blue' : 'normal';
        document.getElementById('turn-info').innerText = "PHASE: " + phase;
    }

    // --- 攻撃パターン ---
    
    // 通常の骨 (PHASE 1-4)
    if (frame % (Math.max(60, 140 - phase*15)) === 1 && phase < 5) {
        let s = Math.floor(Math.random() * 5);
        for(let i=0; i<6; i++) { if(i!==s && i!==s+1) warns.push({x:i*100, w:100, t:50}); }
    }

    // 八方渦巻きブラスター (PHASE 4以降)
    if (phase >= 4 && frame % 15 === 0) {
        spiralAngle += 0.4;
        let bx = 300 + Math.cos(spiralAngle) * 150;
        let by = 200 + Math.sin(spiralAngle) * 150;
        blasters.push({ x: bx, y: by, tx: 300, ty: 200, timer: 40, beam: 0, rot: spiralAngle + Math.PI });
    }

    // 追尾ブラスター (PHASE 2-4)
    if (phase >= 2 && phase < 5 && frame % 180 === 0) {
        blasters.push({ x: p.x, y: -50, tx: p.x, ty: 60, timer: 60, beam: 0, rot: Math.PI/2 });
    }

    // 衝突判定更新
    warns.forEach((w, i) => { 
        w.t--; if(w.t === 0) { bones.push({x:w.x+5, y:410, w:90, h:300, timer:0}); warns.splice(i, 1); }
    });
    bones.forEach((b, i) => {
        b.timer++; b.y += (b.timer < 15) ? -22 : (b.timer > 40) ? 18 : 0;
        if(p.x+4 < b.x+b.w && p.x+p.w-4 > b.x && p.y+4 < b.y+b.h && p.y+p.h-4 > b.y) { hp -= 1; shake = 8; }
        if(b.timer > 60) bones.splice(i, 1);
    });
    blasters.forEach((b, i) => {
        b.timer--;
        if(b.timer === 0) { b.beam = 15; shake = 10; if(phase >= 4) flash = 0.3; }
        if(b.beam > 0) {
            b.beam--;
            // ビームの当たり判定 (回転を考慮した簡易計算)
            let dx = p.x + 8 - b.x; let dy = p.y + 8 - b.y;
            let dist = Math.abs(dx * Math.sin(-b.rot) + dy * Math.cos(-b.rot));
            if(dist < 30) hp -= 2;
        }
        if(b.timer < -20) blasters.splice(i, 1);
    });

    // UI
    let dHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-bar-fill').style.width = (dHp/92*100) + "%";
    document.getElementById('hp-num').innerText = dHp;
    if (hp <= 0 && active) { active = false; document.getElementById('death-screen').style.display = 'flex'; }
}

function draw() {
    ctx.save();
    if(shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,600,400);

    warns.forEach(w => { ctx.fillStyle = `rgba(255,0,0,0.3)`; ctx.fillRect(w.x,0,w.w,380); });
    ctx.fillStyle = '#fff'; bones.forEach(b => { ctx.fillRect(b.x,b.y,b.w,b.h); });

    blasters.forEach(b => {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.rot - Math.PI/2);
        ctx.fillStyle = (b.timer < 15 && b.timer > 0 && frame % 4 < 2) ? '#f00' : '#fff';
        ctx.fillRect(-20, -20, 40, 40); // ヘッド
        if(b.beam > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(-30, 20, 60, 800);
            ctx.fillStyle = '#0ff'; ctx.fillRect(-10, 20, 20, 800);
        }
        ctx.restore();
    });

    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20);
    ctx.fillStyle = (p.mode === 'blue') ? '#22f' : '#f00';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    if(flash > 0) { ctx.fillStyle = `rgba(255,255,255,${flash})`; ctx.fillRect(0,0,600,400); }
    ctx.restore();
}

const setup = (id) => {
    const e = document.getElementById(id);
    e.onpointerdown = (ev) => { ev.preventDefault(); keys[id] = true; };
    e.onpointerup = (ev) => { ev.preventDefault(); keys[id] = false; };
};
['l','r','j'].forEach(setup);
window.onkeydown = e => { if(e.key==='ArrowLeft') keys['l']=true; if(e.key==='ArrowRight') keys['r']=true; if(e.key==='ArrowUp'||e.key===' ') keys['j']=true; };
window.onkeyup = e => { if(e.key==='ArrowLeft') keys['l']=false; if(e.key==='ArrowRight') keys['r']=false; if(e.key==='ArrowUp'||e.key===' ') keys['j']=false; };
</script>
</body>
</html>
