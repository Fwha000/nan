<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS: ZERO GRAVITY - JUDGEMENT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-container { position: relative; width: 600px; height: 500px; margin-top: 10px; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; transition: width 0.1s; }
        #dialog-box { width: 580px; height: 70px; border: 4px solid #fff; margin-top: 5px; padding: 8px; font-size: 20px; background: #000; box-sizing: border-box; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { padding: 10px 30px; font-size: 20px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; margin-top: 15px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; width: 600px; }
        .btn-ctrl { height: 60px; border: 2px solid #fff; background: #111; color: #fff; font-family: inherit; font-size: 18px; touch-action: none; }
    </style>
</head>
<body>

<div id="ui">
    <div id="phase-display">PHASE: 1</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span>/92
    </div>
</div>

<div id="game-container">
    <div id="game-box">
        <div id="start-screen" class="overlay">
            <h1 style="font-size: 30px;">* 無重力なら避けられるか？</h1>
            <button class="btn" onclick="init()">地獄の始まり</button>
        </div>
        <div id="death-screen" class="overlay" style="display: none;">
            <h1 style="color: #f00;">GAME OVER</h1>
            <button class="btn" onclick="location.reload()">RETRY</button>
        </div>
        <canvas id="c"></canvas>
    </div>
    <div id="dialog-box">* 用意はいいか。</div>
</div>

<div class="controls">
    <div style="grid-column: 2;"><button class="btn-ctrl" style="width:100%" id="u">↑</button></div>
    <button class="btn-ctrl" id="l">←</button>
    <button class="btn-ctrl" id="d">↓</button>
    <button class="btn-ctrl" id="r">→</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let p, hp, bones, blasters, warns, frame, active, keys, shake = 0, flash = 0;
let phase = 1, phaseTimer = 400, spiralAngle = 0;

function init() {
    p = { x: 290, y: 190, w: 16, h: 16, vx: 0, vy: 0 };
    hp = 92; bones = []; blasters = []; warns = []; frame = 0; keys = {};
    active = true; phase = 1; phaseTimer = 400;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    msg("* ...無重力にしてやったぜ。");
    loop();
}

function msg(text) {
    let i = 0; document.getElementById('dialog-box').innerText = "";
    const t = setInterval(() => {
        document.getElementById('dialog-box').innerText += text[i++];
        if(i >= text.length) clearInterval(t);
    }, 40);
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;
    if (shake > 0) shake *= 0.9;
    if (flash > 0) flash -= 0.05;

    // 自由移動 (無重力)
    let speed = 6.5;
    if (keys['l']) p.vx = -speed; else if (keys['r']) p.vx = speed; else p.vx *= 0.8;
    if (keys['u']) p.vy = -speed; else if (keys['d']) p.vy = speed; else p.vy *= 0.8;
    p.x += p.vx; p.y += p.vy;
    p.x = Math.max(0, Math.min(600 - p.w, p.x));
    p.y = Math.max(0, Math.min(400 - p.h, p.y));

    // フェーズ進行
    phaseTimer--;
    if (phaseTimer <= 0) {
        phase++;
        phaseTimer = 450;
        document.getElementById('phase-display').innerText = "PHASE: " + phase;
        if(phase === 2) msg("* 避けるのが得意みたいだな。");
        if(phase === 3) msg("* ...じゃあ、これはどうだ？");
        if(phase === 4) msg("* ハハッ！ 荒くなってきだろう？");
        if(phase === 5) msg("* ...これで終わりだ！死ね！！");
    }

    // --- 攻撃生成ロジック ---

    // 骨のクロス攻撃 (横からも来る)
    if (frame % 120 === 1) {
        let safe = Math.floor(Math.random() * 5);
        for(let i=0; i<6; i++) {
            if(i !== safe) warns.push({x: i*100, y:0, w:100, h:400, t:50, type:'v'});
        }
        if(phase >= 3 && frame % 240 === 1) { // 横骨
            let safeH = Math.floor(Math.random() * 3);
            for(let i=0; i<4; i++) {
                if(i !== safeH) warns.push({x: 0, y: i*100, w:600, h:100, t:60, type:'h'});
            }
        }
    }

    // 渦巻きブラスター (PHASE 4以降)
    if (phase >= 4 && frame % (20 - phase) === 0) {
        spiralAngle += 0.35;
        let bx = 300 + Math.cos(spiralAngle) * 180;
        let by = 200 + Math.sin(spiralAngle) * 180;
        blasters.push({ x: bx, y: by, rot: spiralAngle + Math.PI, timer: 35, beam: 0 });
    }

    // 追尾ブラスター
    if (frame % 200 === 0 && phase < 5) {
        blasters.push({ x: p.x, y: -50, rot: Math.PI/2, timer: 55, beam: 0, follow: true });
    }

    // 衝突判定とクリーンアップ
    warns.forEach((w, i) => {
        w.t--;
        if(w.t === 0) {
            bones.push({ x: w.x, y: w.y, w: w.w, h: w.h, type: w.type, timer: 0 });
            warns.splice(i, 1);
        }
    });

    bones.forEach((b, i) => {
        b.timer++;
        // 突き出し演出
        let offset = (b.timer < 15) ? (b.timer * 6) : (b.timer > 40) ? (60 - (b.timer-40)*10) : 90;
        let hit = false;
        if(b.type === 'v') hit = (p.x+2 < b.x+b.w-2 && p.x+p.w-2 > b.x+2 && p.y < 400 && p.y+p.h > 400-offset);
        else hit = (p.y+2 < b.y+b.h-2 && p.y+p.h-2 > b.y+2 && p.x < offset);

        if(hit) { hp -= 1.5; shake = 8; }
        if(b.timer > 55) bones.splice(i, 1);
    });

    blasters.forEach((b, i) => {
        if(b.follow && b.timer > 15) b.x += (p.x - b.x) * 0.1;
        b.timer--;
        if(b.timer === 0) { b.beam = 15; shake = 15; flash = 0.4; }
        if(b.beam > 0) {
            b.beam--;
            let dx = p.x + 8 - b.x, dy = p.y + 8 - b.y;
            let dist = Math.abs(dx * Math.sin(-b.rot) + dy * Math.cos(-b.rot));
            if(dist < 32) hp -= 2.5;
        }
        if(b.timer < -15) blasters.splice(i, 1);
    });

    let dHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-bar-fill').style.width = (dHp/92*100) + "%";
    document.getElementById('hp-num').innerText = dHp;
    if (hp <= 0 && active) { active = false; document.getElementById('death-screen').style.display = 'flex'; }
}

function draw() {
    ctx.save();
    if(shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,600,400);

    // 警告
    warns.forEach(w => {
        ctx.fillStyle = `rgba(255,0,0,${0.2 + Math.sin(frame*0.2)*0.1})`;
        ctx.fillRect(w.x, w.y, w.w, w.h);
    });

    // 骨
    ctx.fillStyle = '#fff';
    bones.forEach(b => {
        let offset = (b.timer < 15) ? (b.timer * 6) : (b.timer > 40) ? (90 - (b.timer-40)*15) : 90;
        if(b.type === 'v') ctx.fillRect(b.x+5, 400-offset, b.w-10, offset);
        else ctx.fillRect(0, b.y+5, offset, b.h-10);
    });

    // ブラスター
    blasters.forEach(b => {
        ctx.save();
        ctx.translate(b.x, b.y); ctx.rotate(b.rot - Math.PI/2);
        ctx.fillStyle = (b.timer < 15 && b.timer > 0 && frame % 4 < 2) ? '#f00' : '#fff';
        ctx.fillRect(-22, -22, 44, 44);
        if(b.beam > 0) {
            ctx.fillStyle = '#fff'; ctx.fillRect(-35, 20, 70, 1000);
            ctx.fillStyle = '#0ff'; ctx.fillRect(-12, 20, 24, 1000);
        }
        ctx.restore();
    });

    // ソウル
    ctx.fillStyle = '#f00'; ctx.beginPath();
    ctx.fillRect(p.x, p.y, p.w, p.h);

    if(flash > 0) { ctx.fillStyle = `rgba(255,255,255,${flash})`; ctx.fillRect(0,0,600,400); }
    ctx.restore();
}

const setup = (id) => {
    const e = document.getElementById(id);
    const start = (ev) => { ev.preventDefault(); keys[id] = true; };
    const end = (ev) => { ev.preventDefault(); keys[id] = false; };
    e.addEventListener('pointerdown', start);
    e.addEventListener('pointerup', end);
    e.addEventListener('pointerleave', end);
};
['u','d','l','r'].forEach(setup);
window.onkeydown = e => { 
    if(e.key==='ArrowUp') keys['u']=true; if(e.key==='ArrowDown') keys['d']=true;
    if(e.key==='ArrowLeft') keys['l']=true; if(e.key==='ArrowRight') keys['r']=true;
};
window.onkeyup = e => { 
    if(e.key==='ArrowUp') keys['u']=false; if(e.key==='ArrowDown') keys['d']=false;
    if(e.key==='ArrowLeft') keys['l']=false; if(e.key==='ArrowRight') keys['r']=false;
};
</script>
</body>
</html>
