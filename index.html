<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAD TIME SIMULATOR - VISIBLE EDITION</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 5px solid #fff; margin-top: 50px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: flex-start; align-items: center; font-weight: bold; font-size: 18px; }
        #hp-container { display: flex; align-items: center; margin-left: 20px; }
        #hp-bar { width: 100px; height: 20px; background: #f00; margin: 0 10px; border: 2px solid #fff; }
        #hp-inner { width: 100%; height: 100%; background: #ff0; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn-retry { margin-top: 20px; padding: 10px 30px; font-size: 20px; border: 3px solid #fff; background: #000; color: #fff; cursor: pointer; }
        .btn-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; width: 600px; }
        .btn-control { height: 70px; border: 2px solid #fff; background: #111; color: #fff; font-size: 20px; border-radius: 8px; }
        .btn-control:active { background: #fff; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <span id="stage-text">PHASE 1</span>
    <div id="hp-container">
        HP <div id="hp-bar"><div id="hp-inner"></div></div> <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1 style="font-size: 24px;">* focus on the red zones.</h1>
        <button class="btn-retry" onclick="resetGame()">START</button>
    </div>
    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00; font-size: 24px;">* stay determined.</h1>
        <button class="btn-retry" onclick="resetGame()">RETRY</button>
    </div>
    <div id="win-screen" class="overlay" style="display: none;">
        <h1 style="color: #0f0; font-size: 24px;">* amazing.</h1>
        <button class="btn-retry" onclick="resetGame()">PLAY AGAIN</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div class="btn-container">
    <button class="btn-control" id="l">LEFT</button>
    <button class="btn-control" id="j">JUMP</button>
    <button class="btn-control" id="r">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let player, hp, bones, warnings, frame, active, keys, stage, lastAttackTime;

function resetGame() {
    player = { x: 290, y: 300, w: 18, h: 18, vx: 0, vy: 0, grounded: false };
    hp = 92;
    bones = [];
    warnings = [];
    frame = 0;
    stage = 1;
    lastAttackTime = 0;
    keys = {};
    active = true;
    
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'none';
    
    if (window.gameLoop) cancelAnimationFrame(window.gameLoop);
    loop();
}

function createBone(x, y, w, h, vx, vy, life) {
    bones.push({ x, y, w, h, vx, vy, life });
}

function addWarning(x, w, duration) {
    warnings.push({ x, w, timer: duration, maxTimer: duration });
}

function loop() {
    if (!active) return;
    update();
    draw();
    window.gameLoop = requestAnimationFrame(loop);
}

function update() {
    frame++;

    // プレイヤー物理
    if (keys['l']) player.vx = -6;
    else if (keys['r']) player.vx = 6;
    else player.vx *= 0.8;
    
    if (keys['j'] && player.grounded) {
        player.vy = -14;
        player.grounded = false;
    }
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;

    if (player.y > 380 - player.h) {
        player.y = 380 - player.h;
        player.vy = 0;
        player.grounded = true;
    }
    player.x = Math.max(0, Math.min(600 - player.w, player.x));

    // フェーズ管理
    if (frame < 1000) stage = 1;
    else if (frame < 2200) stage = 2;
    else if (frame < 3500) stage = 3;
    else { active = false; document.getElementById('win-screen').style.display = 'flex'; }
    document.getElementById('stage-text').innerText = "PHASE " + stage;

    // --- 攻撃ロジック (インターバルを120フレーム＝2秒確保) ---
    let timeSinceLast = frame - lastAttackTime;

    if (stage === 1 && timeSinceLast > 120) {
        let gap = 50 + Math.random() * 400;
        addWarning(0, gap, 60);
        addWarning(gap + 100, 600 - gap - 100, 60);
        lastAttackTime = frame;
        setTimeout(() => {
            if(!active || stage !== 1) return;
            createBone(0, 400, gap, 320, 0, -15, 40);
            createBone(gap + 100, 400, 600 - gap - 100, 320, 0, -15, 40);
        }, 1000); // 予告から1秒後に攻撃
    }

    if (stage === 2 && timeSinceLast > 80) {
        let side = Math.random() > 0.5 ? -40 : 640;
        createBone(side, 340, 20, 40, side < 0 ? 8 : -8, 0, 150);
        lastAttackTime = frame;
    }

    if (stage === 3 && timeSinceLast > 100) {
        // 予告付きのランダム突き上げ
        let rx = Math.random() * 500;
        addWarning(rx, 80, 50);
        lastAttackTime = frame;
        setTimeout(() => {
            if(!active) return;
            createBone(rx, 400, 80, 280, 0, -20, 40);
        }, 850);
    }

    // 衝突判定と更新
    warnings.forEach((w, i) => { 
        w.timer--; 
        if (w.timer <= 0) warnings.splice(i, 1); 
    });

    bones.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        b.life--;
        // プレイヤーの当たり判定を少し小さくして遊びやすく
        if (player.x + 4 < b.x + b.w && player.x + player.w - 4 > b.x && 
            player.y + 4 < b.y + b.h && player.y + player.h - 4 > b.y) {
            hp -= 0.8; 
        }
        if (b.life <= 0) bones.splice(i, 1);
    });

    // UI更新
    let displayHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-inner').style.width = (displayHp / 92 * 100) + "%";
    document.getElementById('hp-num').innerText = displayHp;

    if (hp <= 0 && active) {
        active = false;
        document.getElementById('death-screen').style.display = 'flex';
    }
}

function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 600, 400);

    // 床
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 380, 600, 20);

    // 予告エリアの描画（太い帯状に）
    warnings.forEach(w => {
        let opacity = (w.timer / w.maxTimer) * 0.5;
        ctx.fillStyle = `rgba(255, 0, 0, ${opacity})`;
        ctx.fillRect(w.x, 0, w.w, 380);
        // 床の部分に濃い予告線
        ctx.fillStyle = 'red';
        ctx.fillRect(w.x, 375, w.w, 5);
    });

    // 骨の描画
    ctx.fillStyle = '#fff';
    bones.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
        // 骨の先端を少し強調
        ctx.fillStyle = '#ddd';
        ctx.fillRect(b.x, b.y, b.w, 5);
        ctx.fillStyle = '#fff';
    });

    // プレイヤー（ハート）
    ctx.fillStyle = '#f00';
    ctx.fillRect(player.x, player.y, player.w, player.h);
}

// ボタン入力
const setupBtn = (id) => {
    const btn = document.getElementById(id);
    btn.onpointerdown = (e) => { e.preventDefault(); keys[id] = true; };
    btn.onpointerup = (e) => { e.preventDefault(); keys[id] = false; };
};
['l', 'r', 'j'].forEach(setupBtn);

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') keys['l'] = true;
    if (e.key === 'ArrowRight') keys['r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = true;
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') keys['l'] = false;
    if (e.key === 'ArrowRight') keys['r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = false;
};
</script>
</body>
</html>
