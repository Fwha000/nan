<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAD TIME SIMULATOR - FAIR EDITION</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 5px solid #fff; margin-top: 50px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: flex-start; align-items: center; font-weight: bold; font-size: 18px; }
        #hp-container { display: flex; align-items: center; margin-left: 20px; }
        #hp-bar { width: 100px; height: 20px; background: #f00; margin: 0 10px; border: 2px solid #fff; }
        #hp-inner { width: 100%; height: 100%; background: #ff0; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn-retry { margin-top: 20px; padding: 10px 30px; font-size: 20px; border: 3px solid #fff; background: #000; color: #fff; cursor: pointer; }
        .btn-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; width: 600px; }
        .btn-control { height: 60px; border: 2px solid #fff; background: #000; color: #fff; font-size: 18px; }
    </style>
</head>
<body>

<div id="ui">
    <span id="stage-text">PHASE 1</span>
    <div id="hp-container">
        HP <div id="hp-bar"><div id="hp-inner"></div></div> <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1 style="font-size: 22px;">* use your intuition.</h1>
        <button class="btn-retry" onclick="resetGame()">START</button>
    </div>
    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00; font-size: 24px;">* don't give up.</h1>
        <button class="btn-retry" onclick="resetGame()">RETRY</button>
    </div>
    <div id="win-screen" class="overlay" style="display: none;">
        <h1 style="color: #0f0; font-size: 24px;">* you made it.</h1>
        <button class="btn-retry" onclick="resetGame()">PLAY AGAIN</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div class="btn-container">
    <button class="btn-control" id="l">LEFT</button>
    <button class="btn-control" id="j">JUMP</button>
    <button class="btn-control" id="r">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let player, hp, bones, warnings, frame, active, keys, stage;

function resetGame() {
    player = { x: 290, y: 300, w: 20, h: 20, vx: 0, vy: 0, grounded: false };
    hp = 92;
    bones = [];
    warnings = [];
    frame = 0;
    stage = 1;
    keys = {};
    active = true;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    document.getElementById('win-screen').style.display = 'none';
    if (window.gameLoop) cancelAnimationFrame(window.gameLoop);
    loop();
}

function createBone(x, y, w, h, vx, vy, life) {
    bones.push({ x, y, w, h, vx, vy, life });
}

function addWarning(x, w, delay) {
    warnings.push({ x, w, timer: delay });
}

function loop() {
    if (!active) return;
    update();
    draw();
    window.gameLoop = requestAnimationFrame(loop);
}

function update() {
    frame++;
    if (keys['l']) player.vx = -6;
    else if (keys['r']) player.vx = 6;
    else player.vx *= 0.8;
    if (keys['j'] && player.grounded) { player.vy = -13; player.grounded = false; }
    player.vy += 0.7;
    player.x += player.vx;
    player.y += player.vy;
    if (player.y > 380 - player.h) { player.y = 380 - player.h; player.vy = 0; player.grounded = true; }
    player.x = Math.max(0, Math.min(600 - player.w, player.x));

    // ステージ管理
    if (frame < 1000) stage = 1;
    else if (frame < 2200) stage = 2;
    else if (frame < 3500) stage = 3;
    else { active = false; document.getElementById('win-screen').style.display = 'flex'; }
    document.getElementById('stage-text').innerText = "PHASE " + stage;

    // --- PHASE 1: 予告付き突き上げ ---
    if (stage === 1 && frame % 80 === 0) {
        let gapX = 50 + Math.random() * 450;
        // 予告を出す
        addWarning(0, gapX - 10, 40);
        addWarning(gapX + 100, 600 - gapX - 100, 40);
        // 40フレーム後に骨を出す
        setTimeout(() => {
            if(!active || stage !== 1) return;
            createBone(0, 400, gapX - 10, 300, 0, -10, 50);
            createBone(gapX + 100, 400, 600 - gapX - 100, 300, 0, -10, 50);
        }, 650);
    }

    // --- PHASE 2: スライド骨 (ジャンプで避ける) ---
    if (stage === 2 && frame % 50 === 0) {
        let isLeft = Math.random() > 0.5;
        createBone(isLeft ? -40 : 640, 330, 30, 50, isLeft ? 7 : -7, 0, 120);
    }

    // --- PHASE 3: 複合攻撃 ---
    if (stage === 3) {
        if (frame % 70 === 0) {
            let rx = Math.random() * 550;
            addWarning(rx, 50, 30);
            setTimeout(() => { if(active) createBone(rx, 400, 50, 250, 0, -15, 40); }, 500);
        }
        if (frame % 40 === 0) {
            createBone(640, 340, 20, 40, -9, 0, 100);
        }
    }

    // 衝突・更新
    warnings.forEach((w, i) => { w.timer--; if (w.timer <= 0) warnings.splice(i, 1); });
    bones.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy; b.life--;
        if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) hp -= 1.2;
        if (b.life <= 0) bones.splice(i, 1);
    });

    let displayHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-inner').style.width = (displayHp / 92 * 100) + "%";
    document.getElementById('hp-num').innerText = displayHp;
    if (hp <= 0 && active) { active = false; document.getElementById('death-screen').style.display = 'flex'; }
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20);

    // 予告線の描画
    warnings.forEach(w => {
        ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
        ctx.fillRect(w.x, 375, w.w, 5);
    });

    ctx.fillStyle = '#fff';
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
    ctx.fillStyle = '#f00'; ctx.fillRect(player.x, player.y, player.w, player.h);
}

const setupBtn = (id) => {
    const btn = document.getElementById(id);
    btn.onpointerdown = (e) => { e.preventDefault(); keys[id] = true; };
    btn.onpointerup = (e) => { e.preventDefault(); keys[id] = false; };
};
['l', 'r', 'j'].forEach(setupBtn);

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') keys['l'] = true;
    if (e.key === 'ArrowRight') keys['r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = true;
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') keys['l'] = false;
    if (e.key === 'ArrowRight') keys['r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = false;
};
</script>
</body>
</html>
