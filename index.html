<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS FIGHT - REFINED BATTLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; margin-top: 20px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn { padding: 10px 30px; font-size: 20px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; margin-top: 20px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="status">TURN BASED BATTLE</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1>* 交互に攻撃してくるようだ。</h1>
        <button class="btn" onclick="init()">はじめる</button>
    </div>
    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00;">GAME OVER</h1>
        <button class="btn" onclick="init()">リトライ</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; width: 600px;">
    <button class="btn" style="height:80px" id="l">←</button>
    <button class="btn" style="height:80px" id="j">JUMP</button>
    <button class="btn" style="height:80px" id="r">→</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let p, hp, bones, blasters, frame, active, keys, shake = 0, flash = 0;
let attackPhase = 0; // 0: 待機, 1: 骨, 2: ビーム
let phaseTimer = 0;

function init() {
    p = { x: 290, y: 300, w: 16, h: 16, vx: 0, vy: 0, ground: false };
    hp = 92; bones = []; blasters = []; frame = 0; keys = {};
    active = true; attackPhase = 0; phaseTimer = 0;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    loop();
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;
    if (shake > 0) shake *= 0.9;
    if (flash > 0) flash -= 0.1;

    // 移動ロジック
    if (keys['l']) p.vx = -7.5; else if (keys['r']) p.vx = 7.5; else p.vx *= 0.8;
    if (keys['j'] && p.ground) { p.vy = -16; p.ground = false; }
    p.vy += 0.9; p.x += p.vx; p.y += p.vy;
    if (p.y > 380 - p.h) { p.y = 380 - p.h; p.vy = 0; p.ground = true; }
    p.x = Math.max(0, Math.min(600 - p.w, p.x));

    // フェーズ管理（交互に攻撃を出す）
    phaseTimer--;
    if (phaseTimer <= 0) {
        attackPhase = attackPhase === 1 ? 2 : 1;
        phaseTimer = 180; // 次のフェーズまでの間隔
        if (attackPhase === 1) spawnBones();
        if (attackPhase === 2) spawnBlaster();
    }

    // 骨の更新
    bones.forEach((b, i) => {
        b.timer++;
        // リアルな上下の動き（サインカーブ）
        if (b.timer < 30) b.y -= 4; // 出現
        else if (b.timer > 70) b.y += 6; // 引っ込む
        
        if (p.x+4 < b.x+b.w && p.x+p.w-4 > b.x && p.y+4 < b.y+b.h && p.y+p.h-4 > b.y) {
            hp -= 1.0; shake = 5;
        }
        if (b.timer > 100) bones.splice(i, 1);
    });

    // ビームの更新
    blasters.forEach((b, i) => {
        b.timer++;
        if (b.timer < 40) {
            b.x += (p.x - b.x) * 0.1; // 追尾（目は青）
        } else if (b.timer < 60) {
            b.lock = true; // 固定（目は赤）
        } else if (b.timer === 60) {
            b.beam = 25; // 発射
            shake = 20; flash = 0.5;
        } else if (b.timer > 90) {
            blasters.splice(i, 1);
        }
        
        if (b.beam > 0) {
            b.beam--;
            if (Math.abs(p.x + 8 - b.x) < 35) { hp -= 2.5; }
        }
    });

    // HP更新
    let dHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-bar-fill').style.width = (dHp/92*100) + "%";
    document.getElementById('hp-num').innerText = dHp;
    if (hp <= 0 && active) { active = false; document.getElementById('death-screen').style.display = 'flex'; }
}

function spawnBones() {
    let safe = Math.floor(Math.random() * 5);
    for(let i=0; i<6; i++) {
        if(i === safe || i === safe + 1) continue;
        bones.push({ x: i * 100 + 10, y: 410, w: 80, h: 300, timer: 0 });
    }
}

function spawnBlaster() {
    blasters.push({ x: p.x, y: 50, timer: 0, lock: false, beam: 0 });
}

function draw() {
    ctx.save();
    if (shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    
    // 背景
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 600, 400);
    
    // 骨の描画（より骨らしい形）
    ctx.fillStyle = '#fff';
    bones.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.beginPath();
        ctx.arc(b.x + b.w/2, b.y, b.w/2, 0, Math.PI, true);
        ctx.fill();
    });

    // ビームの描画
    blasters.forEach(b => {
        // 本体（ドクロ風）
        ctx.fillStyle = '#fff';
        ctx.fillRect(b.x - 25, b.y - 25, 50, 50);
        
        // 目の予兆演出
        if (b.timer < 40) ctx.fillStyle = '#0cf'; // 追尾中：青
        else if (b.timer < 60) ctx.fillStyle = '#f00'; // 固定中：赤
        else ctx.fillStyle = '#fff';
        
        ctx.fillRect(b.x - 15, b.y - 5, 8, 8);
        ctx.fillRect(b.x + 7, b.y - 5, 8, 8);

        if (b.beam > 0) {
            ctx.fillStyle = '#fff'; ctx.fillRect(b.x - 40, b.y + 25, 80, 400);
            ctx.fillStyle = '#0ff'; ctx.fillRect(b.x - 15, b.y + 25, 30, 400);
        }
    });

    // 床とプレイヤー
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20);
    ctx.fillStyle = '#f00'; ctx.fillRect(p.x, p.y, p.w, p.h);

    // フラッシュ演出
    if (flash > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${flash})`;
        ctx.fillRect(0, 0, 600, 400);
    }
    ctx.restore();
}

const ctrl = (id) => {
    const e = document.getElementById(id);
    e.onpointerdown = (ev) => { ev.preventDefault(); keys[id] = true; };
    e.onpointerup = (ev) => { ev.preventDefault(); keys[id] = false; };
};
['l', 'r', 'j'].forEach(ctrl);
window.onkeydown = e => { if(e.key==='ArrowLeft') keys['l']=true; if(e.key==='ArrowRight') keys['r']=true; if(e.key==='ArrowUp'||e.key===' ') keys['j']=true; };
window.onkeyup = e => { if(e.key==='ArrowLeft') keys['l']=false; if(e.key==='ArrowRight') keys['r']=false; if(e.key==='ArrowUp'||e.key===' ') keys['j']=false; };
</script>
</body>
</html>
