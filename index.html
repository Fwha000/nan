<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS FIGHT - FINAL FIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; margin-top: 20px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn { padding: 10px 30px; font-size: 20px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; margin-top: 20px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="status">SURVIVE!</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1>* 準備はいいか？</h1>
        <button class="btn" onclick="init()">はじめる</button>
    </div>
    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00;">GAME OVER</h1>
        <p>* 諦めてはいけない...</p>
        <button class="btn" onclick="init()">リトライ</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; width: 600px;">
    <button class="btn" style="height:80px" id="l">←</button>
    <button class="btn" style="height:80px" id="j">JUMP</button>
    <button class="btn" style="height:80px" id="r">→</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let p, hp, bones, blasters, warns, frame, active, keys, shake = 0;

function init() {
    p = { x: 290, y: 300, w: 16, h: 16, vx: 0, vy: 0, ground: false };
    hp = 92; bones = []; blasters = []; warns = []; frame = 0; keys = {};
    active = true;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    loop();
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;
    if (shake > 0) shake *= 0.9;

    // 移動
    if (keys['l']) p.vx = -7; else if (keys['r']) p.vx = 7; else p.vx *= 0.8;
    if (keys['j'] && p.ground) { p.vy = -15; p.ground = false; }
    p.vy += 0.85; p.x += p.vx; p.y += p.vy;
    if (p.y > 380 - p.h) { p.y = 380 - p.h; p.vy = 0; p.ground = true; }
    p.x = Math.max(0, Math.min(600 - p.w, p.x));

    // --- 攻撃：下からの骨 (ランダム配置の修正) ---
    if (frame % 130 === 1) {
        // 0〜5のインデックスのうち、1〜2箇所をランダムに安置にする
        let safe1 = Math.floor(Math.random() * 6);
        let safe2 = (safe1 + 3) % 6; 

        for(let i=0; i<6; i++) {
            if(i === safe1 || i === safe2) continue;
            let bx = i * 100;
            warns.push({ x: bx, w: 100, t: 65 });
            setTimeout(() => {
                if(active && hp > 0) {
                    bones.push({ x: bx + 5, y: 400, w: 90, h: 320, vy: -18, life: 40 });
                }
            }, 800);
        }
    }

    // --- ブラスター ---
    if (frame > 500 && frame % 220 === 0) {
        blasters.push({ x: p.x, y: -60, tx: p.x, ty: 50, timer: 55, beam: 0 });
    }

    // 衝突判定とクリーンアップ
    warns.forEach((w, i) => { w.t--; if(w.t <= 0) warns.splice(i, 1); });
    
    bones.forEach((b, i) => {
        b.y += b.vy; b.life--;
        // 当たり判定をハートの中心に寄せる (遊びやすさ重視)
        if (p.x + 4 < b.x + b.w && p.x + p.w - 4 > b.x && p.y + 4 < b.y + b.h && p.y + p.h - 4 > b.y) {
            hp -= 1.2; shake = 10;
        }
        if (b.life <= 0) bones.splice(i, 1);
    });

    blasters.forEach((b, i) => {
        if (b.timer > 0) {
            b.x += (b.tx - b.x) * 0.1; b.timer--;
            if (b.timer === 0) { b.beam = 25; shake = 15; }
        } else {
            b.beam--;
            if (Math.abs(p.x + 8 - b.x) < 35 && b.beam > 0) { hp -= 2.5; shake = 5; }
            if (b.beam <= 0) blasters.splice(i, 1);
        }
    });

    // HP更新と死亡判定
    let dHp = Math.max(0, Math.ceil(hp));
    document.getElementById('hp-bar-fill').style.width = (dHp / 92 * 100) + "%";
    document.getElementById('hp-num').innerText = dHp;

    if (hp <= 0) {
        active = false;
        bones = []; blasters = []; // 画面を掃除
        document.getElementById('death-screen').style.display = 'flex';
    }
}

function draw() {
    ctx.save();
    if (shake > 1) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20);

    // 警告線 (より派手に点滅)
    warns.forEach(w => {
        ctx.fillStyle = `rgba(255, 0, 0, ${Math.abs(Math.sin(frame*0.2))*0.5})`;
        ctx.fillRect(w.x, 0, w.w, 380);
    });

    // 骨の描画
    ctx.fillStyle = '#fff';
    bones.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = '#eee'; ctx.fillRect(b.x, b.y, b.w, 5); ctx.fillStyle = '#fff';
    });

    // ブラスター
    blasters.forEach(b => {
        ctx.fillStyle = b.timer < 10 && b.timer % 2 === 0 ? '#f00' : '#fff';
        ctx.fillRect(b.x - 20, b.y - 20, 40, 40);
        if (b.beam > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fillRect(b.x - 45, b.y + 20, 90, 400);
            ctx.fillStyle = '#0ff'; ctx.fillRect(b.x - 15, b.y + 20, 30, 400);
        }
    });

    // ハート
    ctx.fillStyle = '#f00'; ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.restore();
}

// コントローラー設定
const btn = (id) => {
    const el = document.getElementById(id);
    const start = (e) => { e.preventDefault(); keys[id] = true; };
    const end = (e) => { e.preventDefault(); keys[id] = false; };
    el.addEventListener('pointerdown', start);
    el.addEventListener('pointerup', end);
    el.addEventListener('pointerleave', end);
};
['l', 'r', 'j'].forEach(btn);

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') keys['l'] = true;
    if (e.key === 'ArrowRight') keys['r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = true;
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') keys['l'] = false;
    if (e.key === 'ArrowRight') keys['r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = false;
};
</script>
</body>
</html>
