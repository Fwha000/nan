<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Smash Clone</title>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; color: white; font-family: sans-serif; }
        canvas { background: #eee; border: 4px solid #444; margin-top: 20px; }
        .ui { display: flex; justify-content: space-around; width: 800px; font-size: 24px; font-weight: bold; margin-top: 10px; }
        .p1 { color: blue; } .p2 { color: red; }
        .controls { margin-top: 20px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div class="ui">
    <div class="p1">P1: <span id="p1-damage">0</span>%</div>
    <div class="p2">P2: <span id="p2-damage">0</span>%</div>
</div>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<div class="controls">
    P1: [W]Jump, [A][D]Move, [S]Attack | P2: [ArrowUp]Jump, [ArrowLeft][ArrowRight]Move, [ArrowDown]Attack
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRAVITY = 0.6;
const FRICTION = 0.8;

class Fighter {
    constructor(x, y, color, controls) {
        this.x = x; this.y = y;
        this.width = 40; this.height = 60;
        this.color = color;
        this.controls = controls;
        
        this.vx = 0; this.vy = 0;
        this.speed = 6;
        this.jumpPower = -15;
        this.damage = 0;
        this.jumpCount = 0;
        this.isAttacking = false;
        this.attackTimer = 0;
        this.facing = 1; // 1: Right, -1: Left
    }

    update(keys) {
        // 左右移動
        if (keys[this.controls.left]) {
            this.vx = -this.speed;
            this.facing = -1;
        } else if (keys[this.controls.right]) {
            this.vx = this.speed;
            this.facing = 1;
        } else {
            this.vx *= FRICTION;
        }

        // 重力と位置
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;

        // 地面判定（簡易的な足場）
        if (this.y + this.height > 500 && this.x > 100 && this.x < 700) {
            if (this.vy > 0) {
                this.y = 500 - this.height;
                this.vy = 0;
                this.jumpCount = 0;
            }
        }

        // 攻撃タイマー
        if (this.attackTimer > 0) this.attackTimer--;
        else this.isAttacking = false;

        // 画面外判定（バースト）
        if (this.y > 600 || this.x < -50 || this.x > 850) {
            this.respawn();
        }
    }

    respawn() {
        this.x = 400; this.y = 100;
        this.vx = 0; this.vy = 0;
        this.damage = 0;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // 攻撃判定の可視化
        if (this.isAttacking) {
            ctx.fillStyle = "yellow";
            const atkX = this.facing === 1 ? this.x + this.width : this.x - 30;
            ctx.fillRect(atkX, this.y + 10, 30, 40);
        }
    }

    attack(other) {
        if (this.attackTimer > 0) return;
        this.isAttacking = true;
        this.attackTimer = 15;

        const atkX = this.facing === 1 ? this.x + this.width : this.x - 30;
        const atkRect = { x: atkX, y: this.y + 10, w: 30, h: 40 };

        if (atkRect.x < other.x + other.width &&
            atkRect.x + atkRect.w > other.x &&
            atkRect.y < other.y + other.height &&
            atkRect.y + atkRect.h > other.y) {
            
            // スマブラ式ふっ飛ばし計算
            other.damage += 10;
            const force = (other.damage / 10) + 5;
            other.vx = this.facing * force;
            other.vy = -force * 0.7;
        }
    }
}

const p1 = new Fighter(200, 100, 'blue', { left: 'a', right: 'd', up: 'w', atk: 's' });
const p2 = new Fighter(500, 100, 'red', { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', atk: 'ArrowDown' });

const keys = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === p1.controls.up && p1.jumpCount < 2) { p1.vy = p1.jumpPower; p1.jumpCount++; }
    if (e.key === p1.controls.atk) p1.attack(p2);
    if (e.key === p2.controls.up && p2.jumpCount < 2) { p2.vy = p2.jumpPower; p2.jumpCount++; }
    if (e.key === p2.controls.atk) p2.attack(p1);
});
window.addEventListener('keyup', e => keys[e.key] = false);

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ステージ描画
    ctx.fillStyle = "#666";
    ctx.fillRect(100, 500, 600, 20);

    p1.update(keys);
    p2.update(keys);
    p1.draw();
    p2.draw();

    document.getElementById('p1-damage').innerText = p1.damage;
    document.getElementById('p2-damage').innerText = p2.damage;

    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
