<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave: Hard Mode</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-container { position: relative; width: 95vw; height: 65vh; max-width: 800px; border: 4px solid #fff; margin-top: 20px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 800px; padding: 10px; }
        .bar-bg { width: 100%; height: 18px; background: #333; border: 2px solid #fff; margin: 4px 0; position: relative; }
        #p-hp { width: 100%; height: 100%; background: #ff0000; transition: 0.1s; }
        #b-hp { width: 100%; height: 100%; background: #ffff00; transition: 0.2s; }
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; cursor: pointer; }
        #msg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .dialogue { font-size: 1.1rem; color: #fff; border: 2px solid #fff; padding: 15px; background: #000; width: 85%; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 400px; padding: 15px; }
        .btn { height: 60px; background: #111; color: #fff; border: 2px solid #fff; font-size: 1.1rem; border-radius: 5px; cursor: pointer; -webkit-user-select: none; }
        .btn:active { background: #fff; color: #000; }
        .blink { animation: blink 0.6s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size: 14px;">
        <span>JUDGEMENT BOSS</span>
        <span id="phase-name">PHASE 1</span>
    </div>
    <div class="bar-bg"><div id="b-hp" style="width:100%"></div></div>
    <div class="bar-bg"><div id="p-hp" style="width:100%"></div></div>
</div>

<div id="game-container">
    <div id="start-overlay" onclick="startGame()">
        <h1 style="color:#fff; font-size: 2.5rem; margin:0; letter-spacing: 4px;">HEART BRAVE</h1>
        <p>難易度を調整しました</p>
        <p class="blink" style="color: #ffff00;">TAP TO START</p>
    </div>

    <div id="msg-layer" onclick="resumeGame()">
        <div id="msg-box" class="dialogue"></div>
        <p class="blink" style="margin-top:10px; font-size: 20px;">▼</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">←</button>
    <button class="btn" id="j-btn">JUMP</button>
    <button class="btn" id="r-btn">→</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 600;
canvas.width = W; canvas.height = H;

let initialized = false, gameActive = false, isPaused = false;
let hp = 100, bossHp = 100, frame = 0, stage = 1;
let isResurrecting = false, isClear = false;
let shake = 0, safety = 0, transition = 0;

const keys = {};
const player = { x: 400, y: 500, w: 18, h: 18, vx: 0, vy: 0, grounded: false };
const floorY = 550;

let bones = [], warnings = [], beams = [];

function startGame() {
    if (!initialized) {
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true; initialized = true;
        update();
    }
}

function showDialogue(text) {
    isPaused = true;
    document.getElementById('msg-layer').style.display = 'flex';
    document.getElementById('msg-box').innerText = text;
}

function resumeGame() {
    isPaused = false;
    document.getElementById('msg-layer').style.display = 'none';
    safety = 80;
}

function update() {
    if (!gameActive) return;

    if (!isPaused && !isClear) {
        frame++;
        if (shake > 0) shake--;
        if (safety > 0) safety--;
        if (transition > 0) transition--;

        // 移動（重力とジャンプを少し強化）
        if (keys['l-btn']) player.vx = -7.5;
        else if (keys['r-btn']) player.vx = 7.5;
        else player.vx *= 0.8;
        
        if (keys['j-btn'] && player.grounded) { player.vy = -16; player.grounded = false; }
        player.vy += 0.9; // 重力を少し重く
        player.x += player.vx; player.y += player.vy;

        if (player.y + player.h > floorY) { player.y = floorY - player.h; player.vy = 0; player.grounded = true; }
        player.x = Math.max(0, Math.min(W - player.w, player.x));

        // --- PHASE 1: 強化された突き上げ ---
        if (stage === 1 && safety <= 0) {
            bossHp -= 0.07;
            if (frame % 40 === 0) { // 間隔を短縮
                let rx = Math.random() * (W - 70);
                let wId = Date.now() + Math.random();
                warnings.push({ id: wId, x: rx, y: 0, w: 60, h: floorY, timer: 35, type: 'floor' }); // 太さを60に
                setTimeout(() => {
                    warnings = warnings.filter(w => w.id !== wId);
                    if(gameActive && !isPaused) bones.push({ x: rx, y: H, w: 60, h: 350, ty: 300, mode: 'up', life: 50 });
                }, 500); // 発生を早く
            }
            if (bossHp <= 0) { stage = 2; bossHp = 0; transition = 120; }
        } 
        // --- PHASE 2: 移行 ---
        else if (stage === 2 && !isResurrecting) {
            isResurrecting = true;
            setTimeout(() => {
                showDialogue("その程度か？\n次は「逃げ場」を無くしてやろう。");
                bossHp = 100; stage = 3;
                document.getElementById('phase-name').innerText = "TRUE DESPAIR";
                document.getElementById('phase-name').style.color = "red";
            }, 1000);
        }
        // --- PHASE 3: 最終形態（安置なし） ---
        else if (stage === 3 && safety <= 0) {
            bossHp -= 0.04;

            // サークル・ブラスター
            if (frame % 140 === 0) {
                const centerX = W / 2, centerY = H / 2 - 50;
                const count = 16; // 本数を増加
                for(let i=0; i<count; i++) {
                    let angle = (i / count) * Math.PI * 2;
                    let dx = Math.cos(angle) * 300;
                    let dy = Math.sin(angle) * 300;
                    warnings.push({ type: 'beam', x1: centerX + dx, y1: centerY + dy, x2: centerX, y2: centerY, timer: 50 });
                    setTimeout(() => {
                        if(gameActive && !isPaused) {
                            beams.push({ x1: centerX + dx, y1: centerY + dy, x2: centerX, y2: centerY, life: 25 });
                            shake = 12;
                        }
                        if (i === count - 1) warnings = warnings.filter(w => w.type !== 'beam');
                    }, 800);
                }
            }

            // 横からの骨（安置対策：高さを変える）
            if (frame % 35 === 0) {
                let side = Math.random() > 0.5 ? -60 : W + 60;
                // 地面スレスレか、ジャンプ必須の高さかランダム
                let ry = Math.random() > 0.5 ? floorY - 40 : floorY - 120; 
                bones.push({ x: side, y: ry, vx: side < 0 ? 8 : -8, vy: 0, w: 25, h: 150, life: 180 });
            }
            
            if (bossHp <= 0) isClear = true;
        }

        // 当たり判定
        bones.forEach((b, i) => {
            if (b.mode === 'up') { b.y += (b.ty - b.y) * 0.35; if (b.life < 10) b.y += 50; } 
            else { b.x += b.vx; }
            if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) { 
                hp -= 3; // ダメージも少しアップ
                shake = 10; 
            }
            b.life--; if (b.life <= 0) bones.splice(i, 1);
        });

        beams.forEach((b, i) => {
            let dist = Math.abs((b.y2-b.y1)*player.x - (b.x2-b.x1)*player.y + b.x2*b.y1 - b.y2*b.x1) / Math.sqrt((b.y2-b.y1)**2 + (b.y2-b.y1)**2 || 1);
            if (dist < 45) { hp -= 4; shake = 5; }
            b.life--; if (b.life <= 0) beams.splice(i, 1);
        });
    }

    draw();
    if (hp <= 0) { alert("DETERMINATION FAILED..."); location.reload(); return; }
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);

    // 予兆
    warnings.forEach(w => {
        if (w.type === 'floor') {
            ctx.fillStyle = "rgba(255, 0, 0, 0.5)"; ctx.fillRect(w.x, 0, w.w, floorY);
        }
        if (w.type === 'beam') {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
            ctx.setLineDash([]);
        }
    });

    // 骨
    ctx.fillStyle = "#fff";
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // ビーム
    beams.forEach(b => {
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 50 * (b.life / 25);
        ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2); ctx.stroke();
        ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 15 * (b.life / 25); ctx.stroke();
    });

    // ハート
    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.moveTo(player.x + 9, player.y + 18);
    ctx.bezierCurveTo(player.x - 4, player.y + 4, player.x + 4, player.y - 4, player.x + 9, player.y + 4);
    ctx.bezierCurveTo(player.x + 14, player.y - 4, player.x + 22, player.y + 4, player.x + 9, player.y + 18);
    ctx.fill();

    // 境界線
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 4; ctx.strokeRect(2, 2, W-4, floorY-2);
    ctx.fillStyle = "#fff"; ctx.fillRect(0, floorY, W, 5);

    if (isClear) {
        ctx.fillStyle = "rgba(255,255,255,0.9)"; ctx.fillRect(0,0,W,H);
        ctx.fillStyle = "#000"; ctx.font = "bold 40px Courier New"; ctx.textAlign = "center";
        ctx.fillText("VICTORY", W/2, H/2);
    }
    if (transition > 0) { ctx.fillStyle = `rgba(255,255,255,${transition/120})`; ctx.fillRect(0,0,W,H); }

    ctx.restore();
    document.getElementById('p-hp').style.width = hp + "%";
    document.getElementById('b-hp').style.width = bossHp + "%";
}

const bind = (id) => {
    const el = document.getElementById(id);
    el.onpointerdown = (e) => { e.preventDefault(); keys[id] = true; startGame(); };
    el.onpointerup = () => keys[id] = false;
    el.onpointerleave = () => keys[id] = false;
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);

window.onkeydown = (e) => {
    startGame();
    if(e.key === "ArrowLeft") keys['l-btn'] = true;
    if(e.key === "ArrowRight") keys['r-btn'] = true;
    if(e.key === "ArrowUp" || e.key === " ") keys['j-btn'] = true;
};
window.onkeyup = (e) => {
    if(e.key === "ArrowLeft") keys['l-btn'] = false;
    if(e.key === "ArrowRight") keys['r-btn'] = false;
    if(e.key === "ArrowUp" || e.key === " ") keys['j-btn'] = false;
};
draw();
</script>
</body>
</html>
