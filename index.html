<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANS FIGHT - BALANCED & FIXED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'DotGothic16', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #game-box { position: relative; width: 600px; height: 400px; border: 4px solid #fff; margin-top: 20px; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui { width: 600px; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 18px; }
        #hp-bar-bg { width: 150px; height: 20px; background: #400; border: 2px solid #fff; margin: 0 10px; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff0; transition: width 0.3s; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        .btn-start { padding: 10px 30px; font-size: 20px; border: 2px solid #fff; background: #000; color: #fff; cursor: pointer; font-family: inherit; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; width: 600px; }
        .btn-ctrl { height: 70px; border: 2px solid #fff; background: #111; color: #fff; font-size: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div>JUDGEMENT DAY</div>
    <div style="display:flex; align-items:center;">
        HP <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        <span id="hp-num">92</span> / 92
    </div>
</div>

<div id="game-box">
    <div id="start-screen" class="overlay">
        <h1>* 気楽にいこうぜ。</h1>
        <button class="btn-start" onclick="resetGame()">START</button>
    </div>
    <div id="death-screen" class="overlay" style="display: none;">
        <h1 style="color: #f00;">GAME OVER</h1>
        <button class="btn-start" onclick="resetGame()">RETRY</button>
    </div>
    <canvas id="c"></canvas>
</div>

<div class="controls">
    <button class="btn-ctrl" id="l">←</button>
    <button class="btn-ctrl" id="j">JUMP</button>
    <button class="btn-ctrl" id="r">→</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 600; canvas.height = 400;

let player, hp, bones, blasters, warnings, frame, active, keys, lastHit = 0;

function resetGame() {
    player = { x: 290, y: 300, w: 20, h: 20, vx: 0, vy: 0, grounded: false };
    hp = 92; bones = []; blasters = []; warnings = []; frame = 0; keys = {};
    active = true;
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    loop();
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    frame++;
    
    // リジェネ（3秒間ダメージなしで微回復）
    if (frame - lastHit > 180 && hp < 92) hp += 0.05;

    // 移動
    if (keys['l']) player.vx = -6;
    else if (keys['r']) player.vx = 6;
    else player.vx *= 0.8;
    if (keys['j'] && player.grounded) { player.vy = -14; player.grounded = false; }
    player.vy += 0.8;
    player.x += player.vx; player.y += player.vy;
    if (player.y > 380 - player.h) { player.y = 380 - player.h; player.vy = 0; player.grounded = true; }
    player.x = Math.max(0, Math.min(600 - player.w, player.x));

    // --- 攻撃パターン（間隔を広げて右側もカバー） ---
    
    // 1. 縦の突き上げ（予告をしっかり出す）
    if (frame % 160 === 1) {
        let safeZone = Math.floor(Math.random() * 3); // 0, 1, 2 のどこかが安全
        for(let i=0; i<3; i++) {
            if(i === safeZone) continue;
            let wx = i * 200;
            warnings.push({ x: wx, w: 200, t: 70, mt: 70 });
            setTimeout(() => {
                if(active) bones.push({ x: wx + 10, y: 400, w: 180, h: 300, vy: -15, life: 40 });
            }, 1000);
        }
    }

    // 2. ブラスター（頻度を下げて避けやすく）
    if (frame > 600 && frame % 250 === 0) {
        let tx = player.x;
        blasters.push({ x: tx, y: -60, tx, ty: 50, timer: 60, beam: 0 });
    }

    // 衝突判定
    warnings.forEach((w, i) => { w.t--; if(w.t <= 0) warnings.splice(i, 1); });
    bones.forEach((b, i) => {
        b.y += b.vy; b.life--;
        if (player.x < b.x+b.w && player.x+player.w > b.x && player.y < b.y+b.h && player.y+player.h > b.y) {
            hp -= 1; lastHit = frame;
        }
        if (b.life <= 0) bones.splice(i, 1);
    });

    blasters.forEach((b, i) => {
        if (b.timer > 0) {
            b.y += (b.ty - b.y) * 0.1; b.timer--;
            if (b.timer === 0) b.beam = 25;
        } else {
            b.beam--;
            if (Math.abs(player.x + 10 - b.x) < 40 && b.beam > 0) { hp -= 2; lastHit = frame; }
            if (b.beam <= 0) blasters.splice(i, 1);
        }
    });

    // UI更新
    document.getElementById('hp-bar-fill').style.width = (hp/92*100) + "%";
    document.getElementById('hp-num').innerText = Math.ceil(hp);
    if (hp <= 0) { active = false; document.getElementById('death-screen').style.display = 'flex'; }
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 600, 400);
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 380, 600, 20); // 床

    // 予告（見やすく透過度を調整）
    warnings.forEach(w => {
        ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
        ctx.fillRect(w.x, 0, w.w, 380);
    });

    // 骨
    ctx.fillStyle = '#fff';
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // ブラスター
    blasters.forEach(b => {
        ctx.fillStyle = '#fff'; ctx.fillRect(b.x-25, b.y-25, 50, 50);
        if (b.beam > 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(b.x-35, b.y+25, 70, 400);
            ctx.fillStyle = '#0ff'; ctx.fillRect(b.x-10, b.y+25, 20, 400);
        }
    });

    // プレイヤー
    ctx.fillStyle = '#f00'; ctx.fillRect(player.x, player.y, player.w, player.h);
}

// コントローラー
const btn = (id) => {
    const el = document.getElementById(id);
    el.onpointerdown = (e) => { e.preventDefault(); keys[id] = true; };
    el.onpointerup = (e) => { e.preventDefault(); keys[id] = false; };
};
['l', 'r', 'j'].forEach(btn);

window.onkeydown = e => {
    if (e.key === 'ArrowLeft') keys['l'] = true;
    if (e.key === 'ArrowRight') keys['r'] = true;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = true;
};
window.onkeyup = e => {
    if (e.key === 'ArrowLeft') keys['l'] = false;
    if (e.key === 'ArrowRight') keys['r'] = false;
    if (e.key === 'ArrowUp' || e.key === ' ') keys['j'] = false;
};
</script>
</body>
</html>
