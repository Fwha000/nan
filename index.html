<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave: Reborn</title>
    <style>
        body {
            margin: 0; background: #05050a; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container {
            position: relative; width: 95vw; height: 75vh; max-width: 800px;
            border: 2px solid #333; margin-top: 10px; background: #000;
            box-shadow: 0 0 20px rgba(0,255,255,0.1); border-radius: 8px;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 800px; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .bar-bg { width: 100%; height: 10px; background: #111; border-radius: 5px; overflow: hidden; }
        #p-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); transition: 0.2s; }
        #b-hp { width: 100%; height: 100%; background: linear-gradient(90deg, #1e90ff, #70a1ff); transition: 0.4s; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 400px; padding: 10px; }
        .btn { height: 60px; background: #111; color: #fff; border: 1px solid #444; border-radius: 10px; font-weight: bold; }
        .btn:active { background: #333; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-size:12px; color:#1e90ff;">BOSS <span id="p-status">SEARCHING...</span></div>
    <div class="bar-bg"><div id="b-hp"></div></div>
    <div style="font-size:12px; color:#ff4757;">PLAYER</div>
    <div class="bar-bg"><div id="p-hp"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h1 style="color:#ff4757; text-shadow: 0 0 10px #ff4757;">HEART BRAVE</h1>
        <p style="font-size:14px; color:#aaa; line-height:1.6;">
            前半：襲いかかる骨を避けろ！<br>
            後半：黄色の弾を空中で踏んで反射しろ！
        </p>
        <p>TAP TO START</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">LEFT</button>
    <button class="btn" id="j-btn">JUMP</button>
    <button class="btn" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const bBar = document.getElementById('b-hp');
const pBar = document.getElementById('p-hp');
const pStatus = document.getElementById('p-status');

canvas.width = 800; canvas.height = 600;

let gameActive = false, hp = 100, bossHp = 100, frame = 0, shake = 0;
const player = { x: 385, y: 500, w: 30, h: 30, vx: 0, vy: 0, grounded: false };
const boss = { x: 900, y: 200, w: 100, h: 100, targetY: 200, beamTimer: 0 };

let bullets = [], items = [], sideBeams = [], bones = [];
const keys = {};

function spawnBone() {
    if(bossHp <= 50 || !gameActive) return;
    const type = Math.random() > 0.5 ? 'bottom' : 'side';
    if(type === 'bottom') {
        bones.push({ x: Math.random()*750, y: 600, w: 40, h: 150, targetY: 450, state: 'warn', timer: 60 });
    } else {
        bones.push({ x: 800, y: 520, w: 30, h: 50, vx: -5, state: 'active' });
    }
    setTimeout(spawnBone, bossHp > 75 ? 1200 : 800);
}

function update() {
    if(!gameActive) return;
    frame++;
    if(shake > 0) shake--;

    // プレイヤー制御 (速度を少し遅く調整)
    if(keys['ArrowLeft'] || keys['l-btn']) player.vx = -5.5;
    else if(keys['ArrowRight'] || keys['r-btn']) player.vx = 5.5;
    else player.vx *= 0.85;

    player.vy += 0.6; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    const floor = 570;
    if(player.y + player.h > floor) { player.y = floor - player.h; player.vy = 0; player.grounded = true; }
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // フェーズ管理
    if(bossHp > 50) {
        pStatus.innerText = "PHASE 1: BONE ATTACK";
        bossHp -= 0.02; // 生き残るだけで少しずつ削れる
    } else {
        pStatus.innerText = "PHASE 2: FINAL BATTLE";
        boss.x += (650 - boss.x) * 0.04;
        boss.y += (boss.targetY - boss.y) * 0.05;
        if(frame % 100 === 0) boss.targetY = Math.random() * 300 + 50;

        boss.beamTimer++;
        if(boss.beamTimer > 400) boss.beamTimer = 0;

        // 後半：大きい黄色の弾を少量出す
        if(boss.beamTimer < 150 && frame % 120 === 0) {
            for(let i=0; i<4; i++) {
                let a = i * Math.PI / 2 + (frame * 0.01);
                bullets.push({ x: boss.x + 50, y: boss.y + 50, vx: Math.cos(a)*4, vy: Math.sin(a)*4, type: 'reflect', size: 20 });
            }
        }
        if(frame % 40 === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -7, vy: (Math.random()-0.5)*5, type: 'normal', size: 10 });

        // メインビーム
        if(boss.beamTimer > 200 && boss.beamTimer < 260) {
            if(player.y + player.h > boss.y + 20 && player.y < boss.y + 80 && player.x < boss.x) {
                hp -= 0.6; shake = 3;
            }
        }
        
        // サイドビーム（壁からの攻撃）
        if(bossHp < 25 && frame % 150 === 0) sideBeams.push({ y: player.y, timer: 70 });
    }

    // 骨の衝突
    bones.forEach((b, i) => {
        if(b.state === 'warn') {
            b.timer--;
            if(b.timer <= 0) b.state = 'active';
        } else if(b.state === 'active') {
            if(b.vx) b.x += b.vx;
            else b.y += (b.targetY - b.y) * 0.2;
            
            if(player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
                hp -= 2; shake = 5;
            }
        }
        if(b.x < -100 || (b.state === 'active' && b.y > 600)) bones.splice(i, 1);
    });

    // 弾丸・サイドビーム処理
    bullets.forEach((b, i) => {
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.1; b.y += (boss.y + 50 - b.y) * 0.1;
            if(Math.abs(b.x-(boss.x+50)) < 40 && Math.abs(b.y-(boss.y+50)) < 40) {
                bullets.splice(i, 1); bossHp -= 6; shake = 15;
            }
        } else {
            b.x += b.vx; b.y += b.vy;
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x+15-b.x) < 40 && Math.abs(player.y+30-b.y) < 30) {
                b.type = 'returned'; player.vy = -12;
            } else if(Math.abs(player.x+15-b.x) < 25 && Math.abs(player.y+15-b.y) < 25) {
                bullets.splice(i, 1); hp -= 8;
            }
        }
        if(b.x < -100 || b.x > 900) bullets.splice(i, 1);
    });

    sideBeams.forEach((b, i) => {
        b.timer--;
        if(b.timer < 0 && b.timer > -40) {
            if(player.y + player.h > b.y && player.y < b.y + 40) hp -= 1;
        }
        if(b.timer <= -40) sideBeams.splice(i, 1);
    });

    // アイテム
    if(frame % 600 === 0) items.push({ x: Math.random()*700+50, y: -30, vy: 2 });
    items.forEach((it, i) => {
        it.y += it.vy;
        if(Math.abs(player.x - it.x) < 35 && Math.abs(player.y - it.y) < 35) {
            hp = Math.min(100, hp + 25); items.splice(i, 1);
        }
    });

    // UI更新
    pBar.style.width = hp + "%";
    bBar.style.width = bossHp + "%";
    if(hp <= 0) { gameActive = false; alert("GAME OVER"); location.reload(); }
    if(bossHp <= 0) { gameActive = false; alert("CONGRATULATIONS!"); location.reload(); }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if(shake > 0) ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2);

    // プレイヤー (ネオンハート)
    ctx.fillStyle = "#ff4757"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff4757";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    // 骨 (前半攻撃)
    bones.forEach(b => {
        if(b.state === 'warn') {
            ctx.fillStyle = "rgba(255, 0, 0, 0.3)";
            ctx.fillRect(b.x, 0, b.w, 600);
        } else {
            ctx.fillStyle = "#fff";
            ctx.fillRect(b.x, b.y, b.w, b.h);
        }
    });

    // ボス (後半出現)
    if(bossHp <= 50) {
        ctx.strokeStyle = "#1e90ff"; ctx.lineWidth = 4; ctx.shadowBlur = 20; ctx.shadowColor = "#1e90ff";
        ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = (boss.beamTimer > 150 && frame % 10 < 5) ? "#fff" : "#1e90ff";
        ctx.fillRect(boss.x+25, boss.y+25, 50, 50);
        
        if(boss.beamTimer > 200 && boss.beamTimer < 260) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.fillRect(0, boss.y + 20, boss.x, 60);
        }
    }

    // 壁ビーム
    sideBeams.forEach(b => {
        if(b.timer > 0) {
            ctx.strokeStyle = "red"; ctx.setLineDash([5, 5]);
            ctx.strokeRect(0, b.y, 800, 40);
        } else {
            ctx.fillStyle = "#fff"; ctx.setLineDash([]);
            ctx.fillRect(0, b.y, 800, 40);
        }
    });

    // 弾丸
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#fff200" : (b.type === 'returned' ? "#00d2ff" : "#ff4757");
        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });

    // 回復
    ctx.shadowBlur = 15; ctx.shadowColor = "#2ed573";
    items.forEach(it => { ctx.fillStyle = "#2ed573"; ctx.font = "bold 30px Arial"; ctx.fillText("✚", it.x, it.y); });

    ctx.restore();
}

function start() {
    if(!gameActive) {
        overlay.style.display = 'none';
        gameActive = true;
        spawnBone();
        update();
    }
}

overlay.addEventListener('pointerdown', start);
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(e.code === 'ArrowUp' && player.grounded) player.vy = -13;
    start();
});
window.addEventListener('keyup', e => keys[e.code] = false);

const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[id] = true; if(id === 'j-btn' && player.grounded) player.vy = -13; });
    el.addEventListener('pointerup', () => keys[id] = false);
    el.addEventListener('pointerleave', () => keys[id] = false);
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);
</script>
</body>
</html>
