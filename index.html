<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave - Key Controlled Boss Battle</title>
    <style>
        body {
            margin: 0; padding: 0; background: #050510; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #hud {
            width: 100%; max-width: 600px; padding: 10px;
            display: flex; flex-direction: column; gap: 4px;
        }
        .bar-container {
            width: 100%; height: 12px; background: #111; border-radius: 6px; overflow: hidden; border: 1px solid #333;
        }
        #player-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff4757, #ff6b81); transition: width 0.2s; }
        #boss-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #747d8c, #a29bfe); transition: width 0.3s; }
        
        #game-container {
            position: relative; width: 95vw; height: 50vh; max-width: 800px;
            border: 3px solid #222; border-radius: 15px; background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        canvas { width: 100%; height: 100%; display: block; border-radius: 12px; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer; text-align: center;
        }
        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 15px; width: 95vw; max-width: 400px;
        }
        .btn {
            height: 60px; background: rgba(255,255,255,0.05); color: white; border: 1px solid #444;
            border-radius: 10px; font-weight: bold; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; user-select: none;
        }
        .btn:active { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-size: 0.7rem; color: #a29bfe; font-weight: bold;">BOSS ENERGY</div>
    <div class="bar-container"><div id="boss-hp-bar"></div></div>
    <div style="font-size: 0.7rem; color: #ff4757; font-weight: bold;">PLAYER HEART</div>
    <div class="bar-container"><div id="player-hp-bar"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h1 id="title" style="color:#ff4757; margin:0; letter-spacing: 2px;">HEART BRAVE</h1>
        <p id="msg" style="margin: 10px 0;">移動: ← → / ジャンプ: ↑<br><span style="color:#ffeb3b;">黄色の弾を踏んでボスに跳ね返せ！</span></p>
        <p style="font-size: 0.8rem; color: #888;">画面クリックまたはキー入力で開始</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">LEFT</button>
    <button class="btn" id="j-btn">JUMP (UP)</button>
    <button class="btn" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const pBar = document.getElementById('player-hp-bar');
const bBar = document.getElementById('boss-hp-bar');
const overlay = document.getElementById('overlay');

canvas.width = 800; canvas.height = 400;

let gameActive = false;
let hp = 100, bossHp = 100, frame = 0, shake = 0;
const player = { x: 100, y: 300, w: 35, h: 35, vx: 0, vy: 0, grounded: false };
const boss = { x: 900, y: 150, w: 80, h: 80, targetY: 150, active: false };
const platforms = [
    {x: 0, y: 370, w: 800, h: 30}, 
    {x: 150, y: 260, w: 120, h: 10}, 
    {x: 530, y: 260, w: 120, h: 10}, 
    {x: 340, y: 170, w: 120, h: 10}
];
let bullets = [];
const keys = {}; // 複数キー同時押し対応用

function spawnBullet(x, y, vx, vy, type) {
    bullets.push({ x, y, vx, vy, type, size: type === 'reflect' ? 12 : 8 });
}

function update() {
    if(!gameActive) return;
    frame++;
    if(shake > 0) shake--;

    // プレイヤー物理 (PCキーボード優先)
    if(keys['ArrowLeft'] || keys['left_btn']) player.vx = -7; 
    else if(keys['ArrowRight'] || keys['right_btn']) player.vx = 7; 
    else player.vx *= 0.85;

    player.vy += 0.65; // 重力
    player.x += player.vx;
    player.y += player.vy;

    // 接地判定
    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && 
           player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; 
            player.vy = 0; 
            player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // ボス挙動
    if(frame > 60) boss.active = true;
    if(boss.active && bossHp > 0) {
        boss.x += (680 - boss.x) * 0.05;
        boss.y += (boss.targetY - boss.y) * 0.03;
        if(frame % 80 === 0) boss.targetY = Math.random() * 200 + 50;

        if(frame % 110 === 0) { // 反射可能弾
            for(let i=0; i<6; i++) {
                const a = i * Math.PI / 3;
                spawnBullet(boss.x + 40, boss.y + 40, Math.cos(a)*3.5, Math.sin(a)*3.5, 'reflect');
            }
        }
        if(frame % 45 === 0) spawnBullet(boss.x, boss.y + 40, -8, (Math.random()-0.5)*5, 'normal');
    }

    // 弾の更新
    bullets.forEach((b, i) => {
        if(b.type === 'returned') {
            b.x += (boss.x + 40 - b.x) * 0.12; 
            b.y += (boss.y + 40 - b.y) * 0.12;
            if(Math.abs(b.x - (boss.x+40)) < 15 && Math.abs(b.y - (boss.y+40)) < 15) {
                bullets.splice(i, 1); bossHp -= 5; shake = 12;
                bBar.style.width = bossHp + "%";
                if(bossHp <= 0) victory();
            }
        } else {
            b.x += b.vx; b.y += b.vy;
            // 反射判定 (足元で触れる)
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x + 17 - b.x) < 35 && Math.abs(player.y + 35 - b.y) < 25) {
                b.type = 'returned'; player.vy = -12; // 踏みつけジャンプ
            } else if(Math.abs(player.x + 17 - b.x) < 20 && Math.abs(player.y + 17 - b.y) < 20) {
                bullets.splice(i, 1); hp -= 15; pBar.style.width = hp + "%";
                if(hp <= 0) location.reload();
            }
        }
        if(b.x < -100 || b.x > 900) bullets.splice(i, 1);
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    if(shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    
    // 背景
    const g = ctx.createLinearGradient(0,0,0,400);
    g.addColorStop(0, "#050510"); g.addColorStop(1, "#101025");
    ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 足場
    ctx.fillStyle = "#2d3436"; 
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#444"; ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // プレイヤー (ネオンブルー)
    ctx.shadowBlur = 10; ctx.shadowColor = "#4a90e2";
    ctx.fillStyle = "#4a90e2"; ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    // ボス (ネオンレッド)
    if(boss.active && bossHp > 0) {
        ctx.shadowBlur = 20; ctx.shadowColor = "#ff4757";
        ctx.fillStyle = "#ff4757"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = "white"; ctx.fillRect(boss.x + 25, boss.y + 25, 30, 30);
        ctx.shadowBlur = 0;
    }

    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#ffeb3b" : (b.type === 'returned' ? "#00d2ff" : "#ff4757");
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
}

function victory() {
    gameActive = false;
    document.getElementById('title').innerText = "BOSS DEFEATED";
    document.getElementById('title').style.color = "#00d2ff";
    document.getElementById('msg').innerHTML = "おめでとう！ボスを撃破した！<br>クリックで再挑戦";
    overlay.style.display = 'flex';
}

function startGame() {
    if(!gameActive && bossHp > 0) { 
        overlay.style.display = 'none'; gameActive = true; update(); 
    } else if(!gameActive) location.reload();
}

// --- 操作イベント ---

overlay.addEventListener('pointerdown', startGame);

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if(!gameActive) startGame();
    if(e.code === 'ArrowUp' && player.grounded) player.vy = -14;
});
window.addEventListener('keyup', e => keys[e.code] = false);

// モバイルボタン
const bind = (id, k) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => { e.preventDefault(); if(k) keys[k] = true; else if(player.grounded) player.vy = -14; });
    el.addEventListener('pointerup', e => { if(k) keys[k] = false; });
    el.addEventListener('pointerleave', e => { if(k) keys[k] = false; });
};
bind('l-btn', 'left_btn'); bind('r-btn', 'right_btn'); bind('j-btn', null);

draw();
</script>
</body>
</html>
