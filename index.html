<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave - Grand Boss Battle</title>
    <style>
        body {
            margin: 0; padding: 0; background: #010105; color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #hud {
            width: 100%; max-width: 700px; padding: 10px;
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }
        .bar-container {
            width: 100%; height: 16px; background: #111; border-radius: 8px; overflow: hidden; border: 2px solid #333;
        }
        #player-hp-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.2s; box-shadow: 0 0 10px #ff4757; }
        #boss-hp-bar { width: 100%; height: 100%; background: #a29bfe; transition: width 0.4s; box-shadow: 0 0 15px #a29bfe; }
        
        #game-container {
            position: relative; width: 95vw; height: 65vh; max-width: 800px;
            border: 4px solid #444; border-radius: 20px; background: #000;
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer; text-align: center;
        }
        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; padding: 10px; width: 95vw; max-width: 450px;
        }
        .btn {
            height: 65px; background: rgba(255,255,255,0.08); color: white; border: 1px solid #555;
            border-radius: 12px; font-weight: bold; font-size: 1.1rem; user-select: none;
        }
        .btn:active { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

<div id="hud">
    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: bold;">
        <span id="boss-status" style="color: #a29bfe;">BOSS: AWAKENING</span>
        <span id="phase-label">PHASE 1</span>
    </div>
    <div class="bar-container"><div id="boss-hp-bar"></div></div>
    <div style="font-size: 0.8rem; color: #ff4757; font-weight: bold;">PLAYER INTEGRITY</div>
    <div class="bar-container"><div id="player-hp-bar"></div></div>
</div>

<div id="game-container">
    <div id="overlay">
        <h1 id="title" style="color:#ff4757; margin:0; font-size: 2.5rem;">HEART BRAVE</h1>
        <p id="msg" style="margin: 15px 0; line-height: 1.6;">移動: ← → / ジャンプ: ↑<br>形態が進むほど攻撃は激化する。<br><span style="color:#2ecc71;">リペアキット（✚）を逃すな！</span></p>
        <p style="font-size: 1rem; color: #aaa;">画面をタップして戦闘開始</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">LEFT</button>
    <button class="btn" id="j-btn">JUMP</button>
    <button class="btn" id="r-btn">RIGHT</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const pBar = document.getElementById('player-hp-bar');
const bBar = document.getElementById('boss-hp-bar');
const pLabel = document.getElementById('phase-label');
const bStatus = document.getElementById('boss-status');
const overlay = document.getElementById('overlay');

// フィールド最大化
canvas.width = 800; canvas.height = 600;

let gameActive = false, hp = 100, bossHp = 100, frame = 0, shake = 0, phase = 1;
const player = { x: 100, y: 500, w: 35, h: 35, vx: 0, vy: 0, grounded: false };
const boss = { x: 900, y: 250, w: 100, h: 100, targetY: 250, active: false, beamTimer: 0, color: "#ff4757" };

const platforms = [
    {x: 0, y: 570, w: 800, h: 30}, // 地面
    {x: 50, y: 430, w: 180, h: 15}, 
    {x: 570, y: 430, w: 180, h: 15}, 
    {x: 310, y: 320, w: 180, h: 15},
    {x: 50, y: 180, w: 180, h: 15},
    {x: 570, y: 180, w: 180, h: 15}
];

let bullets = [];
let items = [];
let stars = Array.from({length: 70}, () => ({x: Math.random()*800, y: Math.random()*600, s: Math.random()*2.5 + 0.5}));
const keys = {};

function spawnBullet(x, y, vx, vy, type, size = 8) {
    bullets.push({ x, y, vx, vy, type, size: type === 'reflect' ? 14 : size });
}

function spawnItem() {
    if(!gameActive) return;
    items.push({ x: Math.random() * 600 + 100, y: -30, vy: 1.5, w: 30, h: 30 });
    setTimeout(spawnItem, 10000); // 10秒ごとに回復
}

function update() {
    if(!gameActive) return;
    frame++;
    if(shake > 0) shake--;

    stars.forEach(s => { s.x -= s.s; if(s.x < 0) s.x = 800; });

    // フェーズ遷移
    if(bossHp > 70) { 
        phase = 1; boss.color = "#ff4757"; pLabel.innerText = "PHASE 1";
    } else if(bossHp > 35) { 
        phase = 2; boss.color = "#a29bfe"; pLabel.innerText = "PHASE 2: BIT DEPLOYED";
    } else { 
        phase = 3; boss.color = "#f1c40f"; pLabel.innerText = "FINAL PHASE: OVERDRIVE";
    }

    // プレイヤー制御
    if(keys['ArrowLeft'] || keys['left_btn']) player.vx = -7.5; 
    else if(keys['ArrowRight'] || keys['right_btn']) player.vx = 7.5; 
    else player.vx *= 0.82;
    player.vy += 0.65; player.x += player.vx; player.y += player.vy;

    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(canvas.width - player.w, player.x));

    // ボス挙動
    if(frame > 60) boss.active = true;
    if(boss.active && bossHp > 0) {
        boss.x += (660 - boss.x) * 0.04;
        let moveIntensity = phase === 3 ? 0.08 : 0.04;
        boss.y += (boss.targetY - boss.y) * moveIntensity;
        if(frame % 90 === 0) boss.targetY = Math.random() * 400 + 50;

        // ビーム頻度を大幅に減少 (300 -> 500フレーム周期)
        boss.beamTimer += (phase === 3 ? 1.5 : 1.0);
        if(boss.beamTimer > 500) boss.beamTimer = 0;

        // 攻撃ロジック
        if(boss.beamTimer < 200) {
            // 反射弾
            let reflectInterval = phase === 3 ? 80 : 120;
            if(frame % reflectInterval === 0) {
                let count = phase === 1 ? 6 : (phase === 2 ? 8 : 12);
                for(let i=0; i<count; i++) {
                    const a = i * Math.PI * 2 / count;
                    spawnBullet(boss.x + 50, boss.y + 50, Math.cos(a)*4, Math.sin(a)*4, 'reflect');
                }
            }
            // 通常弾
            if(frame % (phase === 3 ? 25 : 40) === 0) {
                spawnBullet(boss.x, boss.y + 50, -9, (Math.random()-0.5)*8, 'normal');
            }
        }

        // ビーム判定 (継続ダメージをさらに微量に)
        if(boss.beamTimer > 250 && boss.beamTimer < 320) {
            if(player.y + player.h > boss.y + 15 && player.y < boss.y + 85 && player.x < boss.x) {
                hp -= 0.5; pBar.style.width = Math.max(0, hp) + "%"; shake = 4;
                if(hp <= 0) location.reload();
            }
        }
    }

    // アイテム処理
    items.forEach((it, i) => {
        it.y += it.vy;
        if(player.x < it.x + it.w && player.x + player.w > it.x && player.y < it.y + it.h && player.y + player.h > it.y) {
            hp = Math.min(100, hp + 30);
            pBar.style.width = hp + "%";
            items.splice(i, 1);
        }
        if(it.y > 600) items.splice(i, 1);
    });

    // 弾丸処理
    bullets.forEach((b, i) => {
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.15; b.y += (boss.y + 50 - b.y) * 0.15;
            if(Math.abs(b.x - (boss.x+50)) < 25 && Math.abs(b.y - (boss.y+50)) < 25) {
                bullets.splice(i, 1); bossHp -= 3.5; shake = 20;
                bBar.style.width = bossHp + "%";
                if(bossHp <= 0) victory();
            }
        } else {
            b.x += b.vx; b.y += b.vy;
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x + 17 - b.x) < 40 && Math.abs(player.y + 35 - b.y) < 30) {
                b.type = 'returned'; player.vy = -13;
            } else if(Math.abs(player.x + 17 - b.x) < 22 && Math.abs(player.y + 17 - b.y) < 22) {
                bullets.splice(i, 1); hp -= 7;
                pBar.style.width = Math.max(0, hp) + "%";
                if(hp <= 0) location.reload();
            }
        }
        if(b.x < -150 || b.x > 950 || b.y < -150 || b.y > 750) bullets.splice(i, 1);
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.save();
    if(shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    ctx.fillStyle = "#010105"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // 背景: スターフィールド
    ctx.fillStyle = "white";
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

    // 足場
    ctx.fillStyle = "#1e272e"; 
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "#485460"; ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // アイテム (リペアキット)
    items.forEach(it => {
        ctx.fillStyle = "#2ecc71"; ctx.beginPath(); ctx.roundRect(it.x, it.y, it.w, it.h, 5); ctx.fill();
        ctx.fillStyle = "white"; ctx.fillRect(it.x + 12, it.y + 6, 6, 18); ctx.fillRect(it.x + 6, it.y + 12, 18, 6);
    });

    // プレイヤー
    ctx.fillStyle = "#4a90e2"; ctx.shadowBlur = 15; ctx.shadowColor = "#4a90e2";
    ctx.fillRect(player.x, player.y, player.w, player.h); ctx.shadowBlur = 0;

    // ボス演出
    if(boss.active && bossHp > 0) {
        // ビーム予兆
        if(boss.beamTimer > 200 && boss.beamTimer <= 250) {
            ctx.strokeStyle = boss.color; ctx.lineWidth = 2;
            ctx.setLineDash([10, 5]); ctx.strokeRect(0, boss.y + 20, boss.x, 60); ctx.setLineDash([]);
        }
        // ビーム発射
        if(boss.beamTimer > 250 && boss.beamTimer < 320) {
            let g = ctx.createLinearGradient(0, boss.y, 0, boss.y + 100);
            g.addColorStop(0, "transparent"); g.addColorStop(0.5, "white"); g.addColorStop(1, "transparent");
            ctx.fillStyle = boss.color; ctx.globalAlpha = 0.4; ctx.fillRect(0, boss.y + 10, boss.x, 80);
            ctx.fillStyle = g; ctx.globalAlpha = 0.8; ctx.fillRect(0, boss.y + 30, boss.x, 40);
            ctx.globalAlpha = 1.0;
        }

        // 第2形態以降のビット演出
        if(phase >= 2) {
            ctx.fillStyle = boss.color;
            let orbit = frame * 0.05;
            for(let i=0; i<2; i++) {
                ctx.fillRect(boss.x + 40 + Math.cos(orbit + i*Math.PI)*120, boss.y + 40 + Math.sin(orbit + i*Math.PI)*120, 20, 20);
            }
        }

        ctx.fillStyle = boss.color; ctx.shadowBlur = 20; ctx.shadowColor = boss.color;
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = "white"; ctx.fillRect(boss.x + 35, boss.y + 35, 30, 30);
        ctx.shadowBlur = 0;
    }

    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#ffeb3b" : (b.type === 'returned' ? "#00d2ff" : "#ff4757");
        if(b.type === 'reflect') { ctx.shadowBlur = 10; ctx.shadowColor = "#ffeb3b"; }
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    });
    ctx.restore();
}

function victory() {
    gameActive = false;
    document.getElementById('title').innerText = "SYSTEM PURGED";
    document.getElementById('title').style.color = "#f1c40f";
    document.getElementById('msg').innerHTML = "究極の脅威を退けた！宇宙は救われた。<br>クリックで再起動";
    overlay.style.display = 'flex';
}

const start = () => { if(!gameActive && bossHp > 0) { overlay.style.display='none'; gameActive=true; spawnItem(); update(); } else if(!gameActive) location.reload(); }
overlay.addEventListener('pointerdown', start);
window.addEventListener('keydown', e => { 
    keys[e.code] = true; 
    if(e.code === 'ArrowUp' && player.grounded) player.vy = -14.5; 
    if(!gameActive) start(); 
});
window.addEventListener('keyup', e => keys[e.code] = false);

const bind = (id, k) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => { e.preventDefault(); if(k) keys[k] = true; else if(player.grounded) player.vy = -14.5; });
    el.addEventListener('pointerup', e => { if(k) keys[k] = false; });
    el.addEventListener('pointerleave', e => { if(k) keys[k] = false; });
};
bind('l-btn', 'left_btn'); bind('r-btn', 'right_btn'); bind('j-btn', null);
draw();
</script>
</body>
</html>
