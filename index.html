<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave - Final Fix</title>
    <style>
        body {
            margin: 0; padding: 0; background: #0b0b18; color: white;
            font-family: sans-serif; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #ui-top { padding: 10px; font-size: 1.2rem; font-weight: bold; }
        #container {
            position: relative; width: 95vw; height: 50vh; 
            border: 2px solid #444; background: #000;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; cursor: pointer;
        }
        .controls {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; padding: 20px; width: 90vw; max-width: 400px;
        }
        .btn {
            height: 60px; background: #333; color: white; border: none;
            border-radius: 10px; font-size: 1rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #666; }
        .shoot { background: #ff4757; }
    </style>
</head>
<body>

<div id="ui-top">SCORE: <span id="score">0</span> | HP: <span id="hp">3</span></div>

<div id="container">
    <div id="overlay">
        <h2 style="color:#ff4757; margin:0;">HEART BRAVE</h2>
        <p>ここをタップして開始</p>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">←</button>
    <button class="btn" id="r-btn">→</button>
    <button class="btn" id="j-btn">UP</button>
    <button class="btn shoot" id="s-btn">HEART</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpEl = document.getElementById('hp');
const overlay = document.getElementById('overlay');

// ゲームの状態
canvas.width = 800;
canvas.height = 400;
let gameActive = false;
let score = 0;
let hp = 3;

const player = { x: 100, y: 300, w: 40, h: 40, vx: 0, vy: 0, grounded: false };
const platforms = [
    {x: 0, y: 380, w: 800, h: 20},
    {x: 200, y: 280, w: 150, h: 15},
    {x: 450, y: 200, w: 150, h: 15}
];
let enemies = [];
let hearts = [];
const keys = { left: false, right: false };

// 敵生成
function spawn() {
    if(!gameActive) return;
    enemies.push({ x: 850, y: Math.random() * 250 + 50, w: 40, h: 40, speed: Math.random() * 2 + 3 });
    setTimeout(spawn, 1500);
}

// 描画：ハート
function drawHeart(x, y) {
    ctx.fillStyle = "#ff4757";
    ctx.beginPath();
    ctx.arc(x+10, y+10, 10, 0, Math.PI*2);
    ctx.fill();
}

function update() {
    if(!gameActive) return;

    // 移動
    if(keys.left) player.vx = -6;
    else if(keys.right) player.vx = 6;
    else player.vx *= 0.8;

    player.vy += 0.6; // 重力
    player.x += player.vx;
    player.y += player.vy;

    // 当たり判定：床
    player.grounded = false;
    platforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x &&
           player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15 && player.vy >= 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.grounded = true;
        }
    });

    // 範囲制限
    if(player.x < 0) player.x = 0;
    if(player.x > 760) player.x = 760;

    // ハート
    hearts.forEach((h, i) => {
        h.x += 10;
        if(h.x > 800) hearts.splice(i, 1);
    });

    // 敵
    enemies.forEach((en, i) => {
        en.x -= en.speed;
        // 衝突：プレイヤー
        if(player.x < en.x + en.w && player.x + player.w > en.x && player.y < en.y + en.h && player.y + player.h > en.y) {
            enemies.splice(i, 1);
            hp--;
            hpEl.innerText = hp;
            if(hp <= 0) location.reload();
        }
        // 衝突：ハート
        hearts.forEach((h, hi) => {
            if(h.x < en.x + en.w && h.x + 20 > en.x && h.y < en.y + en.h && h.y + 20 > en.y) {
                enemies.splice(i, 1);
                hearts.splice(hi, 1);
                score += 100;
                scoreEl.innerText = score;
            }
        });
        if(en.x < -50) enemies.splice(i, 1);
    });

    render();
    requestAnimationFrame(update);
}

function render() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#2ecc71";
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
    ctx.fillStyle = "#3498db";
    ctx.fillRect(player.x, player.y, player.w, player.h);
    hearts.forEach(h => drawHeart(h.x, h.y));
    ctx.fillStyle = "#f1c40f";
    enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));
}

// 操作
function jump() { if(player.grounded) player.vy = -13; }
function shoot() { if(gameActive) hearts.push({ x: player.x + 40, y: player.y + 10 }); }

// イベント紐付け
overlay.addEventListener('pointerdown', () => {
    if(!gameActive) {
        overlay.style.display = 'none';
        gameActive = true;
        spawn();
        update();
    }
});

// PCキーボード
window.addEventListener('keydown', e => {
    if(e.code === 'ArrowLeft') keys.left = true;
    if(e.code === 'ArrowRight') keys.right = true;
    if(e.code === 'Space') jump();
    if(e.code === 'KeyZ') shoot();
});
window.addEventListener('keyup', e => {
    if(e.code === 'ArrowLeft') keys.left = false;
    if(e.code === 'ArrowRight') keys.right = false;
});

// ボタン（マウス・タッチ両対応）
const bind = (id, start, end) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', e => { e.preventDefault(); start(); });
    if(end) {
        el.addEventListener('pointerup', e => { e.preventDefault(); end(); });
        el.addEventListener('pointerleave', e => { e.preventDefault(); end(); });
    }
};

bind('l-btn', () => keys.left = true, () => keys.left = false);
bind('r-btn', () => keys.right = true, () => keys.right = false);
bind('j-btn', jump);
bind('s-btn', shoot);

render(); // 初期画面
</script>
</body>
</html>
