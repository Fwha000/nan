<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heart Brave: Visibility Update</title>
    <style>
        body {
            margin: 0; background: #111; color: #fff;
            font-family: 'sans-serif'; overflow: hidden; touch-action: none;
            display: flex; flex-direction: column; align-items: center;
        }
        #game-container {
            position: relative; width: 98vw; height: 70vh; max-width: 1000px;
            border: 4px solid #fff; margin-top: 10px; background: #000;
            overflow: hidden; border-radius: 5px; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        canvas { width: 100%; height: 100%; display: block; }
        #hud { width: 95vw; max-width: 1000px; padding: 10px; }
        .bar-bg { width: 100%; height: 16px; background: #333; border: 2px solid #fff; margin: 5px 0; }
        #p-hp { width: 100%; height: 100%; background: #ff0000; transition: 0.1s; }
        #b-hp { width: 100%; height: 100%; background: #ffff00; transition: 0.3s; }
        #overlay, #msg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; text-align: center;
            cursor: pointer;
        }
        #msg-layer { background: rgba(0,0,0,0.75); z-index: 110; display: none; }
        .dialogue { font-size: 1.5rem; color: #fff; margin-bottom: 20px; border: 2px solid #fff; padding: 30px; background: #000; min-width: 300px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95vw; max-width: 450px; padding: 10px; }
        .btn { height: 65px; background: #222; color: #fff; border: 2px solid #fff; font-size: 1.2rem; font-weight: bold; border-radius: 10px; }
        .btn:active { background: #fff; color: #000; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .blink { animation: blink 0.8s infinite; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display:flex; justify-content:space-between; font-size:16px; font-weight:bold;">
        <span id="stage-text">STAGE 1: FOREST</span>
        <span id="phase-label">NORMAL</span>
    </div>
    <div class="bar-bg"><div id="b-hp"></div></div>
    <div class="bar-bg"><div id="p-hp"></div></div>
</div>

<div id="game-container">
    <div id="msg-layer" onclick="resumeGame()">
        <div id="msg-box" class="dialogue"></div>
        <p class="blink">TAP TO CONTINUE</p>
    </div>

    <div id="overlay" onclick="start()">
        <div id="start-screen">
            <h1 style="font-size: 3rem; margin: 0; letter-spacing: 5px;">HEART BRAVE</h1>
            <p>画面端の予兆を見て攻撃を回避せよ</p>
            <p class="blink" style="color:#ffff00; margin-top:20px;">TOUCH TO START</p>
        </div>
        <div id="result-screen" style="display:none;">
            <h1 id="result-title">RESULT</h1>
            <p id="result-stats"></p>
            <p class="blink">TAP TO RETRY</p>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls">
    <button class="btn" id="l-btn">← LEFT</button>
    <button class="btn" id="j-btn">JUMP</button>
    <button class="btn" id="r-btn">RIGHT →</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 1200, H = 600;
const MARGIN = 60; // 画面端の可視化マージン
canvas.width = W; canvas.height = H;

let gameActive = false, isPaused = false, hp = 100, bossHp = 100, frame = 0, stage = 1, startTime = 0;
let bossPhase = 1, shake = 0, safetyTimer = 0, transitionAnim = 0;
let s1_subPhase = 0; 
const player = { x: 600, y: 500, w: 26, h: 26, vx: 0, vy: 0, grounded: false };
const boss = { x: 1050, y: 250, w: 100, h: 100, targetY: 250 };
let bullets = [], bones = [], warnings = [], items = [];
const keys = {};
const floor = {x: 0, y: 570, w: W, h: 30};
let activePlatforms = [floor];

function showDialogue(text) {
    isPaused = true;
    document.getElementById('msg-layer').style.display = 'flex';
    document.getElementById('msg-box').innerText = text;
}

function resumeGame() {
    isPaused = false;
    document.getElementById('msg-layer').style.display = 'none';
    safetyTimer = 90;
}

function spawnItem() {
    items.push({ x: Math.random()*(W-200)+100, y: -50, vy: 2, type: 'heal', life: 400 });
}

function update() {
    if(!gameActive || isPaused) {
        if(isPaused) draw();
        requestAnimationFrame(update);
        return;
    }
    frame++;
    if(shake > 0) shake--;
    if(safetyTimer > 0) safetyTimer--;
    if(transitionAnim > 0) transitionAnim--;

    // 操作系
    if(keys['ArrowLeft'] || keys['l-btn']) player.vx = -7.5;
    else if(keys['ArrowRight'] || keys['r-btn']) player.vx = 7.5;
    else player.vx *= 0.82;
    if((keys['ArrowUp'] || keys['j-btn']) && player.grounded) { player.vy = -15; player.grounded = false; }
    player.vy += 0.72; player.x += player.vx; player.y += player.vy;

    // 接地判定
    player.grounded = false;
    activePlatforms.forEach(p => {
        if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.grounded = true;
        }
    });
    player.x = Math.max(0, Math.min(W - player.w, player.x));

    // 回復アイテム出現
    if(frame % 500 === 0) spawnItem();

    // フェーズ進行ロジック
    if(stage === 1) {
        bossHp -= 0.035;
        if(frame % 250 === 0) { s1_subPhase = (s1_subPhase + 1) % 3; bones = []; }
        
        if(safetyTimer <= 0) {
            if(s1_subPhase === 0 && frame % 60 === 0) { // 下から
                let rx = Math.random()*(W-100);
                warnings.push({x: rx, y: 0, w: 45, h: H, timer: 50, type: 'column'});
                setTimeout(() => { if(!isPaused && gameActive) bones.push({ x: rx+5, y: 600, w: 35, h: 250, targetY: 420, vx: 0, vy: 0, timer: 30, life: 70, dmg: 1 }); }, 800);
            } else if(s1_subPhase === 1 && frame % 55 === 0) { // 周囲から狙い撃ち
                const side = Math.floor(Math.random() * 4);
                let bx = side===2?-80:side===3?W+80:Math.random()*W;
                let by = side===0?-80:side===1?H+80:Math.random()*H;
                const angle = Math.atan2((player.y+13)-by, (player.x+13)-bx);
                warnings.push({x: bx, y: by, tx: player.x+13, ty: player.y+13, timer: 45, type: 'line'});
                setTimeout(() => { if(!isPaused && gameActive) bones.push({ x: bx, y: by, w: 22, h: 22, vx: Math.cos(angle)*6.5, vy: Math.sin(angle)*6.5, life: 250, dmg: 1 }); }, 700);
            } else if(s1_subPhase === 2 && frame % 70 === 0) { // 横
                bones.push({ x: W+50, y: 520, w: 30, h: 50, vx: -7, vy: 0, life: 200, dmg: 1 });
            }
        }

        if(bossHp <= 50) { 
            stage = 2; bossHp = 50; transitionAnim = 120; // 移行演出開始
            bones = []; warnings = [];
            document.getElementById('stage-text').innerText = "STAGE 2: BOSS";
            activePlatforms.push({x: 350, y: 410, w: 200, h: 14, isSpecial: true}, {x: 650, y: 410, w: 200, h: 14, isSpecial: true});
            setTimeout(() => showDialogue("ここからが本番だ…\n命を大事にするんだな。"), 1500);
        }
    } else if(stage === 2 && transitionAnim <= 0 && safetyTimer <= 0) {
        // ボス戦ロジック
        const intensity = bossHp < 20 ? 1.8 : 1.2;
        boss.y += (boss.targetY - boss.y) * 0.04;
        if(frame % 80 === 0) boss.targetY = Math.random() * 300 + 100;
        if(frame % Math.floor(100/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -6 * intensity, vy: (Math.random()-0.5)*5, type: 'reflect', size: 36 });
        if(frame % Math.floor(35/intensity) === 0) bullets.push({ x: boss.x, y: boss.y + 50, vx: -9 * intensity, vy: (Math.random()-0.5)*7, type: 'normal', size: 10 });
    }

    // 更新処理
    items.forEach((it, i) => {
        it.y += it.vy; it.x += Math.sin(frame*0.05)*2;
        if(Math.abs(player.x - it.x) < 40 && Math.abs(player.y - it.y) < 40) { hp = Math.min(100, hp+20); items.splice(i, 1); }
        if(it.y > H) items.splice(i, 1);
    });

    warnings.forEach((w, i) => { w.timer--; if(w.timer <= 0) warnings.splice(i, 1); });
    
    bones.forEach((b, i) => {
        if(b.vx === 0 && b.vy === 0) { b.timer--; if(b.timer < 0) b.y += (b.targetY - b.y) * 0.25; if(b.timer < -25) b.y += 20; }
        else { b.x += b.vx; b.y += b.vy; }
        if(player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
            hp -= b.dmg || 8; bones.splice(i, 1); shake = 5;
        }
        b.life--; if(b.life <= 0 || b.y > 700) bones.splice(i, 1);
    });

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.type === 'returned') {
            b.x += (boss.x + 50 - b.x) * 0.2; b.y += (boss.y + 50 - b.y) * 0.2;
            if(Math.abs(b.x - (boss.x + 50)) < 60) { bullets.splice(i, 1); bossHp -= 8; shake = 15; }
        } else {
            if(b.type === 'reflect' && player.vy > 0 && Math.abs(player.x - b.x) < 70 && Math.abs(player.y + 26 - b.y) < 60) { b.type = 'returned'; player.vy = -14; }
            else if(Math.abs(player.x + 13 - b.x) < 22 && Math.abs(player.y + 13 - b.y) < 22) { bullets.splice(i, 1); hp -= 10; }
        }
        if(b.x < -200 || b.x > W + 200) bullets.splice(i, 1);
    });

    document.getElementById('p-hp').style.width = hp + "%";
    document.getElementById('b-hp').style.width = (bossHp * 2) + "%";
    if(hp <= 0) showResult(false);
    if(bossHp <= 0) showResult(true);
    draw();
    requestAnimationFrame(update);
}

function draw() {
    let sx = (Math.random()-0.5) * shake;
    let sy = (Math.random()-0.5) * shake;
    ctx.setTransform(1, 0, 0, 1, sx, sy);
    
    // 背景
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);

    // 予兆線と柱
    warnings.forEach(w => {
        if(w.type === 'column') {
            ctx.fillStyle = `rgba(255, 0, 0, 0.25)`; ctx.fillRect(w.x, 0, w.w, H);
        } else if(w.type === 'line') {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
            ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(w.x, w.y); ctx.lineTo(w.tx, w.ty); ctx.stroke();
            ctx.setLineDash([]);
        }
    });

    // 骨の描画（画面端のマージン外でも見える）
    ctx.fillStyle = "#fff";
    bones.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // 画面端の半透明オーバーレイ（可視化エリア）
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
    ctx.fillRect(0, 0, W, MARGIN); // 上
    ctx.fillRect(0, H - MARGIN, W, MARGIN); // 下
    ctx.fillRect(0, 0, MARGIN, H); // 左
    ctx.fillRect(W - MARGIN, 0, MARGIN, H); // 右

    // 境界線
    ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
    ctx.strokeRect(MARGIN, MARGIN, W-MARGIN*2, H-MARGIN*2);

    // 足場
    activePlatforms.forEach(p => {
        ctx.fillStyle = p.isSpecial ? "#00ffff" : "#fff";
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });

    // アイテム
    items.forEach(it => {
        ctx.fillStyle = "#ffff00"; ctx.shadowBlur = 15; ctx.shadowColor = "#ff0";
        ctx.beginPath(); ctx.arc(it.x, it.y, 15, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
    });

    // プレイヤー（ハート）
    ctx.fillStyle = "#f00"; ctx.beginPath();
    ctx.moveTo(player.x + 13, player.y + 26);
    ctx.bezierCurveTo(player.x - 5, player.y + 10, player.x + 5, player.y - 5, player.x + 13, player.y + 5);
    ctx.bezierCurveTo(player.x + 21, player.y - 5, player.x + 31, player.y + 10, player.x + 13, player.y + 26);
    ctx.fill();

    // ボス
    if(stage === 2) {
        ctx.fillStyle = transitionAnim > 0 ? (frame % 4 < 2 ? "#fff" : "#000") : "#fff";
        ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.strokeStyle = "#f00"; ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
    }

    // 弾
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'reflect' ? "#ff0" : b.type === 'returned' ? "#0f0" : "#f00";
        ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill();
    });

    // 移行演出テキスト
    if(transitionAnim > 0) {
        ctx.fillStyle = "rgba(255, 255, 255, " + (transitionAnim/120) + ")";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#f00"; ctx.font = "bold 60px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("WARNING!!", W/2, H/2);
    }

    if(stage === 1 && safetyTimer <= 0 && frame % 250 < 80) {
        ctx.fillStyle = "#fff"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
        let msg = ["下からの突き上げに注意！", "周囲からの狙い撃ちを避けろ！", "流れてくる骨をジャンプ！"][s1_subPhase];
        ctx.fillText(msg, W/2, H/2 - 80); ctx.textAlign = "left";
    }

    ctx.setTransform(1, 0, 0, 1, 0, 0);
}

function showResult(isWin) {
    gameActive = false; document.getElementById('overlay').style.display = 'flex'; 
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('result-title').innerText = isWin ? "VICTORY" : "GAME OVER";
    document.getElementById('result-stats').innerText = `TIME: ${((Date.now()-startTime)/1000).toFixed(2)}s`;
}

function start() {
    if(!gameActive) {
        if(document.getElementById('result-screen').style.display === 'block') { location.reload(); return; }
        document.getElementById('overlay').style.display = 'none'; 
        gameActive = true; startTime = Date.now(); update();
    }
}

window.addEventListener('keydown', e => { keys[e.code] = true; start(); });
window.addEventListener('keyup', e => keys[e.code] = false);
const bind = (id) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); keys[id] = true; start(); });
    el.addEventListener('pointerup', () => keys[id] = false);
};
['l-btn', 'j-btn', 'r-btn'].forEach(bind);
draw();
</script>
</body>
</html>
